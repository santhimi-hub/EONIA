<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
    // LE VIDEUR : On vérifie qui entre
    const access = localStorage.getItem('eonia_access');
    const userEmail = localStorage.getItem('user_email');

    if (!access || !userEmail) {
        // Personne n'est connecté -> Retour à l'accueil
        window.location.href = "index.html";
    }

    // Si c'est un invité, on cache les éléments privés après le chargement
    if (access === 'guest') {
        document.addEventListener('DOMContentLoaded', () => {
            // On cache les boutons d'édition ou les zones sensibles
            const privee = document.querySelectorAll('.zone-privee'); 
            privee.forEach(el => el.style.display = 'none');
            
            console.log("Mode Invité : Accès restreint.");
        });
    }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; text-align: center; }
        header { padding: 60px 20px; }
        h1 { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 1.5rem; color: #4ade80; }
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }
        .plant-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.3s;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-5px); }
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; }
        .plaque-badge { position: absolute; top: 10px; right: 10px; background: #4ade80; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .plant-info { padding: 15px; }
        .plant-name { font-size: 1rem; font-weight: 500; text-transform: uppercase; margin-bottom: 5px; }
        .plant-surnom { color: #666; font-size: 0.8rem; }
        #status-msg { padding: 40px; color: #4ade80; font-size: 0.9rem; }
        .logout-btn { background: none; border: 1px solid #333; color: #666; padding: 10px 20px; border-radius: 5px; font-size: 0.7rem; margin-top: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <header style="text-align: center; padding: 65px 20px 45px 20px;">
    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" 
         alt="ÉONIA Logo" 
         style="width: 60px; margin-bottom: 25px; opacity: 0.9;">
    
    <h1 style="font-family: 'Raleway', sans-serif; font-weight: 200; text-transform: uppercase; letter-spacing: 12px; color: #ffffff; font-size: 1.9rem; margin-bottom: 10px;">
        ÉONIA
    </h1>
    
    <h2 style="font-weight: 500; text-transform: uppercase; letter-spacing: 6px; color: #4ade80; font-size: 0.65rem; margin-bottom: 20px;">
        Collection Végétale
    </h2>
    
    <div style="width: 20px; height: 1px; background: #444; margin: 0 auto 20px auto;"></div>

    <p style="font-size: 0.5rem; color: #555; text-transform: uppercase; letter-spacing: 3px;">
        Sélectionnez un sujet pour découvrir son histoire
    </p>
</header>




    <div id="status-msg">Chargement du jardin...</div>
    
    <div id="catalogue-grid" class="catalog-container"></div>

    <button class="logout-btn" onclick="logout()">Quitter le jardin</button>

    <script>
    // 1. Garde-barrière
    const accessStatus = localStorage.getItem('eonia_access');
    if (!accessStatus) {
        window.location.href = "index.html";
    }

    const API_URL = "https://eonia-api.santhimi.workers.dev";

   async function loadCatalogue() {
        const container = document.getElementById('catalogue-grid');
        const statusMsg = document.getElementById('status-msg');
        
        // On récupère l'email stocké lors de la connexion
        const userEmail = localStorage.getItem('user_email');

        try {
            // Changement ici : on fait un POST pour envoyer l'email au Worker
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail }) 
            });

            const plants = await response.json();
            
            container.innerHTML = "";

            plants.forEach(p => {
                // IMPORTANT : On vérifie les noms exacts que ton Worker renvoie
                const name = p["Nom commun"] || "Sans nom";
                const surnom = p["Surnom de ma plante"] || "";
                const plaqueNum = p["ID_Plaque"] || "00";
                const image = p["Photo"] || "https://via.placeholder.com/400?text=EONIA";

                const card = document.createElement('a');
                // On passe l'ID à la page suivante (jardin.html)
                card.href = `jardin.html?id=${p.id}`; 
                card.className = "plant-card";
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${image}" class="plant-img" onerror="this.src='https://via.placeholder.com/400?text=Image+Indisponible'">
                        <div class="plaque-badge">#${plaqueNum}</div>
                    </div>
                    <div class="plant-info">
                        <div class="plant-name">${name}</div>
                        <div class="plant-surnom">${surnom}</div>
                    </div>
                `;
                container.appendChild(card);
            });

            if (plants.length === 0) {
                statusMsg.innerText = "Aucune plante publiée n'a été trouvée.";
                statusMsg.style.display = 'block';
            } else {
                statusMsg.style.display = 'none';
            }

        } catch (error) {
            console.error("Erreur détaillée:", error);
            statusMsg.innerText = "Erreur de chargement du catalogue.";
        }
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    loadCatalogue();
</script>


</body>
</html>

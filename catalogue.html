<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
}

header {
text-align:center;
padding:50px 20px 30px 20px;
}

.logo-main {
width:90px;
margin-bottom:20px;
opacity:0.9;
}

.brand-title {
font-weight:300;
text-transform:uppercase;
letter-spacing:8px;
font-size:2.2rem;
}

#page-title {
font-size:0.8rem;
color:#4ade80;
margin-top:10px;
letter-spacing:3px;
text-transform:uppercase;
}

.client-nav {
display:none;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.nav-btn {
background:none;
border:1px solid rgba(255,255,255,0.2);
color:#fff;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:0.65rem;
text-transform:uppercase;
}

.nav-btn.active {
border-color:#4ade80;
color:#4ade80;
}

.controls-area {
max-width:1000px;
margin:0 auto 30px auto;
padding:0 20px;
text-align:center;
}

.search-input {
width:100%;
max-width:400px;
padding:12px;
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:50px;
color:#fff;
text-align:center;
margin-bottom:20px;
}

.filter-nav {
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}

.f-btn {
background:none;
border:1px solid #1a1a1a;
color:#666;
padding:5px 12px;
border-radius:20px;
cursor:pointer;
font-size:0.55rem;
}

.f-btn.active {
border-color:#4ade80;
color:#4ade80;
}

.catalog-container {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:25px;
max-width:1000px;
margin:0 auto;
padding:20px;
}

.letter-divider {
grid-column:1/-1;
font-size:1.5rem;
color:#4ade80;
margin:30px 0 10px 0;
letter-spacing:5px;
}

.plant-card {
background:#0c0c0c;
border-radius:15px;
overflow:hidden;
border:1px solid #1a1a1a;
cursor:pointer;
transition:0.3s;
}

.plant-card:hover {
border-color:#4ade80;
transform:translateY(-5px);
}

.img-container {
height:180px;
overflow:hidden;
}

.plant-img {
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.plant-card:hover .plant-img {
transform:scale(1.08);
}

.plant-info {
padding:15px;
text-align:center;
}

.plant-name {
font-size:0.75rem;
text-transform:uppercase;
}

#status-msg {
text-align:center;
color:#4ade80;
margin-top:40px;
}

.logout-btn {
display:block;
margin:40px auto;
background:none;
border:1px solid #333;
color:#666;
padding:8px 20px;
border-radius:30px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">
<h1 class="brand-title">ÉONIA</h1>
<p id="page-title">Notre Collection</p>
</header>

<div id="client-menu" class="client-nav">
<button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Notre Collection</button>
<button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Mon Jardin</button>
</div>

<div class="controls-area">

<input type="text"
id="searchBox"
class="search-input"
placeholder="RECHERCHER UNE ESSENCE..."
oninput="renderGrid()">

<div id="filter-container" class="filter-nav">
<button class="f-btn active" onclick="setFilter('all',this)">Tout</button>
<button class="f-btn" onclick="setFilter('Fruitier',this)">Fruitiers</button>
<button class="f-btn" onclick="setFilter('Arbre',this)">Arbres</button>
<button class="f-btn" onclick="setFilter('Fleur',this)">Fleurs</button>
</div>

</div>

<div id="status-msg">Synchronisation...</div>

<div id="catalogue-grid" class="catalog-container"></div>

<button class="logout-btn" onclick="logout()">Quitter</button>

<script>

const userEmail = localStorage.getItem('user_email');
const userPin = localStorage.getItem('user_pin') || "0000";

let currentView = 'catalogue';
let allPlants = [];
let activeFilter = 'all';

if (!userEmail) window.location.href="index.html";

if (userEmail !== 'invite@eonia.com') {
document.getElementById('client-menu').style.display="flex";
}

const API_URL="https://eonia-api.santhimi.workers.dev";

async function loadData(){

const statusMsg=document.getElementById('status-msg');
const container=document.getElementById('catalogue-grid');

container.innerHTML="";
statusMsg.style.display='block';
statusMsg.innerText="Chargement...";

const emailToSend =
(currentView==='catalogue')
?'invite@eonia.com'
:userEmail;

document.getElementById('page-title').innerText=
(currentView==='catalogue')
?"Notre Collection"
:"Mon Jardin";

try{

const response=await fetch(API_URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
email:emailToSend,
pin:userPin
})
});

const data=await response.json();

allPlants = Array.isArray(data) ? data : [];

/* FILTRE PUBLIE */
if(currentView==="catalogue"){
allPlants = allPlants.filter(p =>
(p.Statut||"").toLowerCase()==="publié"
);
}

renderGrid();

}catch(error){

statusMsg.innerText="Erreur connexion";

}

}

function renderGrid(){

const container=document.getElementById('catalogue-grid');
const statusMsg=document.getElementById('status-msg');
const search=document.getElementById('searchBox').value.toLowerCase();

container.innerHTML="";

let filtered=allPlants.filter(p=>{
const nom=(p["Nom commun"]||"").toLowerCase();
const type=(activeFilter==='all'||p.Type===activeFilter);
return nom.includes(search)&&type;
});

filtered.sort((a,b)=>
(a["Nom commun"]||"").localeCompare(b["Nom commun"]||"")
);

if(filtered.length===0){
statusMsg.style.display='block';
statusMsg.innerText="Aucun résultat";
return;
}

statusMsg.style.display='none';

let lastLetter="";

filtered.forEach(p=>{

const nom=p["Nom commun"]||"Plante";
const letter=nom.charAt(0).toUpperCase();

if(currentView==='catalogue' && letter!==lastLetter){
const div=document.createElement('div');
div.className="letter-divider";
div.innerText=letter;
container.appendChild(div);
lastLetter=letter;
}

const card=document.createElement('div');
card.className="plant-card";

card.onclick=()=>{
const param =
(currentView==='jardin')
?`id=${p["ID_Plaque"]}`
:`id_botanique=${p.id}`;

window.location.href=`jardin.html?${param}`;
};

card.innerHTML=`
<div class="img-container">
<img src="${p.Photo||''}" class="plant-img">
</div>
<div class="plant-info">
<div class="plant-name">${nom}</div>
</div>`;

container.appendChild(card);

});

}

function setFilter(type,btn){
activeFilter=type;
document.querySelectorAll('.f-btn')
.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderGrid();
}

function switchView(view){

currentView=view;

document.getElementById('btn-col')
.classList.toggle('active',view==='catalogue');

document.getElementById('btn-jar')
.classList.toggle('active',view==='jardin');

loadData();

}

function logout(){
localStorage.clear();
window.location.href="index.html";
}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
}

header{
text-align:center;
padding:50px 20px 30px 20px;
}

.logo-main{
width:90px;
margin-bottom:20px;
opacity:0.9;
}

.brand-title{
font-weight:300;
text-transform:uppercase;
letter-spacing:8px;
font-size:2.2rem;
}

#page-title{
font-size:0.8rem;
color:#4ade80;
margin-top:10px;
letter-spacing:3px;
text-transform:uppercase;
}

.client-nav{
display:none;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.nav-btn{
background:none;
border:1px solid rgba(255,255,255,0.2);
color:#fff;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-size:0.65rem;
text-transform:uppercase;
}

.nav-btn.active{
border-color:#4ade80;
color:#4ade80;
}

.controls-area{
max-width:1000px;
margin:0 auto 30px auto;
padding:0 20px;
text-align:center;
}

.search-input{
width:100%;
max-width:400px;
padding:12px;
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:50px;
color:#fff;
text-align:center;
margin-bottom:20px;
}

.catalog-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:25px;
max-width:1000px;
margin:0 auto;
padding:20px;
}

.letter-divider{
grid-column:1/-1;
font-size:1.5rem;
color:#4ade80;
margin:30px 0 10px 0;
letter-spacing:5px;
}

.plant-card{
background:#0c0c0c;
border-radius:15px;
overflow:hidden;
border:1px solid #1a1a1a;
cursor:pointer;
transition:0.3s;
}

.plant-card:hover{
border-color:#4ade80;
transform:translateY(-5px);
}

.img-container{
height:180px;
overflow:hidden;
}

.plant-img{
width:100%;
height:100%;
object-fit:cover;
}

.plant-info{
padding:15px;
text-align:center;
}

.plant-name{
font-size:0.75rem;
text-transform:uppercase;
}

#status-msg{
text-align:center;
color:#4ade80;
margin-top:40px;
}

/* IA BULLE */

#ai-bubble{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
background:linear-gradient(145deg,#4ade80,#22c55e);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 25px rgba(74,222,128,0.6);
z-index:9999;
animation:breath 3s infinite;
}

@keyframes breath{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

#ai-notif{
position:fixed;
bottom:100px;
right:25px;
background:#111;
padding:12px 16px;
border-radius:15px;
font-size:12px;
border:1px solid #4ade80;
display:none;
max-width:200px;
}

</style>

</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">
<h1 class="brand-title">ÉONIA</h1>
<p id="page-title">Notre Collection</p>
</header>

<div id="client-menu" class="client-nav">
<button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Notre Collection</button>
<button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Mon Jardin</button>
</div>

<div class="controls-area">

<input type="text"
id="searchBox"
class="search-input"
placeholder="RECHERCHER UNE ESSENCE..."
oninput="renderGrid()">

</div>

<div id="status-msg">Synchronisation...</div>

<div id="catalogue-grid" class="catalog-container"></div>


<!-- IA -->
<div id="ai-notif"></div>
<div id="ai-bubble" onclick="openAI()">🌿</div>

<script>

const userEmail=localStorage.getItem('user_email');
const userPin=localStorage.getItem('user_pin')||"0000";

let currentView='catalogue';
let allPlants=[];

if(!userEmail)window.location.href="index.html";

if(userEmail!=='invite@eonia.com'){
document.getElementById('client-menu').style.display="flex";
}

const API_URL="https://eonia-api.santhimi.workers.dev";

async function loadData(){

const status=document.getElementById('status-msg');
const container=document.getElementById('catalogue-grid');

container.innerHTML="";
status.innerText="Chargement...";

const emailToSend=
(currentView==='catalogue')
?'invite@eonia.com'
:userEmail;

document.getElementById('page-title').innerText=
(currentView==='catalogue')
?"Notre Collection"
:"Mon Jardin";

try{

const response=await fetch(API_URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
email:emailToSend,
pin:userPin
})
});

const data=await response.json();

allPlants=Array.isArray(data)?data:[];

if(currentView==="catalogue"){
allPlants=allPlants.filter(p=>
(p.Statut||"").toLowerCase()==="publié"
);
}

renderGrid();
showAIMessage();

}catch(e){
status.innerText="Erreur connexion";
}

}

function renderGrid(){

const container=document.getElementById('catalogue-grid');
const search=document.getElementById('searchBox').value.toLowerCase();

container.innerHTML="";

let filtered=allPlants.filter(p=>{
return (p["Nom commun"]||"").toLowerCase().includes(search);
});

filtered.sort((a,b)=>
(a["Nom commun"]||"").localeCompare(b["Nom commun"]||"")
);

let lastLetter="";

filtered.forEach(p=>{

const nom=p["Nom commun"]||"Plante";
const letter=nom.charAt(0).toUpperCase();

if(letter!==lastLetter){
const div=document.createElement('div');
div.className="letter-divider";
div.innerText=letter;
container.appendChild(div);
lastLetter=letter;
}

const card=document.createElement('div');
card.className="plant-card";

card.onclick=()=>{
window.location.href="jardin.html?id="+(p["ID_Plaque"]||p.id);
};

card.innerHTML=`
<div class="img-container">
<img src="${p.Photo||''}" class="plant-img">
</div>
<div class="plant-info">
<div class="plant-name">${nom}</div>
</div>
`;

container.appendChild(card);

});

}

/* IA INTELLIGENTE */

function showAIMessage(){

const notif=document.getElementById('ai-notif');

const messages=[
"🌱 Besoin de conseils pour vos plantes ?",
"💧 Pensez à vérifier l'arrosage",
"🌿 Découvrez votre jardin personnel",
"☀️ Certaines plantes aiment le soleil"
];

const random=messages[Math.floor(Math.random()*messages.length)];

notif.innerText=random;
notif.style.display="block";

setTimeout(()=>{
notif.style.display="none";
},5000);

}

function openAI(){
window.location.href="assistant.html";
}

function switchView(view){

currentView=view;

document.getElementById('btn-col')
.classList.toggle('active',view==='catalogue');

document.getElementById('btn-jar')
.classList.toggle('active',view==='jardin');

loadData();

}

loadData();

</script>

</body>
</html>

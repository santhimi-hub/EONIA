<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; text-align: center; }
        header { padding: 60px 20px; }
        h1 { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 1.5rem; color: #4ade80; }
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }
        .plant-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.3s;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-5px); }
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; }
        .plaque-badge { position: absolute; top: 10px; right: 10px; background: #4ade80; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .plant-info { padding: 15px; }
        .plant-name { font-size: 1rem; font-weight: 500; text-transform: uppercase; margin-bottom: 5px; }
        .plant-surnom { color: #666; font-size: 0.8rem; }
        #status-msg { padding: 40px; color: #4ade80; font-size: 0.9rem; }
        .logout-btn { background: none; border: 1px solid #333; color: #666; padding: 10px 20px; border-radius: 5px; font-size: 0.7rem; margin-top: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>ÉONIA</h1>
        <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5; margin-top: 10px; text-transform: uppercase;">Mon Jardin Privé</p>
    </header>

    <div id="status-msg">Chargement du jardin...</div>
    
    <div id="catalogue-grid" class="catalog-container"></div>

    <button class="logout-btn" onclick="logout()">Quitter le jardin</button>

    <script>
    // 1. Garde-barrière : Personne n'entre sans au moins un statut
    const accessStatus = localStorage.getItem('eonia_access');
    if (!accessStatus) {
        window.location.href = "index.html";
    }

    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function loadCatalogue() {
        const container = document.getElementById('catalogue-grid');
        const statusMsg = document.getElementById('status-msg');

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            container.innerHTML = "";

            data.results.forEach(page => {
                const p = page.properties;
                const name = p["Nom commun"]?.title?.[0]?.plain_text || "Sans nom";
                const surnom = p["Surnom de ma plante"]?.rich_text?.[0]?.plain_text || "";
                const plaqueNum = p["ID_Plaque"]?.rich_text?.[0]?.plain_text || 
                                 p["ID_Plaque"]?.title?.[0]?.plain_text || "";
                
                const imgCol = p["Photo"]?.files?.[0];
                const image = imgCol?.file?.url || imgCol?.external?.url || "https://via.placeholder.com/400?text=EONIA";

                if (name !== "Sans nom") {
                    const card = document.createElement('a');
                    // On envoie vers la fiche avec le numéro de plaque
                    card.href = `jardin.html?plaque=${plaqueNum}`;
                    card.className = "plant-card";
                    card.innerHTML = `
                        <div class="img-container">
                            <img src="${image}" class="plant-img">
                            <div class="plaque-badge">#${plaqueNum}</div>
                        </div>
                        <div class="plant-info">
                            <div class="plant-name">${name}</div>
                            <div class="plant-surnom">${surnom}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
            statusMsg.style.display = 'none';
        } catch (error) {
            statusMsg.innerText = "Erreur de chargement du catalogue.";
        }
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    loadCatalogue();
</script>

</body>
</html>

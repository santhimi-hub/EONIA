<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; }
        .container { padding: 40px 20px; max-width: 1000px; margin: auto; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 5px; color: #4ade80; text-align: center; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .card:hover { border-color: #4ade80; transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #1a1a1a; }
        .card-info { padding: 15px; text-align: center; }
        .card-name { font-size: 0.9rem; text-transform: uppercase; color: #4ade80; letter-spacing: 1px; }

        #loader { text-align: center; color: #4ade80; padding: 50px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>La Collection</h1>
        <div id="loader">Ouverture du catalogue...</div>
        <div id="grid" class="grid"></div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    window.onload = async () => {
        // On récupère ce qu'on a en mémoire (ou rien du tout)
        const email = localStorage.getItem('user_email') || "invite";
        const role = localStorage.getItem('user_role') || "public";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // IMPORTANT : On demande explicitement le catalogue
                body: JSON.stringify({ 
                    action: "get_catalogue", 
                    email: email,
                    role: role 
                })
            });

            const plantes = await res.json();
            document.getElementById('loader').style.display = 'none';

            if (!plantes || plantes.length === 0) {
                document.getElementById('loader').innerText = "Le catalogue est momentanément indisponible.";
                return;
            }

            const grid = document.getElementById('grid');
            plantes.forEach(p => {
                // On crée chaque carte de plante
                const card = `
                    <a href="jardin.html?id=${p.id}" class="card">
                        <img src="${p.Photo || ''}" alt="${p["Nom commun"]}">
                        <div class="card-info">
                            <span class="card-name">${p["Nom commun"]}</span>
                        </div>
                    </a>`;
                grid.innerHTML += card;
            });

        } catch (e) {
            document.getElementById('loader').innerText = "Erreur de connexion au catalogue.";
            console.error(e);
        }
    };
</script>
</body>
</html>

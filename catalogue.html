<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Collection & Jardin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Raleway', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-top: 60px;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            z-index: 3000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logout-header-btn {
            background: none;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
        }

        .logout-header-btn:hover {
            background: #4ade80;
            color: #000;
        }

        header {
            text-align: center;
            padding: 30px 20px 20px 20px;
        }

        .logo-main { width: 70px; margin-bottom: 15px; opacity: 0.9; }

        .brand-title {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 2.1rem;
        }

        #page-title {
            font-size: 0.7rem;
            color: #4ade80;
            margin-top: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .client-nav {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            margin-top: 15px;
        }

        .nav-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 7px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .nav-btn.active {
            border-color: #4ade80;
            color: #4ade80;
        }

        .controls-area {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            padding: 0 15px;
            text-align: center;
        }

        .search-input {
            width: 100%;
            max-width: 350px;
            padding: 12px;
            background: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 50px;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
        }

        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .f-btn {
            background: none;
            border: 1px solid #1a1a1a;
            color: #555;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.5rem;
            text-transform: uppercase;
        }

        .f-btn.active {
            border-color: #4ade80;
            color: #4ade80;
        }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .letter-divider {
            grid-column: 1 / -1;
            font-size: 1.25rem;
            color: #4ade80;
            margin: 20px 0;
        }

        .plant-card {
            background: #0c0c0c;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .plant-card:hover {
            border-color: #4ade80;
        }

        .img-container {
            width: 100%;
            height: 145px;
            overflow: hidden;
        }

        .plant-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .plant-info {
            padding: 12px 5px;
            text-align: center;
        }

        .plant-name {
            font-size: 0.65rem;
            color: #bbb;
            text-transform: uppercase;
        }

        .fav-star {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            z-index: 5;
        }

        .fav-star.active {
            color: #4ade80;
        }

        #plant-count {
            font-size: 0.6rem;
            color: #555;
            margin-top: 8px;
        }

    </style>
</head>

<body>

<div class="top-bar">
    <button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>

<header>
    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">
    <h1 class="brand-title">ÉONIA</h1>
    <p id="page-title">Chargement...</p>
</header>

<div id="client-menu" class="client-nav">
    <button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Notre Collection</button>
    <button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Mon Jardin</button>
</div>

<div class="controls-area">
    <input type="text" id="searchBox" class="search-input" placeholder="RECHERCHER..." oninput="renderGrid()">

    <div class="filter-nav">
        <button class="f-btn active" onclick="setFilter('all', this)">Tout</button>
        <button class="f-btn" onclick="setFilter('Fruitier', this)">Fruitiers</button>
        <button class="f-btn" onclick="setFilter('Arbre', this)">Arbres</button>
        <button class="f-btn" onclick="setFilter('Fleur', this)">Fleurs</button>
    </div>

    <div id="plant-count"></div>
</div>

<div id="status-msg" style="text-align:center;color:#4ade80;font-size:0.7rem;margin-top:20px;">
    Synchronisation...
</div>

<div id="catalogue-grid" class="catalog-container"></div>

<div id="ai-chat-window"></div>

<script>

const userEmail = localStorage.getItem('user_email');
const userPin = localStorage.getItem('user_pin');

let currentView = 'catalogue';
let allPlants = [];
let activeFilter = 'all';
let favorites = JSON.parse(localStorage.getItem("eonia_fav") || "[]");

const API_URL = "https://eonia-api.santhimi.workers.dev";

if (!userEmail) logout();

if (userEmail !== 'invite@eonia.com')
document.getElementById('client-menu').style.display = 'flex';

async function loadData() {

document.getElementById('status-msg').innerText = "Synchronisation...";

const emailToSend = (currentView === 'catalogue') ? 'invite@eonia.com' : userEmail;

document.getElementById('page-title').innerText =
(currentView === 'catalogue') ? "Notre Collection" : "Mon Jardin";

const response = await fetch(API_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email: emailToSend, pin: userPin })
});

allPlants = await response.json();
renderGrid();
}

function toggleFav(id) {
if (favorites.includes(id)) {
favorites = favorites.filter(f => f !== id);
} else {
favorites.push(id);
}
localStorage.setItem("eonia_fav", JSON.stringify(favorites));
renderGrid();
}

function renderGrid() {

const container = document.getElementById('catalogue-grid');
const searchVal = document.getElementById('searchBox').value.toLowerCase();

container.innerHTML = "";

let filtered = allPlants.filter(p => {

const nom = (p["Nom commun"] || "").toLowerCase();
const latin = (p["Nom latin"] || "").toLowerCase();

const type = (p.Type && p.Type.name)
? p.Type.name.toLowerCase()
: (p.Type || "").toLowerCase();

return (
(nom.includes(searchVal) || latin.includes(searchVal)) &&
(activeFilter === 'all' || type.includes(activeFilter.toLowerCase()))
);

});

document.getElementById('plant-count').innerText =
filtered.length + " plantes";

filtered.forEach(p => {

const id = p.id || p["ID_Plaque"];
const isFav = favorites.includes(id);

const card = document.createElement('div');
card.className = "plant-card";

card.onclick = () => {
const source = (currentView === 'catalogue') ? "&from=catalogue" : "";
window.location.href = `jardin.html?id=${id}${source}`;
};

card.innerHTML = `
<div class="fav-star ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${id}')">★</div>

<div class="img-container">
<img src="${p.Photo || 'https://via.placeholder.com/300'}" class="plant-img">
</div>

<div class="plant-info">
<div class="plant-name">${p["Nom commun"] || "Plante"}</div>
</div>
`;

container.appendChild(card);
});

}

function setFilter(type, btn) {
activeFilter = type;
document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderGrid();
}

function switchView(view) {
currentView = view;
loadData();
}

function logout() {
localStorage.clear();
window.location.href = "index.html";
}

loadData();

</script>

</body>
</html>

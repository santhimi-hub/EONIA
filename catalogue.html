<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; connect-src *;">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; }

        header { padding: 60px 20px; text-align: center; }
        .logo-small { width: 60px; margin-bottom: 15px; opacity: 0.8; }
        h1 { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 1.5rem; color: #4ade80; }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .plant-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #222;
            text-decoration: none;
            color: inherit;
        }
        .plant-card:hover { transform: translateY(-8px); border-color: #4ade80; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .img-container { width: 100%; height: 280px; overflow: hidden; background: #1a1a1a; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .plant-card:hover .plant-img { transform: scale(1.05); }
        
        .plant-info { padding: 25px; }
        .plant-name { font-size: 1.3rem; font-weight: 500; margin-bottom: 12px; color: #fff; }
        
        .badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { 
            font-size: 0.6rem; padding: 5px 12px; 
            background: rgba(255,255,255,0.05); 
            color: #ccc; border: 1px solid #333; 
            border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;
        }

        #status-msg { text-align: center; padding: 40px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
    <a href="index.html" style="text-decoration: none; color: inherit;">
        <div style="font-size: 1.2rem; letter-spacing: 8px; font-weight: 200; cursor: pointer;">ÉONIA</div>
    </a>
    <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5; margin-top: 10px; text-transform: uppercase;">
        Mon Jardin Privé
    </p>
</header>


    <div id="status-msg">Connexion à la mémoire végétale...</div>
    <div id="catalog" class="catalog-container"></div>
<button onclick="logout()" style="background: none; border: 1px solid #333; color: #666; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; margin-top: 20px; cursor: pointer;">
    Quitter le jardin
</button>

<script>
    function logout() {
        // On supprime la clé d'accès du téléphone
        localStorage.removeItem('eonia_access');
        // On renvoie à l'accueil
        window.location.href = "index.html";
    }
</script>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function loadCatalogue() {
        const container = document.getElementById('catalogue-grid');
        const statusMsg = document.getElementById('status-msg');

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // On vide le message de chargement
            container.innerHTML = "";

            data.results.forEach(page => {
                const p = page.properties;

                // 1. On extrait les infos de base
                const name = p["Nom commun"]?.title[0]?.plain_text || "Plante sans nom";
                const surnom = p["Surnom de ma plante"]?.rich_text[0]?.plain_text || "";
                
                // 2. On récupère le NUMÉRO DE PLAQUE (C'est lui qui fera le lien !)
                const plaqueNum = p["ID_Plaque"]?.title?.[0]?.plain_text || 
                                 p["ID_Plaque"]?.rich_text?.[0]?.plain_text || "";

                // 3. On récupère l'image
                const imgCol = p["Photo"]?.files?.[0];
                const image = imgCol?.file?.url || imgCol?.external?.url || page.cover?.external?.url || "https://via.placeholder.com/400x300?text=EONIA";

                // 4. On crée la carte avec le lien vers ?plaque=XX
                const card = document.createElement('div');
                card.innerHTML = `
                    <a href="jardin.html?plaque=${plaqueNum}" class="plant-card" style="text-decoration:none; color:inherit;">
                        <div style="position:relative;">
                            <img src="${image}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:15px;">
                            ${plaqueNum ? `<span style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:5px; font-size:0.6rem; color:#4ade80;">#${plaqueNum}</span>` : ''}
                        </div>
                        <h3 style="margin-top:10px; font-size:1rem; text-transform:uppercase;">${name}</h3>
                        <p style="color:#666; font-size:0.8rem;">${surnom}</p>
                    </a>
                `;
                container.appendChild(card);
            });

            if(statusMsg) statusMsg.style.display = 'none';

        } catch (error) {
            console.error(error);
            if(statusMsg) statusMsg.innerText = "Erreur de chargement du catalogue.";
        }
    }

    loadCatalogue();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; connect-src *;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; text-align: center; }

        header { padding: 60px 20px; }
        h1 { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 1.5rem; color: #4ade80; }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left; /* Pour que le texte des cartes reste à gauche */
        }

        .plant-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s ease;
            border: 1px solid #222;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .plant-card:hover { transform: translateY(-8px); border-color: #4ade80; }
        
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #1a1a1a; position: relative; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; }
        
        .plaque-badge { 
            position: absolute; top: 10px; right: 10px; 
            background: #4ade80; color: #000; 
            padding: 4px 8px; border-radius: 5px; 
            font-size: 0.7rem; font-weight: bold; 
        }

        .plant-info { padding: 20px; }
        .plant-name { font-size: 1.1rem; font-weight: 500; margin-bottom: 5px; text-transform: uppercase; }
        .plant-surnom { color: #666; font-size: 0.8rem; }

        #status-msg { padding: 40px; color: #4ade80; font-size: 0.9rem; letter-spacing: 2px; }
        
        .logout-btn { 
            background: none; border: 1px solid #333; color: #666; 
            padding: 10px 20px; border-radius: 5px; font-size: 0.7rem; 
            margin-top: 40px; cursor: pointer; text-transform: uppercase;
        }
        .logout-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="text-decoration: none; color: inherit;">
            <div style="font-size: 1.2rem; letter-spacing: 8px; font-weight: 200; cursor: pointer;">ÉONIA</div>
        </a>
        <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5; margin-top: 10px; text-transform: uppercase;">
            Mon Jardin Privé
        </p>
    </header>

    <div id="status-msg">Connexion à la mémoire végétale...</div>
    
    <div id="catalogue-grid" class="catalog-container"></div>

    <button class="logout-btn" onclick="logout()">Quitter le jardin</button>

    <script>
        // --- FONCTION DE DECONNEXION ---
        function logout() {
            localStorage.removeItem('eonia_access');
            window.location.href = "index.html";
        }

        // --- CHARGEMENT DU CATALOGUE ---
        const API_URL = "https://eonia-api.santhimi.workers.dev";

        async function loadCatalogue() {
            const container = document.getElementById('catalogue-grid');
            const statusMsg = document.getElementById('status-msg');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Erreur API");
                const data = await response.json();

                container.innerHTML = "";

                data.results.forEach(page => {
                    const p = page.properties;

                    // Extraction des textes (Sécurité si vide)
                    const name = p["Nom commun"]?.title?.[0]?.plain_text || "Plante sans nom";
                    const surnom = p["Surnom de ma plante"]?.rich_text?.[0]?.plain_text || "";
                    
                    // Extraction ID_Plaque
                    const plaqueNum = p["ID_Plaque"]?.title?.[0]?.plain_text || 
                                     p["ID_Plaque"]?.rich_text?.[0]?.plain_text || "";

                    // Image
                    const imgCol = p["Photo"]?.files?.[0];
                    const image = imgCol?.file?.url || imgCol?.external?.url || page.cover?.external?.url || "https://via.placeholder.com/400x400?text=EONIA";

                    // On n'affiche que les lignes qui ont un nom
                    if (name !== "Plante sans nom") {
                        const card = document.createElement('a');
                        card.href = `jardin.html?plaque=${plaqueNum}`;
                        card.className = "plant-card";
                        card.innerHTML = `
                            <div class="img-container">
                                <img src="${image}" class="plant-img">
                                ${plaqueNum ? `<div class="plaque-badge">#${plaqueNum}</div>` : ''}
                            </div>
                            <div class="plant-info">
                                <div class="plant-name">${name}</div>
                                <div class="plant-surnom">${surnom}</div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });

                if (statusMsg) statusMsg.style.display = 'none';

            } catch (error) {
                console.error("Erreur:", error);
                if (statusMsg) statusMsg.innerText = "Erreur de chargement. Vérifiez votre connexion.";
            }
        }

        loadCatalogue();
    </script>
</body>
</html>

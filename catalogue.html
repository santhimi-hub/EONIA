<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; connect-src *;">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; }

        header { padding: 60px 20px; text-align: center; }
        .logo-small { width: 60px; margin-bottom: 15px; opacity: 0.8; }
        h1 { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 1.5rem; color: #4ade80; }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .plant-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #222;
            text-decoration: none;
            color: inherit;
        }
        .plant-card:hover { transform: translateY(-8px); border-color: #4ade80; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .img-container { width: 100%; height: 280px; overflow: hidden; background: #1a1a1a; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .plant-card:hover .plant-img { transform: scale(1.05); }
        
        .plant-info { padding: 25px; }
        .plant-name { font-size: 1.3rem; font-weight: 500; margin-bottom: 12px; color: #fff; }
        
        .badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { 
            font-size: 0.6rem; padding: 5px 12px; 
            background: rgba(255,255,255,0.05); 
            color: #ccc; border: 1px solid #333; 
            border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;
        }

        #status-msg { text-align: center; padding: 40px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-small">
        <h1>Catalogue</h1>
    </header>

    <div id="status-msg">Connexion à la mémoire végétale...</div>
    <div id="catalog" class="catalog-container"></div>

    <script>
const API_URL = "https://eonia-api.santhimi.workers.dev";

async function loadPlants() {
    const container = document.getElementById('catalog');
    const statusMsg = document.getElementById('status-msg');

    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!data.results || data.results.length === 0) {
            statusMsg.innerHTML = "Aucune plante trouvée dans Notion.";
            return;
        }

        container.innerHTML = data.results.map(page => {
            const p = page.properties;
            
            // On récupère les textes sans risquer de planter
            const nom = p["Nom commun"]?.title?.[0]?.plain_text || "Sans nom";
            const surnom = p["Surnom de ma plante"]?.rich_text?.[0]?.plain_text || "";
            const expo = p["Exposition"]?.select?.name || "NC";
            const diff = p["Difficulte"]?.select?.name || p["Difficulté"]?.select?.name || "NC";

            // Photo : On teste la colonne "Photo", puis la couverture Notion
            const imgFile = p["Photo"]?.files?.[0];
            const image = imgFile?.file?.url || imgFile?.external?.url || page.cover?.external?.url || page.cover?.file?.url || "https://via.placeholder.com/400?text=EONIA";

            return `
                <div class="plant-card">
                    <div class="img-container">
                        <img src="${image}" class="plant-img" loading="lazy">
                    </div>
                    <div class="plant-info">
                        <div class="plant-name">${nom}</div>
                        <div style="font-size:0.8rem; color:#888; margin-bottom:10px;">${surnom}</div>
                        <div class="badges">
                            <span class="badge">☀️ ${expo}</span>
                            <span class="badge">💪 ${diff}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        statusMsg.style.display = 'none'; // On cache le message de chargement
    } catch (error) {
        console.error("Erreur détaillée:", error);
        statusMsg.innerHTML = "Erreur de connexion. Vérifiez la console (F12).";
    }
}

loadPlants();
</script>

</body>
</html>

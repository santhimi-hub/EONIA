<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Collection & Jardin</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#000; color:#fff; font-family:'Raleway',sans-serif; min-height:100vh; padding-top:60px; }

.top-bar {
position:fixed; top:0; left:0; width:100%; height:60px;
background:rgba(0,0,0,0.85);
display:flex; justify-content:flex-end; align-items:center;
padding:0 20px; z-index:3000;
}

.logout-header-btn {
border:1px solid #4ade80;
background:none;
color:#4ade80;
padding:6px 16px;
border-radius:20px;
cursor:pointer;
}

header { text-align:center; padding:30px 20px; }

.brand-title { font-weight:300; letter-spacing:8px; font-size:2.1rem; }

.client-nav { display:none; justify-content:center; gap:15px; margin:20px; }

.nav-btn {
background:none; border:1px solid #333;
color:#fff; padding:10px 20px;
border-radius:25px; cursor:pointer;
}

.nav-btn.active { border-color:#4ade80; color:#4ade80; }

.controls-area { text-align:center; padding:0 15px; }

.search-input {
width:100%; max-width:450px;
padding:14px;
border-radius:50px;
background:#0c0c0c;
border:1px solid #1a1a1a;
color:#fff;
}

.filter-nav { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:15px 0; }

.f-btn {
border:1px solid #1a1a1a;
background:none;
color:#777;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

.f-btn.active { border-color:#4ade80; color:#4ade80; }

.catalog-container {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
gap:20px;
padding:20px;
}

.plant-card {
background:#0c0c0c;
border-radius:15px;
overflow:hidden;
border:1px solid #1a1a1a;
cursor:pointer;
position:relative;
transition:0.3s;
}

.plant-card:hover { transform:translateY(-5px); }

.img-container { height:160px; overflow:hidden; position:relative; }

.plant-img { width:100%; height:100%; object-fit:cover; }

.plant-info { padding:15px; text-align:center; }

.plant-name { font-size:0.75rem; color:#ccc; text-transform:uppercase; }

.card-fav-btn {
position:absolute;
top:10px; right:10px;
width:32px; height:32px;
border-radius:50%;
background:rgba(0,0,0,0.5);
display:flex; align-items:center; justify-content:center;
cursor:pointer;
z-index:5;
}

.card-fav-btn svg { width:16px; height:16px; stroke:#fff; fill:none; }
.card-fav-btn.active svg { fill:#4ade80; stroke:#4ade80; }
</style>
</head>

<body>

<div class="top-bar">
<button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>

<header>
<h1 class="brand-title">ÉONIA</h1>
</header>

<div id="client-menu" class="client-nav">
<button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Collection</button>
<button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Jardin</button>
</div>

<div class="controls-area">
<input type="text" id="searchBox" class="search-input" oninput="renderGrid()" placeholder="Rechercher...">

<div class="filter-nav">
<button class="f-btn active" onclick="setFilter('all', this)">Tout</button>
<button class="f-btn" onclick="setFilter('favoris', this)">❤</button>
<button class="f-btn" onclick="setFilter('Arbre', this)">Arbres</button>
<button class="f-btn" onclick="setFilter('Aromate', this)">Aromates</button>
<button class="f-btn" onclick="setFilter('Fleur', this)">Fleurs</button>
<button class="f-btn" onclick="setFilter('Fruitier', this)">Fruitiers</button>
<button class="f-btn" onclick="setFilter('Potager', this)">Potager</button>
<button class="f-btn" onclick="setFilter('Succulente', this)">Succulentes</button>
</div>
</div>

<div id="catalogue-grid" class="catalog-container"></div>

<script>

const userEmail = localStorage.getItem('user_email');
const API_URL = "https://eonia-api.santhimi.workers.dev/";

let allPlants = [];
let activeFilter = 'all';
let currentView = 'catalogue';

function toggleFav(e,p){
e.stopPropagation();

let favs = JSON.parse(localStorage.getItem('eonia_favs')||'[]');

const idx = favs.findIndex(f=>f.id===p.id);

if(idx>-1) favs.splice(idx,1);
else favs.push({id:p.id});

localStorage.setItem('eonia_favs',JSON.stringify(favs));
renderGrid();
}

function renderGrid(){

const container = document.getElementById("catalogue-grid");
const search = document.getElementById("searchBox").value.toLowerCase();
const favs = JSON.parse(localStorage.getItem('eonia_favs')||'[]');

container.innerHTML="";

let filtered = allPlants.filter(p=>{

const nom = (p["Nom commun"]||"").toLowerCase();
const type = (p.Type||"").toLowerCase();

if(activeFilter==="favoris"){
if(!favs.some(f=>f.id===p.id)) return false;
}
else if(activeFilter!=="all"){
if(!type.includes(activeFilter.toLowerCase())) return false;
}

return nom.includes(search);
});

filtered.forEach(p=>{

const nom = p["Nom commun"]||"Sans nom";
const isFav = favs.some(f=>f.id===p.id);

const card = document.createElement("div");
card.className="plant-card";

card.innerHTML=`
<div class="img-container">

<div class="card-fav-btn ${isFav?'active':''}">
<svg viewBox="0 0 24 24">
<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
</svg>
</div>

<img src="${p.Photo||''}" class="plant-img">
</div>

<div class="plant-info">
<div class="plant-name">${nom}</div>
</div>
`;

card.addEventListener("click",()=> {
window.location.href = `jardin.html?id=${p.id}`;
});

card.querySelector(".card-fav-btn")
.addEventListener("click",(e)=>toggleFav(e,p));

container.appendChild(card);
});
}

function setFilter(t,btn){
activeFilter=t;
document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
renderGrid();
}

function logout(){
localStorage.clear();
window.location.href="index.html";
}

// DEMO (remplace par API)
allPlants=[
{id:1,"Nom commun":"Rosier",Type:"Fleur",Photo:""},
{id:2,"Nom commun":"Basilic",Type:"Aromate",Photo:""},
{id:3,"Nom commun":"Pommier",Type:"Fruitier",Photo:""}
];

renderGrid();

</script>

</body>
</html>

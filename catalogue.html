<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉONIA — Collection & Jardin</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
color: #fff;
font-family: 'Raleway', sans-serif;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
padding-top: 60px;
}

/* TOP BAR */
.top-bar {
position: fixed; top: 0; left: 0; width: 100%; height: 60px;
background: rgba(0,0,0,0.85);
backdrop-filter: blur(15px);
display: flex; justify-content: flex-end; align-items: center;
padding: 0 20px;
z-index: 3000;
border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logout-header-btn {
background: none;
border: 1px solid #4ade80;
color: #4ade80;
padding: 6px 16px;
border-radius: 20px;
font-size: 0.6rem;
text-transform: uppercase;
cursor: pointer;
transition: 0.3s;
}

.logout-header-btn:hover {
background: #4ade80;
color: #000;
}

/* HEADER */
header {
text-align: center;
padding: 30px 20px 20px 20px;
}

.logo-main {
width: 70px;
margin-bottom: 15px;
}

.brand-title {
font-weight: 300;
text-transform: uppercase;
letter-spacing: 8px;
font-size: 2.1rem;
}

#page-title {
font-size: 0.7rem;
color: #4ade80;
margin-top: 8px;
letter-spacing: 3px;
}

/* NAV */
.client-nav {
display: none;
justify-content: center;
gap: 12px;
margin: 15px 0 25px;
}

.nav-btn {
background: none;
border: 1px solid #1a1a1a;
color: #fff;
padding: 7px 15px;
border-radius: 20px;
font-size: 0.6rem;
cursor: pointer;
}

.nav-btn.active {
border-color: #4ade80;
color: #4ade80;
}

/* SEARCH */
.controls-area {
max-width: 1000px;
margin: 0 auto 20px auto;
padding: 0 15px;
text-align: center;
}

.search-input {
width: 100%;
max-width: 350px;
padding: 12px;
background: #0c0c0c;
border: 1px solid #1a1a1a;
border-radius: 50px;
color: #fff;
text-align: center;
font-size: 0.8rem;
margin-bottom: 15px;
}

.search-input:focus {
border-color: #4ade80;
outline: none;
}

/* FILTER */
.filter-nav {
display: flex;
justify-content: center;
gap: 6px;
flex-wrap: wrap;
}

.f-btn {
background: none;
border: 1px solid #1a1a1a;
color: #555;
padding: 5px 12px;
border-radius: 20px;
font-size: 0.5rem;
cursor: pointer;
text-transform: uppercase;
}

.f-btn.active {
border-color: #4ade80;
color: #4ade80;
}

/* GRID */
.catalog-container {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
gap: 20px;
max-width: 1000px;
margin: 0 auto;
padding: 20px;
}

/* LETTER */
.letter-divider {
grid-column: 1 / -1;
font-size: 1.2rem;
color: #4ade80;
margin: 20px 0 10px 5px;
font-weight: 200;
letter-spacing: 6px;
}

/* CARD */
.plant-card {
background: #0c0c0c;
border-radius: 12px;
overflow: hidden;
border: 1px solid #1a1a1a;
cursor: pointer;
transition: 0.3s;
}

.plant-card:hover {
border-color: #4ade80;
transform: translateY(-5px);
}

.img-container {
height: 145px;
overflow: hidden;
background: #000;
}

.plant-img {
width: 100%;
height: 100%;
object-fit: cover;
transition: 0.4s;
}

.plant-info {
padding: 12px;
text-align: center;
}

.plant-name {
font-size: 0.65rem;
text-transform: uppercase;
color: #bbb;
}

/* AI */
#eonia-ai-trigger {
position: fixed;
bottom: 30px;
right: 25px;
cursor: pointer;
}

.ai-icon-circle {
width: 50px;
height: 50px;
background: #fff;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
border: 1px solid #4ade80;
}

/* CHAT */
#ai-chat-window {
display: none;
position: fixed;
bottom: 95px;
right: 25px;
width: 320px;
height: 450px;
background: #0c0c0c;
border: 1px solid #4ade80;
border-radius: 15px;
z-index: 3000;
}

@media (max-width: 450px) {
.catalog-container {
grid-template-columns: repeat(2, 1fr);
}
}

</style>
</head>

<button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>

<img class="logo-main" src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png">
<h1 class="brand-title">ÉONIA</h1>
<p id="page-title">Chargement...</p>
</header>

<div id="client-menu" class="client-nav">
<button id

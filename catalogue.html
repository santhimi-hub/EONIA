<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Catalogue</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
padding-top:60px;
}

/* TOP BAR */
.top-bar{
position:fixed;
top:0;left:0;
width:100%;
height:60px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(15px);
display:flex;
justify-content:flex-end;
align-items:center;
padding:0 20px;
z-index:3000;
}

.logout-header-btn{
background:none;
border:1px solid #4ade80;
color:#4ade80;
padding:6px 14px;
border-radius:20px;
font-size:0.6rem;
cursor:pointer;
}

/* HEADER */
header{
text-align:center;
padding:30px 20px;
}

.logo-main{width:70px;margin-bottom:10px;}
.brand-title{font-weight:300;letter-spacing:8px;text-transform:uppercase;}
#page-title{font-size:0.7rem;color:#4ade80;margin-top:5px;}

/* MENU CLIENT */
.client-nav{
display:none;
justify-content:center;
gap:10px;
margin:15px 0;
}

.nav-btn{
background:none;
border:1px solid #222;
color:#fff;
padding:6px 14px;
border-radius:20px;
font-size:0.6rem;
cursor:pointer;
}

.nav-btn.active{
border-color:#4ade80;
color:#4ade80;
}

/* SEARCH */
.controls-area{
text-align:center;
padding:0 15px;
}

.search-input{
width:100%;
max-width:350px;
padding:10px;
border-radius:50px;
border:1px solid #1a1a1a;
background:#0c0c0c;
color:#fff;
text-align:center;
}

/* GRID */
.catalog-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
gap:15px;
padding:20px;
max-width:1000px;
margin:auto;
}

/* ALPHABET */
.letter-divider{
grid-column:1/-1;
color:#4ade80;
margin:20px 0 10px;
letter-spacing:6px;
font-size:0.9rem;
}

/* CARD */
.plant-card{
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:12px;
cursor:pointer;
transition:0.3s;
overflow:hidden;
}

.plant-card:hover{
border-color:#4ade80;
transform:translateY(-5px);
}

.img-container{
height:140px;
overflow:hidden;
}

.plant-img{
width:100%;
height:100%;
object-fit:cover;
}

/* IA */
#eonia-ai-trigger{
position:fixed;
bottom:25px;
right:25px;
z-index:9999;
cursor:pointer;
}

.ai-icon-circle{
width:55px;
height:55px;
background:#4ade80;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 20px rgba(74,222,128,0.5);
}

.ai-icon-circle img{
width:28px;
filter:brightness(0) invert(1);
}
</style>
</head>

<body>

<div class="top-bar">
<button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>

<header>
<img class="logo-main" src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png">
<h1 class="brand-title">ÉONIA</h1>
<p id="page-title">Catalogue</p>
</header>

<!-- MENU CLIENT -->
<div id="client-menu" class="client-nav">
<button class="nav-btn active">Collection</button>
<button class="nav-btn">Mon Jardin</button>
</div>

<div class="controls-area">
<input id="searchBox" class="search-input" placeholder="RECHERCHER..." oninput="renderGrid()">
</div>

<div id="catalogue-grid" class="catalog-container"></div>

<script>

const API_URL="https://eonia-api.santhimi.workers.dev";

let allPlants=[];

/* ===================== USER ===================== */
const userEmail = localStorage.getItem('user_email') || "invite@eonia.com";
const userPin = localStorage.getItem('user_pin') || "0000";

/* menu visible si connecté */
if(userEmail !== "invite@eonia.com"){
document.getElementById("client-menu").style.display="flex";
}

/* ===================== LOAD CATALOGUE (GLOBAL UNIQUEMENT) ===================== */
async function loadData(){

const res = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"get_catalogue"
})
});

allPlants = await res.json();
renderGrid();
}

/* ===================== RENDER AVEC ALPHABET ===================== */
function renderGrid(){

const container=document.getElementById("catalogue-grid");
const search=document.getElementById("searchBox").value.toLowerCase();

container.innerHTML="";

let filtered = allPlants.filter(p =>
(p["Nom commun"] || "").toLowerCase().includes(search)
);

filtered.sort((a,b)=>
(a["Nom commun"] || "").localeCompare(b["Nom commun"] || "")
);

let lastLetter = "";

filtered.forEach(p=>{

const name = p["Nom commun"] || "Plante";
const letter = name[0].toUpperCase();

/* ALPHABET */
if(letter !== lastLetter){
const div=document.createElement("div");
div.className="letter-divider";
div.textContent = letter;
container.appendChild(div);
lastLetter = letter;
}

/* CARD */
const id = p["ID_Plaque"] || p.id;

const card=document.createElement("div");
card.className="plant-card";

card.onclick=()=>{
window.location.href="jardin.html?id="+id;
};

card.innerHTML=`
<div class="img-container">
<img class="plant-img" src="${p.Photo || ''}">
</div>
`;

container.appendChild(card);

});

}

function logout(){
localStorage.clear();
window.location.href="index.html";
}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
        
        /* HEADER AVEC BOUTON QUITTER FIXE (STICKY) */
        header { position: relative; text-align: center; padding: 60px 20px 20px 20px; }
        
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: flex-end; align-items: center;
            padding: 0 20px; z-index: 3000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logout-header-btn {
            background: none; border: 1px solid #4ade80;
            color: #4ade80; padding: 6px 16px; border-radius: 20px;
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; transition: 0.3s; font-weight: 500;
        }
        .logout-header-btn:hover { background: #4ade80; color: #000; box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }

        .logo-main { width: 70px; margin-bottom: 15px; opacity: 0.9; margin-top: 20px; }
        .brand-title { font-weight: 300; text-transform: uppercase; letter-spacing: 8px; color: #fff; font-size: 2.1rem; margin: 0; }
        #page-title { font-size: 0.7rem; color: #4ade80; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }

        /* NAVIGATION CLIENT */
        .client-nav { display: none; justify-content: center; gap: 12px; margin-bottom: 25px; margin-top: 15px; }
        .nav-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 7px 15px; border-radius: 20px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 1px; transition: 0.3s; }
        .nav-btn.active { border-color: #4ade80; color: #4ade80; background: rgba(74, 222, 128, 0.05); }

        /* RECHERCHE ET FILTRES */
        .controls-area { max-width: 1000px; margin: 0 auto 20px auto; padding: 0 15px; text-align: center; }
        .search-input { 
            width: 100%; max-width: 350px; padding: 12px; background: #0c0c0c; border: 1px solid #1a1a1a; 
            border-radius: 50px; color: #fff; font-family: 'Raleway'; outline: none; 
            text-align: center; margin-bottom: 15px; font-size: 0.8rem; transition: 0.3s;
        }
        .search-input:focus { border-color: #4ade80; background: #111; }

        .filter-nav { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .f-btn { background: none; border: 1px solid #1a1a1a; color: #555; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.5rem; text-transform: uppercase; transition: 0.3s; }
        .f-btn.active { border-color: #4ade80; color: #4ade80; }

        /* SÉPARATEURS ALPHABÉTIQUES */
        .letter-divider { 
            grid-column: 1 / -1; font-size: 1.25rem; color: #4ade80; 
            border-bottom: 1px solid rgba(74, 222, 128, 0.15); margin: 30px 0 15px 5px; 
            padding-bottom: 5px; font-weight: 200; letter-spacing: 6px; text-align: left;
        }

        /* GRILLE ET CARTES */
        .catalog-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
            gap: 20px; max-width: 1000px; margin: 0 auto; padding: 20px; 
        }

        .plant-card { 
            background: #0c0c0c; border-radius: 12px; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: 0.3s ease; cursor: pointer;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-5px); box-shadow: 0 10px 25px rgba(74, 222, 128, 0.1); }

        .img-container { width: 100%; height: 145px; overflow: hidden; background: #000; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.6) brightness(0.7); transition: 0.6s ease; }
        .plant-card:hover .plant-img { filter: grayscale(0) brightness(1.1); transform: scale(1.1); }

        .plant-info { padding: 12px 5px; text-align: center; }
        .plant-name { font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; line-height: 1.3; }
        .plant-card:hover .plant-name { color: #fff; }

        /* BULLE IA */
        #eonia-ai-trigger { position: fixed; bottom: 30px; right: 25px; z-index: 2000; cursor: pointer; display: flex; align-items: center; transition: 0.3s; }
        .ai-icon-circle { width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; }
        .ai-tooltip { background: #111; color: #4ade80; padding: 8px 16px; border-radius: 20px; font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; margin-right: 12px; border: 1px solid #1a1a1a; opacity: 0; transition: 0.4s; pointer-events: none; font-weight: 700; transform: translateX(10px); }
        #eonia-ai-trigger:hover .ai-tooltip { opacity: 1; transform: translateX(0); }

        @media (max-width: 450px) {
            .catalog-container { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
            .img-container { height: 120px; }
            .brand-title { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="logout-header-btn" onclick="logout()">Quitter</button>
    </div>

    <header>
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA Logo" class="logo-main">
        <h1 class="brand-title">ÉONIA</h1>
        <p id="page-title">Notre Collection</p>
    </header>

    <div id="client-menu" class="client-nav">
        <button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Notre Collection</button>
        <button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Mon Jardin</button>
    </div>

    <div class="controls-area">
        <input type="text" id="searchBox" class="search-input" placeholder="RECHERCHER UNE ESSENCE..." oninput="renderGrid()">
        <div id="filter-container" class="filter-nav">
            <button class="f-btn active" onclick="setFilter('all', this)">Tout</button>
            <button class="f-btn" onclick="setFilter('Fruitier', this)">Fruitiers</button>
            <button class="f-btn" onclick="setFilter('Arbre', this)">Arbres</button>
            <button class="f-btn" onclick="setFilter('Fleur', this)">Fleurs</button>
        </div>
    </div>

    <div id="status-msg" style="text-align: center; color: #4ade80; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 20px;">Synchronisation...</div>
    <div id="catalogue-grid" class="catalog-container"></div>

    <div id="eonia-ai-trigger" onclick="ouvrirChatIA()">
        <span class="ai-tooltip">Une question ?</span>
        <div class="ai-icon-circle">
            <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" style="width: 22px; filter: invert(1);" alt="IA">
        </div>
    </div>

<script>
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    let currentView = 'catalogue'; 
    let allPlants = []; 
    let activeFilter = 'all';

    if (!userEmail) { window.location.href = "index.html"; }
    if (userEmail !== 'invite@eonia.com') { document.getElementById('client-menu').style.display = 'flex'; }

    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function loadData() {
        const statusMsg = document.getElementById('status-msg');
        statusMsg.style.display = 'block';
        statusMsg.innerText = "Synchronisation...";
        const emailToSend = (currentView === 'catalogue') ? 'invite@eonia.com' : userEmail;
        document.getElementById('page-title').innerText = (currentView === 'catalogue') ? "Notre Collection" : "Mon Jardin";
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailToSend, pin: userPin }) 
            });
            allPlants = await response.json();
            renderGrid();
        } catch (error) { statusMsg.innerText = "Erreur de connexion."; }
    }

    function renderGrid() {
        const container = document.getElementById('catalogue-grid');
        const statusMsg = document.getElementById('status-msg');
        const searchVal = document.getElementById('searchBox').value.toLowerCase();
        container.innerHTML = "";
        let filtered = allPlants.filter(p => {
            const nom = (p["Nom commun"] || "").toLowerCase();
            return nom.includes(searchVal) && (activeFilter === 'all' || p.Type === activeFilter);
        });
        filtered.sort((a, b) => (a["Nom commun"] || "").localeCompare(b["Nom commun"] || ""));
        if (filtered.length === 0) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = "Aucun résultat trouvé.";
            return;
        }
        statusMsg.style.display = 'none';
        let lastLetter = "";
        filtered.forEach(p => {
            const nom = p["Nom commun"] || "Spécimen";
            const currentLetter = nom[0].toUpperCase();
            if (currentView === 'catalogue' && currentLetter !== lastLetter) {
                const divider = document.createElement('div');
                divider.className = "letter-divider";
                divider.innerText = currentLetter;
                container.appendChild(divider);
                lastLetter = currentLetter;
            }
            const card = document.createElement('div');
            card.className = "plant-card";
            card.onclick = () => {
                const param = (currentView === 'jardin') ? `id=${p["ID_Plaque"]}` : `id_botanique=${p.id}`;
                window.location.href = `jardin.html?${param}`;
            };
            card.innerHTML = `<div class="img-container"><img src="${p.Photo}" class="plant-img"></div><div class="plant-info"><div class="plant-name">${nom}</div></div>`;
            container.appendChild(card);
        });
    }

    function setFilter(type, btn) {
        activeFilter = type;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    function switchView(view) {
        currentView = view;
        document.getElementById('btn-col').classList.toggle('active', view === 'catalogue');
        document.getElementById('btn-jar').classList.toggle('active', view === 'jardin');
        loadData();
    }

    function ouvrirChatIA() {
        alert("Une question ? Je suis là pour vous accompagner. \n\nDites-moi ce que vous recherchez (ambiance, exposition, entretien...) et je vous aiderai à trouver la plante idéale dans notre collection !");
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadData();
</script>
</body>
</html>

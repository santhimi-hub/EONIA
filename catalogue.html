<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 30px; }
        .logo-small { width: 50px; }
        .btn-logout { background: none; border: 1px solid #4ade80; color: #4ade80; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }

        h2 { font-weight: 200; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; text-align: center; color: #4ade80; }

        /* GRILLE DU CATALOGUE */
        #catalogue-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .plant-card { 
            background: #0c0c0c; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #1a1a1a; 
            transition: 0.3s;
            cursor: pointer;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-5px); }
        .plant-card img { width: 100%; height: 150px; object-fit: cover; }
        .plant-info { padding: 12px; text-align: center; }
        .plant-info h3 { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        #loading { text-align: center; color: #4ade80; margin-top: 50px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-small">
        <button class="btn-logout" onclick="logout()">Quitter</button>
    </header>

    <h2>Catalogue Végétal</h2>

    <div id="loading">Recherche des spécimens...</div>
    <div id="catalogue-container"></div>

    <script>
        const API_URL = "https://eonia-api.santhimi.workers.dev";

        window.onload = async () => {
            const userEmail = localStorage.getItem('user_email');
            
            // Si pas d'email, on renvoie à l'accueil
            if (!userEmail) { window.location.href = "index.html"; return; }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                const plants = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                renderCatalogue(plants);
            } catch (e) {
                document.getElementById('loading').innerText = "Erreur de connexion au catalogue.";
                console.error(e);
            }
        };

        function renderCatalogue(plants) {
            const container = document.getElementById('catalogue-container');
            container.innerHTML = "";

            if (!plants || plants.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; opacity:0.5;'>Aucune plante trouvée.</p>";
                return;
            }

            plants.forEach(p => {
                const card = document.createElement('div');
                card.className = 'plant-card';
                
                // CRUCIAL : On passe l'ID Notion de la plante pour la page jardin
                card.onclick = () => {
                    window.location.href = `jardin.html?id_botanique=${p.id}`;
                };

                card.innerHTML = `
                    <img src="${p.Photo || 'https://via.placeholder.com/300x300?text=EONIA'}" alt="${p["Nom commun"]}">
                    <div class="plant-info">
                        <h3>${p["Nom commun"] || "Spécimen"}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

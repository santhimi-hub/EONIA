<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { text-align: center; padding: 40px 20px 20px 20px; }
        .logo-main { width: 80px; margin-bottom: 15px; opacity: 0.9; }
        .brand-title { font-weight: 300; text-transform: uppercase; letter-spacing: 8px; color: #fff; font-size: 2rem; margin: 0; }
        #page-title { font-size: 0.7rem; color: #4ade80; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }

        .client-nav { display: none; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .nav-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 7px 15px; border-radius: 20px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 1px; transition: 0.3s; font-family: 'Raleway'; }
        .nav-btn.active { border-color: #4ade80; color: #4ade80; background: rgba(74, 222, 128, 0.05); }

        .controls-area { max-width: 1000px; margin: 0 auto 20px auto; padding: 0 15px; text-align: center; }
        .search-input { 
            width: 100%; max-width: 350px; padding: 10px; background: #0c0c0c; border: 1px solid #1a1a1a; 
            border-radius: 50px; color: #fff; font-family: 'Raleway'; outline: none; 
            text-align: center; margin-bottom: 15px; font-size: 0.8rem;
        }

        .filter-nav { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .f-btn { background: none; border: 1px solid #1a1a1a; color: #555; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.5rem; text-transform: uppercase; transition: 0.3s; }
        .f-btn.active { border-color: #4ade80; color: #4ade80; }

        .letter-divider { 
            grid-column: 1 / -1; font-size: 1.2rem; color: #4ade80; 
            border-bottom: 1px solid rgba(74, 222, 128, 0.15); margin: 25px 0 10px 5px; 
            padding-bottom: 5px; font-weight: 200; letter-spacing: 6px; text-align: left;
        }

        .catalog-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; max-width: 1000px; margin: 0 auto; padding: 15px; 
        }

        .plant-card { 
            background: #0c0c0c; border-radius: 12px; overflow: hidden; 
            border: 1px solid #1a1a1a; 
            transition: transform 0.3s ease, border-color 0.3s ease; 
            cursor: pointer;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-4px); }

        .img-container { width: 100%; height: 130px; overflow: hidden; background: #000; }
        .plant-img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(0.5) brightness(0.7); 
            transition: filter 0.5s ease, transform 0.5s ease;
        }
        .plant-card:hover .plant-img { filter: grayscale(0) brightness(1.1); transform: scale(1.08); }

        .plant-info { padding: 10px 5px; text-align: center; }
        .plant-name { font-size: 0.65rem; color: #eee; text-transform: uppercase; letter-spacing: 1px; line-height: 1.3; }

        /* BOUTON QUITTER VISIBLE */
        .logout-btn { 
            display: block; margin: 50px auto 80px auto; background: none; 
            border: 1px solid rgba(255,255,255,0.2); color: #888; 
            padding: 10px 25px; border-radius: 30px; cursor: pointer; 
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .logout-btn:hover { border-color: #ff4f4f; color: #ff4f4f; }

        /* BULL IA ÉONIA */
        #eonia-ai-trigger { 
            position: fixed; bottom: 25px; right: 25px; z-index: 2000; 
            cursor: pointer; display: flex; align-items: center; transition: 0.3s; 
        }
        .ai-icon-circle { 
            width: 50px; height: 50px; background: #fff; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.3); border: 1px solid #4ade80; transition: 0.3s;
        }
        .ai-tooltip { 
            background: #111; color: #4ade80; padding: 7px 14px; border-radius: 20px; 
            font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; 
            margin-right: 10px; border: 1px solid #1a1a1a; opacity: 0; 
            transition: 0.4s; pointer-events: none; font-weight: 700; white-space: nowrap;
            transform: translateX(10px);
        }
        #eonia-ai-trigger:hover .ai-tooltip { opacity: 1; transform: translateX(0); }
        #eonia-ai-trigger:hover .ai-icon-circle { transform: scale(1.1); }

        @media (max-width: 400px) {
            .catalog-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .img-container { height: 110px; }
            #eonia-ai-trigger { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA Logo" class="logo-main">
        <h1 class="brand-title">ÉONIA</h1>
        <p id="page-title">Notre Collection</p>
    </header>

    <div id="client-menu" class="client-nav">
        <button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">Notre Collection</button>
        <button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">Mon Jardin</button>
    </div>

    <div class="controls-area">
        <input type="text" id="searchBox" class="search-input" placeholder="RECHERCHER..." oninput="renderGrid()">
        <div id="filter-container" class="filter-nav">
            <button class="f-btn active" onclick="setFilter('all', this)">Tout</button>
            <button class="f-btn" onclick="setFilter('Fruitier', this)">Fruitiers</button>
            <button class="f-btn" onclick="setFilter('Arbre', this)">Arbres</button>
            <button class="f-btn" onclick="setFilter('Fleur', this)">Fleurs</button>
        </div>
    </div>

    <div id="status-msg">Synchronisation...</div>
    <div id="catalogue-grid" class="catalog-container"></div>

    <button class="logout-btn" onclick="logout()">Quitter la session</button>

    <div id="eonia-ai-trigger" onclick="ouvrirChatIA()">
        <span class="ai-tooltip">Expert Éonia</span>
        <div class="ai-icon-circle">
            <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" style="width: 22px; filter: invert(1);" alt="IA">
        </div>
    </div>

<script>
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    let currentView = 'catalogue'; 
    let allPlants = []; 
    let activeFilter = 'all';

    if (!userEmail) { window.location.href = "index.html"; }
    if (userEmail !== 'invite@eonia.com') { document.getElementById('client-menu').style.display = 'flex'; }

    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function loadData() {
        const statusMsg = document.getElementById('status-msg');
        statusMsg.style.display = 'block';
        statusMsg.innerText = "Synchronisation...";

        const emailToSend = (currentView === 'catalogue') ? 'invite@eonia.com' : userEmail;
        document.getElementById('page-title').innerText = (currentView === 'catalogue') ? "Notre Collection" : "Mon Jardin";

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailToSend, pin: userPin }) 
            });
            allPlants = await response.json();
            renderGrid();
        } catch (error) {
            statusMsg.innerText = "Erreur de connexion.";
        }
    }

    function renderGrid() {
        const container = document.getElementById('catalogue-grid');
        const statusMsg = document.getElementById('status-msg');
        const searchVal = document.getElementById('searchBox').value.toLowerCase();
        container.innerHTML = "";

        let filtered = allPlants.filter(p => {
            const nom = (p["Nom commun"] || "").toLowerCase();
            return nom.includes(searchVal) && (activeFilter === 'all' || p.Type === activeFilter);
        });

        filtered.sort((a, b) => (a["Nom commun"] || "").localeCompare(b["Nom commun"] || ""));

        if (filtered.length === 0) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = "Aucun résultat.";
            return;
        }

        statusMsg.style.display = 'none';
        let lastLetter = "";

        filtered.forEach(p => {
            const nom = p["Nom commun"] || "Spécimen";
            const currentLetter = nom[0].toUpperCase();

            if (currentView === 'catalogue' && currentLetter !== lastLetter) {
                const divider = document.createElement('div');
                divider.className = "letter-divider";
                divider.innerText = currentLetter;
                container.appendChild(divider);
                lastLetter = currentLetter;
            }

            const card = document.createElement('div');
            card.className = "plant-card";
            card.onclick = () => {
                const param = (currentView === 'jardin') ? `id=${p["ID_Plaque"]}` : `id_botanique=${p.id}`;
                window.location.href = `jardin.html?${param}`;
            };
            card.innerHTML = `
                <div class="img-container">
                    <img src="${p.Photo}" class="plant-img" onerror="this.src='https://via.placeholder.com/400?text=Indisponible'">
                </div>
                <div class="plant-info">
                    <div class="plant-name">${nom}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function setFilter(type, btn) {
        activeFilter = type;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    function switchView(view) {
        currentView = view;
        document.getElementById('btn-col').classList.toggle('active', view === 'catalogue');
        document.getElementById('btn-jar').classList.toggle('active', view === 'jardin');
        loadData();
    }

    function ouvrirChatIA() {
        alert("L'Expert ÉONIA : Je suis à votre écoute pour toute question botanique générale sur la collection.");
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    loadData();
</script>
</body>
</html>

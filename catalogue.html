<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; }
        .container { padding: 40px 20px; max-width: 1000px; margin: auto; }
        
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 5px; color: #4ade80; text-align: center; margin-bottom: 40px; }
        
        /* Grille de plantes */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        
        .card { 
            background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; 
            transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .card:hover { border-color: #4ade80; transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; opacity: 0.8; }
        .card-info { padding: 15px; }
        .card-name { display: block; font-size: 1rem; text-transform: uppercase; color: #4ade80; }
        .card-sci { font-size: 0.8rem; font-style: italic; color: #666; }

        #loader { text-align: center; color: #4ade80; padding: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Catalogue ÉONIA</h1>
        <div id="loader">Chargement de la collection...</div>
        <div id="catalogue-grid" class="grid"></div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    window.onload = async () => {
        const role = localStorage.getItem('user_role') || 'public';
        const email = localStorage.getItem('user_email') || '';

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // On envoie le rôle pour que le Worker sache quoi filtrer
                body: JSON.stringify({ 
                    action: "get_catalogue", 
                    role: role,
                    email: email 
                })
            });

            const plantes = await res.json();
            document.getElementById('loader').style.display = 'none';

            if (!plantes || plantes.length === 0) {
                document.getElementById('loader').innerHTML = "Aucune plante disponible dans cette section.";
                document.getElementById('loader').style.display = 'block';
                return;
            }

            const grid = document.getElementById('catalogue-grid');
            plantes.forEach(p => {
                const card = document.createElement('a');
                card.className = 'card';
                // On redirige vers la fiche avec l'ID (ou l'ID de référence catalogue)
                card.href = `jardin.html?id=${p.id}`; 
                
                card.innerHTML = `
                    <img src="${p.Photo || 'placeholder.jpg'}">
                    <div class="card-info">
                        <span class="card-name">${p["Nom commun"]}</span>
                        <span class="card-sci">${p["Nom scientifique"] || ''}</span>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (e) {
            document.getElementById('loader').innerText = "Erreur : Impossible de charger le catalogue.";
        }
    };
</script>
</body>
</html>

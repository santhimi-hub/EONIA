<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Le Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    
    <script>
        // Sécurité au chargement
        const access = localStorage.getItem('eonia_access');
        if (!access) {
            window.location.href = "index.html";
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; padding-bottom: 50px; text-align: center; }
        
        header { text-align: center; padding: 65px 20px 45px 20px; }
        .logo-img { width: 60px; margin-bottom: 25px; opacity: 0.9; }
        .brand-title { font-weight: 200; text-transform: uppercase; letter-spacing: 12px; color: #ffffff; font-size: 1.9rem; margin-bottom: 10px; }
        .sub-title { font-weight: 500; text-transform: uppercase; letter-spacing: 6px; color: #4ade80; font-size: 0.65rem; margin-bottom: 20px; }
        .separator { width: 20px; height: 1px; background: #444; margin: 0 auto 20px auto; }
        .instruction { font-size: 0.5rem; color: #555; text-transform: uppercase; letter-spacing: 3px; }

        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }

        .plant-card {
            background: #0c0c0c;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.4s ease;
        }
        .plant-card:hover { border-color: #4ade80; transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; background: #111; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .plant-card:hover .plant-img { scale: 1.05; }
        
        .plant-info { padding: 20px; }
        .plant-name { font-size: 0.95rem; font-weight: 500; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; color: #eee; }
        .plant-famille { color: #4ade80; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        #status-msg { padding: 60px; color: #4ade80; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .logout-btn { background: none; border: 1px solid #222; color: #444; padding: 12px 25px; border-radius: 50px; font-size: 0.6rem; margin-top: 60px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .logout-btn:hover { border-color: #ef4444; color: #ef4444; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA Logo" class="logo-img">
        <h1 class="brand-title">ÉONIA</h1>
        <h2 class="sub-title">Collection Végétale</h2>
        <div class="separator"></div>
        <p class="instruction">Sélectionnez un sujet pour découvrir son histoire</p>
    </header>

    <div id="status-msg">Chargement du catalogue...</div>
    
    <div id="catalogue-grid" class="catalog-container"></div>

    <button class="logout-btn" onclick="logout()">Quitter la session</button>

    <script>
const API_URL = "https://eonia-api.santhimi.workers.dev";

async function loadCatalogue() {
    const container = document.getElementById('catalogue-grid');
    const statusMsg = document.getElementById('status-msg');
    const userEmail = localStorage.getItem('user_email') || "invite@eonia.com";
    
    // On vérifie si on est en mode "Configuration de plaque"
    const params = new URLSearchParams(window.location.search);
    const configPlaqueId = params.get('config'); 

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail }) 
        });

        let plants = await response.json();
        container.innerHTML = "";

        plants.forEach(p => {
            const name = p["Nom commun"] || "Spécimen";
            const image = p["Photo"] || "https://via.placeholder.com/400?text=EONIA";
            
            const card = document.createElement('div');
            card.className = "plant-card";
            
            // HTML de la carte
            let cardHTML = `
                <div class="img-container">
                    <img src="${image}" class="plant-img" loading="lazy">
                </div>
                <div class="plant-info">
                    <div class="plant-name">${name}</div>
                </div>
            `;

            // SI MODE CONFIG : On ajoute le bouton d'installation
            if (configPlaqueId) {
                cardHTML += `
                    <button onclick="installerPlante('${p.id}', '${configPlaqueId}')" 
                            style="width:100%; padding:10px; background:#4ade80; border:none; color:#000; font-weight:bold; cursor:pointer; text-transform:uppercase; font-size:0.7rem;">
                        Installer sur ma plaque
                    </button>`;
            } else {
                // MODE VITRINE : Lien normal vers la fiche
                card.style.cursor = "pointer";
                card.onclick = () => { window.location.href = `jardin.html?id_botanique=${p.id}`; };
            }

            card.innerHTML = cardHTML;
            container.appendChild(card);
        });

        statusMsg.style.display = 'none';

    } catch (error) {
        statusMsg.innerText = "Erreur de chargement.";
    }
}

// FONCTION POUR LIER LA PLANTE À LA PLAQUE DANS NOTION
async function installerPlante(plantePageId, plaqueId) {
    const userEmail = localStorage.getItem('user_email');
    if (!confirm("Confirmer l'installation de cette variété sur votre plaque ?")) return;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: "associer_plante",
                id: plaqueId,
                plantePageId: plantePageId,
                email: userEmail
            })
        });

        const res = await response.json();
        if (res.success) {
            alert("Plaque configurée avec succès !");
            window.location.href = `jardin.html?id=${plaqueId}`;
        } else {
            alert("Erreur lors de l'association.");
        }
    } catch (e) {
        alert("Erreur réseau.");
    }
}

loadCatalogue();
</script>

</body>
</html>

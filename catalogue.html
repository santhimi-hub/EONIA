<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Collection & Jardin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; padding-top: 60px; }
        
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: flex; justify-content: flex-end; align-items: center; padding: 0 20px; z-index: 3000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logout-header-btn { background: none; border: 1px solid #4ade80; color: #4ade80; padding: 6px 16px; border-radius: 20px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; }
        
        header { text-align: center; padding: 30px 20px 20px 20px; }
        .logo-main { width: 70px; margin-bottom: 15px; opacity: 0.9; }
        .brand-title { font-weight: 300; text-transform: uppercase; letter-spacing: 8px; font-size: 2.1rem; }
        #page-title { font-size: 0.7rem; color: #4ade80; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; }

        .controls-area { max-width: 1000px; margin: 0 auto 20px auto; padding: 0 15px; text-align: center; }
        .search-input { width: 100%; max-width: 350px; padding: 12px; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 50px; color: #fff; text-align: center; margin-bottom: 15px; }

        .filter-nav { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .f-btn { background: none; border: 1px solid #1a1a1a; color: #555; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.5rem; text-transform: uppercase; }
        .f-btn.active { border-color: #4ade80; color: #4ade80; }

        .catalog-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .plant-card { background: #0c0c0c; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; position: relative; }
        .img-container { width: 100%; height: 145px; overflow: hidden; }
        .plant-img { width: 100%; height: 100%; object-fit: cover; }
        .plant-info { padding: 12px 5px; text-align: center; }
        .plant-name { font-size: 0.65rem; color: #bbb; text-transform: uppercase; }
        .fav-star { position: absolute; top: 8px; right: 8px; font-size: 14px; color: #555; cursor: pointer; z-index: 5; }
        .fav-star.active { color: #4ade80; }

        /* IA ÉONIA BULLE */
        #ai-bubble { position: fixed; bottom: 25px; right: 25px; background: #000; border: 1px solid #4ade80; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; }
        #ai-window { position: fixed; bottom: 95px; right: 20px; width: 320px; max-width: 85vw; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 15px; display: none; flex-direction: column; overflow: hidden; z-index: 4000; }
        #ai-header { background: #1a1a1a; padding: 12px; font-size: 0.7rem; color: #4ade80; text-transform: uppercase; }
        #ai-messages { height: 250px; overflow-y: auto; padding: 15px; font-size: 0.8rem; color: #ccc; }
        .ai-msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 10px; background: #161616; width: fit-content; max-width: 90%; }
        .user-msg { background: #4ade80; color: #000; margin-left: auto; }
        
        /* CONTENEUR INPUT IA + MICRO */
        .ai-input-area { display: flex; background: #000; border-top: 1px solid #1a1a1a; align-items: center; padding-right: 10px; }
        #ai-input { flex: 1; background: transparent; border: none; padding: 15px; color: #fff; outline: none; }
        #ai-mic-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; filter: grayscale(1); transition: 0.3s; }
        #ai-mic-btn.active { filter: grayscale(0); transform: scale(1.2); }
    </style>
</head>

<body>

<div class="top-bar">
    <button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>

<header>
    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">
    <h1 class="brand-title">ÉONIA</h1>
    <p id="page-title">Chargement...</p>
</header>

<div class="controls-area">
    <input type="text" id="searchBox" class="search-input" placeholder="RECHERCHER..." oninput="renderGrid()">

    <div class="filter-nav">
        <button class="f-btn active" onclick="setFilter('all', this)">Tout</button>
        <button class="f-btn" onclick="setFilter('Fruitier', this)">Fruitiers</button>
        <button class="f-btn" onclick="setFilter('Arbre', this)">Arbres</button>
        <button class="f-btn" onclick="setFilter('Fleur', this)">Fleurs</button>
        <button class="f-btn" onclick="setFilter('fav', this)">Favoris ★</button>
    </div>
</div>

<div id="status-msg" style="text-align:center;color:#4ade80;font-size:0.7rem;margin-top:20px;">Synchronisation...</div>
<div id="catalogue-grid" class="catalog-container"></div>

<div id="ai-bubble" onclick="toggleAI()">🍃</div>

<div id="ai-window">
    <div id="ai-header">Assistant ÉONIA</div>
    <div id="ai-messages"></div>
    <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Posez une question..." onkeypress="if(event.key==='Enter') handleAI()">
        <button id="ai-mic-btn" onclick="startAIMic()">🎙️</button>
    </div>
</div>

<script>
const API_URL = "https://eonia-api.santhimi.workers.dev";
const userEmail = localStorage.getItem('user_email');
let allPlants = [];
let activeFilter = 'all';
let favorites = JSON.parse(localStorage.getItem("eonia_fav") || "[]");

if (!userEmail) logout();

// --- MICRO DÉDIÉ À L'IA ---
function startAIMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Micro non supporté");

    const recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    const btn = document.getElementById("ai-mic-btn");
    
    btn.classList.add("active");
    recognition.start();

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('ai-input').value = transcript;
        handleAI(); // On lance l'IA direct après avoir parlé
    };

    recognition.onend = () => btn.classList.remove("active");
}

function handleAI() {
    const input = document.getElementById('ai-input');
    const query = input.value.toLowerCase().trim();
    if(!query) return;

    addMessage(input.value, 'user-msg');
    input.value = "";

    setTimeout(() => {
        let results = allPlants.filter(p => {
            const nom = (p["Nom commun"] || "").toLowerCase();
            const desc = (p.Description || "").toLowerCase();
            const type = (p.Type || "").toLowerCase();
            const expo = (p.Exposition || "").toLowerCase();
            
            return nom.includes(query) || desc.includes(query) || type.includes(query) || expo.includes(query);
        });

        let response = "";
        if (results.length > 0) {
            response = `🌿 J'ai trouvé ${results.length} plante(s). Je filtre votre catalogue !`;
            document.getElementById("searchBox").value = query;
            renderGrid();
        } else {
            response = "🌿 Je n'ai pas trouvé de plante spécifique. Essayez 'soleil', 'fruitier' ou 'fleur'.";
        }
        addMessage(response, "ai-msg");
    }, 500);
}

function addMessage(txt, cls) {
    const msgBox = document.getElementById('ai-messages');
    const div = document.createElement('div');
    div.className = `ai-msg ${cls}`;
    div.innerText = txt;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
}

function toggleAI() {
    const win = document.getElementById('ai-window');
    win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
}

function renderGrid() {
    const container = document.getElementById('catalogue-grid');
    const search = document.getElementById('searchBox').value.toLowerCase();
    container.innerHTML = "";
    
    const filtered = allPlants.filter(p => {
        const matchSearch = (p["Nom commun"] || "").toLowerCase().includes(search);
        const id = p.id || p.ID_Plaque;
        const matchFilter = (activeFilter === 'all') || (activeFilter === 'fav' && favorites.includes(id)) || (p.Type === activeFilter);
        return matchSearch && matchFilter;
    });

    filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = "plant-card";
        card.innerHTML = `<div class="img-container"><img src="${p.Photo || ''}" class="plant-img"></div><div class="plant-info"><div class="plant-name">${p["Nom commun"]}</div></div>`;
        card.onclick = () => window.location.href = `jardin.html?id=${p.id || p.ID_Plaque}`;
        container.appendChild(card);
    });
    document.getElementById('status-msg').style.display = "none";
}

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

function loadData() {
    fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: userEmail}) })
    .then(r => r.json()).then(data => { allPlants = data; renderGrid(); });
}

function logout() { localStorage.clear(); window.location.href = "index.html"; }

loadData();
</script>
</body>
</html>

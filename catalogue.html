<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* TES STYLES CONSERVÉS */
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body, html { height: 100%; font-family: 'Raleway',sans-serif; background: #000; color: #fff; scroll-behavior:smooth; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('background.jpg') center/cover no-repeat; }
        .logo-main { width: 120px; margin-bottom: 25px; }
        .brand-title { font-size: 4rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: #ffffff; margin: 0; line-height: 1; }
        .tagline { font-style: italic; font-weight: 400; font-size: 0.9rem; color: #ffffff; margin-top: 35px; margin-bottom: 45px; }
        .auth-container { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { width: 100%; padding: 14px; border-radius: 8px; border: none; background: rgba(255,255,255,0.15); color: white; outline: none; font-family: 'Raleway', sans-serif; }
        .btn-main { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-main:hover { background: #4ade80; }
        .forgot-pass { font-size: 0.7rem; color: rgba(255,255,255,0.6); text-decoration: none; margin-top: 5px; }
        .bottom-nav { margin-top: 40px; font-size: 0.8rem; }
        .bottom-nav a { color: #ccc; text-decoration: none; margin: 0 10px; border-bottom: 1px solid transparent; transition: 0.3s; }
        .bottom-nav a:hover { border-bottom: 1px solid #4ade80; color: #fff; }
        .content-section { padding: 100px 30px; text-align: center; background: #050505; }
        .content-section h2 { color: #4ade80; font-weight: 300; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; font-size: 1.5rem; }
        .content-section p { max-width: 600px; margin: 0 auto; line-height: 1.8; color: #bbb; }
        @media (max-width: 600px) { .brand-title { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA" class="logo-main">
        <h1 class="brand-title">ÉONIA</h1>
        <p class="tagline">Bienvenue dans votre mémoire végétale.</p>
        <div class="auth-container">
            <input type="email" placeholder="Votre Email" id="email">
            <input type="password" placeholder="Votre mot de passe" id="pass">
            <button class="btn-main" onclick="validerConnexion()">ENTRER</button>
            <a href="#" class="forgot-pass">Mot de passe oublié ?</a>
        </div>
        <div class="bottom-nav">
            <a href="#" onclick="accesInvite()">Visiter en tant qu'invité</a>
            <span>|</span>
            <a href="#concept">Notre Concept</a>
        </div>
    </div>
    <section class="content-section" id="concept">
        <h2>Notre Concept</h2>
        <p>ÉONIA fusionne l'élégance du support et la puissance du numérique.</p>
    </section>

<script>
    function validerConnexion() {
        const mail = document.getElementById('email').value.toLowerCase().trim();
        const pass = document.getElementById('pass').value.trim();
        if(!mail || !pass) { alert("Identifiants requis"); return; }
        
        localStorage.setItem('user_email', mail);
        localStorage.setItem('eonia_access', 'client');
        window.location.href = "catalogue.html";
    }

    function accesInvite() {
        localStorage.setItem('user_email', 'invite@eonia.com');
        localStorage.setItem('eonia_access', 'guest');
        window.location.href = "catalogue.html";
    }
</script>
</body>
</html>

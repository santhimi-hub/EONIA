<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉONIA — Collection & Conseil</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>

/* BASE */

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
min-height:100vh;
padding-top:60px;
}


/* BARRE HAUTE */

.top-bar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(15px);
display:flex;
justify-content:flex-end;
align-items:center;
padding:0 20px;
z-index:3000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logout-header-btn{
background:none;
border:1px solid #4ade80;
color:#4ade80;
padding:6px 16px;
border-radius:20px;
font-size:0.6rem;
cursor:pointer;
}

.logout-header-btn:hover{
background:#4ade80;
color:#000;
}


/* HEADER */

header{
text-align:center;
padding:30px 20px 20px 20px;
}

.logo-main{
width:70px;
margin-bottom:15px;
}

.brand-title{
letter-spacing:8px;
font-weight:300;
font-size:2.1rem;
}

#page-title{
font-size:0.7rem;
color:#4ade80;
margin-top:8px;
letter-spacing:3px;
}


/* NAV */

.client-nav{
display:none;
justify-content:center;
gap:12px;
margin:20px;
}

.nav-btn{
background:none;
border:1px solid rgba(255,255,255,0.15);
color:#fff;
padding:7px 15px;
border-radius:20px;
cursor:pointer;
font-size:0.6rem;
}

.nav-btn.active{
border-color:#4ade80;
color:#4ade80;
}


/* SEARCH */

.controls-area{
text-align:center;
margin-bottom:20px;
}

.search-input{
width:100%;
max-width:350px;
padding:12px;
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:50px;
color:#fff;
text-align:center;
}


/* GRID */

.catalog-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
padding:20px;
}

.letter-divider{
grid-column:1/-1;
color:#4ade80;
margin:20px 0;
letter-spacing:5px;
}


.plant-card{
background:#0c0c0c;
border-radius:12px;
overflow:hidden;
border:1px solid #1a1a1a;
cursor:pointer;
}

.plant-card:hover{
border-color:#4ade80;
transform:translateY(-5px);
}


.img-container{
height:145px;
overflow:hidden;
}

.plant-img{
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(0.6);
}

.plant-info{
padding:12px;
text-align:center;
}

.plant-name{
font-size:0.65rem;
color:#bbb;
}


/* BULLE IA */

#eonia-ai-trigger{
position:fixed;
bottom:30px;
right:25px;
z-index:2000;
cursor:pointer;
display:flex;
align-items:center;
}

.ai-icon-circle{
width:50px;
height:50px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #4ade80;
}

.ai-tooltip{
background:#111;
color:#4ade80;
padding:8px 16px;
border-radius:20px;
font-size:0.6rem;
margin-right:12px;
opacity:0;
transition:.3s;
}

#eonia-ai-trigger:hover .ai-tooltip{
opacity:1;
}

#ai-chat-window{
display:none;
position:fixed;
bottom:95px;
right:25px;
width:320px;
height:450px;
background:#0c0c0c;
border:1px solid #4ade80;
border-radius:15px;
flex-direction:column;
z-index:3000;
}

</style>

</head>

<body>

<div class="top-bar">
<button class="logout-header-btn" onclick="logout()">Quitter</button>
</div>


<header>

<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">

<h1 class="brand-title">ÉONIA</h1>

<p id="page-title">Notre Collection</p>

</header>



<div id="client-menu" class="client-nav">

<button id="btn-col" class="nav-btn active" onclick="switchView('catalogue')">

Notre Collection

</button>

<button id="btn-jar" class="nav-btn" onclick="switchView('jardin')">

Mon Jardin

</button>

</div>



<div class="controls-area">

<input type="text" id="searchBox" class="search-input" placeholder="RECHERCHER UNE ESSENCE..." oninput="renderGrid()">

</div>



<div id="status-msg" style="text-align:center;color:#4ade80;margin-top:20px">

Chargement...

</div>


<div id="catalogue-grid" class="catalog-container"></div>



<!-- IA -->

<div id="ai-chat-window"></div>


<div id="eonia-ai-trigger" onclick="toggleChat()">

<span class="ai-tooltip">Une question ?</span>

<div class="ai-icon-circle">

<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" style="width:22px">

</div>

</div>



<script>

const userEmail = localStorage.getItem('user_email');

const userPin = localStorage.getItem('user_pin');

let currentView="catalogue";

let allPlants=[];



if(!userEmail){

window.location.href="index.html";

}



if(userEmail!=="invite@eonia.com"){

document.getElementById("client-menu").style.display="flex";

}



const API_URL="https://eonia-api.santhimi.workers.dev";



async function loadData(){

const statusMsg=document.getElementById("status-msg");

statusMsg.style.display="block";



const emailToSend=

(currentView==="catalogue")

?"invite@eonia.com"

:userEmail;



document.getElementById("page-title").innerText=

(currentView==="catalogue")

?"Notre Collection"

:"Mon Jardin";



try{

const response=await fetch(API_URL,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

email:emailToSend,

pin:userPin

})

});



const data=await response.json();



allPlants=data.results || data || [];



renderGrid();



}catch(error){

statusMsg.innerText="Erreur connexion";

}

}



function renderGrid(){

const container=document.getElementById("catalogue-grid");

const statusMsg=document.getElementById("status-msg");

const search=document.getElementById("searchBox").value.toLowerCase();



container.innerHTML="";



let filtered=allPlants.filter(p=>{

const nom=(p["Nom commun"]||"").toLowerCase();

return nom.includes(search);

});



filtered.sort((a,b)=>

(a["Nom commun"]||"")

.localeCompare(b["Nom commun"]||"")

);



let lastLetter="";



filtered.forEach(p=>{

const nom=p["Nom commun"]||"Plante";



const letter=nom[0].toUpperCase();



if(letter!==lastLetter){

const divider=document.createElement("div");

divider.className="letter-divider";

divider.innerText=letter;

container.appendChild(divider);

lastLetter=letter;

}



const card=document.createElement("div");

card.className="plant-card";



card.onclick=()=>{

window.location.href="jardin.html?id="+p.id;

};



card.innerHTML=`

<div class="img-container">

<img src="${p.Photo}" class="plant-img">

</div>

<div class="plant-info">

<div class="plant-name">

${nom}

</div>

</div>

`;



container.appendChild(card);

});



statusMsg.style.display=

(filtered.length===0)

?"block"

:"none";

}



function switchView(view){

currentView=view;

loadData();

}



function toggleChat(){

const chat=document.getElementById("ai-chat-window");

chat.style.display=

(chat.style.display==="none")

?"flex"

:"none";

}



function logout(){

localStorage.clear();

window.location.href="index.html";

}



loadData();

</script>


</body>

</html>

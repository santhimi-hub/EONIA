<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }
        .container { padding: 20px; }
        
        /* TON LOGO PERSONNALISÉ */
        .logo-eonia {
            width: 150px; /* Taille de ton logo */
            height: auto;
            margin-bottom: 10px;
            animation: pulse 4s infinite;
        }

        h1 { font-size: 3rem; letter-spacing: 8px; font-weight: 300; margin-bottom: 10px; }
        p { font-size: 1rem; margin-bottom: 40px; opacity: 0.8; font-style: italic; }

        .btn-entrer {
            background-color: white;
            color: #333;
            padding: 15px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid white;
            transition: all 0.3s;
        }
        .btn-entrer:hover { background: transparent; color: white; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/santhimi-hub/EONIA/blob/main/file_00000000f43c7243819c00a508d83afc.png" alt="Logo Éonia" class="logo-eonia">
        <h1>ÉONIA</h1>
        <p>Bienvenue dans votre mémoire végétale.</p>
        <a href="jardin.html" class="btn-entrer">ENTRER</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Accès Privé</title>
    <style>
        :root { --accent: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #000; color: #fff; overflow: hidden; }

        /* FOND D'ÉCRAN */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
                        url('1000044205.jpg') center/cover no-repeat;
            z-index: -1;
        }

        .overlay { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* LOGO ÉONIA (Lien direct corrigé) */
        .logo-main { 
            width: 180px; 
            margin-bottom: 20px;
            filter: brightness(0) invert(1); /* Rend le logo blanc */
        }
        
        .brand { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; font-weight: 200; margin-bottom: 40px; }

        /* FORMULAIRE SÉCURISÉ */
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333;
            padding: 14px; border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%; background: #fff; color: #000; padding: 15px; border-radius: 50px;
            border: none; text-transform: uppercase; letter-spacing: 3px; font-weight: 800;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 0.8rem;
        }
        .btn-login:hover { background: var(--accent); transform: translateY(-2px); }

        .guest-link { margin-top: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.4); text-decoration: none; text-transform: uppercase; letter-spacing: 3px; }
        .tagline { font-size: 0.6rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="overlay">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA" class="logo-main">
        
        <h1 class="brand">ÉONIA</h1>
        <p class="tagline">Connecter le vivant</p>

        <div class="auth-card">
            <input type="email" id="email" placeholder="Email Propriétaire">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="login()">Entrer</button>
        </div>

        <a href="jardin.html?mode=guest&id=cerisier" class="guest-link">Visite Invité</a>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            if(email.includes('@')) {
                // Pour l'instant on redirige, Firebase viendra après pour la sécurité
                window.location.href = "jardin.html?mode=owner&id=cerisier";
            } else {
                alert("Veuillez entrer un email valide.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body, html { height: 100%; font-family: 'Raleway', sans-serif; background: #000; color: #fff; scroll-behavior: smooth; }
        
        /* RÉTABLISSEMENT DU FOND D'ÉCRAN */
        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            /* On remet ton image avec un dégradé sombre pour la lisibilité */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('background.jpg') center/cover no-repeat; 
        }

        .logo-main { width: 120px; margin-bottom: 25px; }
        .brand-title { font-size: 4rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: #ffffff; margin: 0; line-height: 1; }
        .tagline { font-style: italic; font-weight: 400; font-size: 0.9rem; color: #ffffff; margin: 35px 0 45px 0; }
        
        /* AUTHENTIFICATION */
        .auth-container { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            border: none; 
            background: rgba(255,255,255,0.15); 
            color: white; 
            outline: none; 
            font-family: 'Raleway', sans-serif; 
            text-align: center; 
            backdrop-filter: blur(5px); /* Petit effet de flou moderne sur les champs */
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .auth-footer { display: flex; justify-content: space-between; align-items: flex-start; padding: 0 4px; margin-top: -4px; }
        .helper-text { font-size: 0.6rem; color: #4ade80; line-height: 1.3; font-style: italic; text-align: left; max-width: 180px; }
        .pin-forgot { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-decoration: none; }

        .btn-main { 
            width: 100%; 
            padding: 14px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            margin-top: 5px; 
        }
        .btn-main:hover { background: #4ade80; transform: scale(1.02); }
        
        .link-order { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-decoration: none; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .bottom-nav { margin-top: 40px; font-size: 0.8rem; }
        .bottom-nav a { color: #ccc; text-decoration: none; margin: 0 10px; transition: 0.3s; }
        .bottom-nav a:hover { color: #4ade80; }
        
        /* SECTION CONCEPT */
        .content-section { padding: 100px 30px; text-align: center; background: #050505; }
        .content-section h2 { color: #4ade80; font-weight: 300; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; }
        .content-section p { max-width: 700px; margin: 0 auto; line-height: 1.8; color: #bbb; }

        @media (max-width: 600px) { .brand-title { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA" class="logo-main">
        <h1 class="brand-title">ÉONIA</h1>
        <p class="tagline">Bienvenue dans votre mémoire végétale.</p>

        <div class="auth-container">
            <input type="email" placeholder="Votre Email" id="email">
            <input type="number" placeholder="Code PIN" id="pin">
            
            <div class="auth-footer">
                <p class="helper-text" id="help-text">
                    </p>
                <a href="mailto:contact@eonia.com" class="pin-forgot">PIN oublié ?</a>
            </div>

            <button class="btn-main" id="btn-entrer" onclick="validerConnexion()">ENTRER</button>
            <a href="commander.html" class="link-order">Commander votre plaque</a>
        </div>

        <div class="bottom-nav">
            <a href="#" onclick="accesInvite()">Accès Invité</a>
            <span>|</span>
            <a href="#concept">Notre Concept</a>
        </div>
    </div>

    <section class="content-section" id="concept">
        <h2>Notre Concept</h2>
        <p>Éonia fusionne l'élégance du support et la puissance du numérique. Chaque plante a une histoire.</p>
    </section>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const plaqueId = urlParams.get('id');

    window.onload = () => {
        const help = document.getElementById('help-text');
        if (plaqueId) {
            document.getElementById('btn-entrer').innerText = "ACTIVER MA PLAQUE";
            help.innerHTML = "<strong>Plaque détectée :</strong> Connectez-vous pour l'associer.";
        } else {
            help.innerText = "Saisissez vos identifiants pour accéder à votre jardin.";
        }
    };

    function validerConnexion() {
        const mail = document.getElementById('email').value.toLowerCase().trim();
        const pin = document.getElementById('pin').value.trim();
        
        if(!mail || !pin) { alert("Email et PIN requis"); return; }

        // Mémorisation
        localStorage.setItem('user_email', mail);
        localStorage.setItem('user_pin', pin);
        
        // Redirection
        if (plaqueId) {
            window.location.href = "jardin.html?id=" + plaqueId;
        } else {
            window.location.href = "catalogue.html";
        }
    }

    function accesInvite() {
        localStorage.setItem('user_email', 'invite@eonia.com');
        localStorage.setItem('user_pin', '0000');
        window.location.href = "catalogue.html";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container { padding: 20px; animation: fadeIn 2s ease-out; }

        /* CONFIGURATION DE TON LOGO */
        .logo-eonia {
            width: 140px; /* Taille ajustable selon tes goûts */
            height: auto;
            margin-bottom: 20px;
            /* Si ton logo est blanc, on ajoute une petite lueur pour le faire ressortir */
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
            animation: pulse 4s infinite;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 10px;
            font-weight: 200;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 1rem;
            margin-bottom: 60px;
            font-weight: 300;
            font-style: 1px;
            opacity: 0.8;
        }

        .btn-entrer {
            background-color: rgba(255, 255, 0.9);
            color: #1a1a1a;
            padding: 16px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            display: inline-block;
            border: 2px solid white;
            transition: all 0.3s;
        }

        .btn-entrer:active {
            transform : scale(0.95);
            background-color: transparent;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/refs/heads/main/file_00000000f43c7243819c00a508d83afc.png" alt="Logo Éonia" class="logo-eonia">
        
        <h1>ÉONIA</h1>
        <p>Bienvenue dans votre mémoire végétale.</p>
        
        <a href="jardin.html" class="btn-entrer">ENTRER</a>
    </div>

</body>
</html>

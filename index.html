<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Image de fond nature - Tu peux changer le lien ici */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container { 
            padding: 20px; 
            animation: fadeIn 2s ease-out; /* Animation d'apparition douce */
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            font-weight: 300;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            font-style: italic;
            opacity: 0.9;
        }

        .btn-entrer {
            background-color: white;
            color: #333;
            padding: 15px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.9rem;
            display: inline-block;
            border: 2px solid white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- EFFET AU SURVOL (MOBILE & PC) --- */
        .btn-entrer:hover {
            background-color: transparent;
            color: white;
            transform: translateY(-5px); /* Le bouton monte */
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
        }

        .btn-entrer:active { 
            transform: scale(0.92); /* Effet d'écrasement quand on clique */
        }

        /* Animation d'apparition pour le texte */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .infinity-logo {
            font-size: 50px; 
            margin-bottom: 10px;
            display: block;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

        <div class="container">
        <span class="infinity-logo">♾️</span> 
        <h1>ÉONIA</h1>
        <p>Bienvenue dans votre mémoire végétale.</p>
        
        <a href="jardin.html" class="btn-entrer">ENTRER</a>
    </div>


</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        /* Fond forêt sombre */
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                    url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000');
        background-size: cover;
        background-position: center;
        color: white;
        text-align: center;
    }

    .container { 
        padding: 20px; 
        width: 100%;
        max-width: 400px;
    }

    .logo-eonia {
        width: 130px; 
        height: auto;
        margin-top: 60px; /* Descend le logo */
        margin-bottom: 20px;
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }

        h1 {
            font-size: 3.5rem; /* Taille un peu plus grande */
            letter-spacing: 2px; /* Espacement réduit (était à 10px) */
            font-weight: 800; /* Beaucoup plus gras */
            margin-bottom: 10px;
            text-transform: uppercase;
            /* Petit effet de relief pour que le gras ressorte bien sur la forêt */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }


    p {
        font-size: 1rem;
        margin-bottom: 60px;
        font-weight: 300;
        opacity: 0.8;
    }

    /* --- LE BOUTON CORRIGÉ (SANS JAUNE) --- */
    .btn-entrer {
        background-color: transparent; /* Fond vide */
        color: white; /* Texte blanc */
        padding: 16px 60px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 400;
        letter-spacing: 3px;
        font-size: 0.85rem;
        display: inline-block;
        border: 1px solid white; /* Bordure fine blanche */
        transition: all 0.4s ease;
        text-transform: uppercase;
    }

    /* Effet quand on passe la souris ou qu'on clique */
    .btn-entrer:hover, .btn-entrer:active {
        background-color: white; /* Le fond devient blanc */
        color: black; /* Le texte devient noir */
    }
</style>
</head>
<body>

    <div class="container">
        <img src="1000044201.png" alt="Logo Éonia" class="logo-eonia">
        
        <h1>ÉONIA</h1>
        <p>Bienvenue dans votre mémoire végétale.</p>
        
        <a href="jardin.html" class="btn-entrer">ENTRER</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body, html { height: 100%; font-family: 'Raleway',sans-serif; background: #000; color: #fff; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #000; }
        .logo-main { width: 120px; margin-bottom: 25px; }
        .brand-title { font-size: 3rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: #fff; margin: 0; }
        .tagline { font-style: italic; font-size: 0.9rem; color: #fff; margin: 20px 0 40px 0; }
        .auth-container { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { width: 100%; padding: 14px; border-radius: 8px; border: none; background: rgba(255,255,255,0.15); color: white; text-align: center; font-family: 'Raleway', sans-serif; }
        .btn-main { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; }
        .btn-main:hover { background: #4ade80; }
        .helper-text { font-size: 0.65rem; color: #4ade80; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA" class="logo-main">
        <h1 class="brand-title">ÉONIA</h1>
        <p class="tagline">Mémoire Végétale</p>

        <div class="auth-container">
            <input type="email" placeholder="Votre Email" id="email">
            <input type="number" placeholder="Code PIN (4 chiffres)" id="pin">
            <p id="help-text" class="helper-text"></p>
            <button class="btn-main" onclick="validerConnexion()">ENTRER</button>
            <a href="catalogue.html" style="color:#666; font-size:0.7rem; text-decoration:none; margin-top:10px;">Accès Catalogue Public</a>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const plaqueId = urlParams.get('id');

    if (plaqueId) {
        document.getElementById('help-text').innerText = "Plaque détectée. Connectez-vous pour l'activer.";
    }

    function validerConnexion() {
        const mail = document.getElementById('email').value.toLowerCase().trim();
        const pin = document.getElementById('pin').value.trim();
        
        if(!mail || !pin) { alert("Email et PIN requis"); return; }

        localStorage.setItem('user_email', mail);
        localStorage.setItem('user_pin', pin);
        
        // Redirection vers jardin avec l'ID de la plaque s'il existe
        if (plaqueId) {
            window.location.href = "jardin.html?id=" + plaqueId;
        } else {
            window.location.href = "catalogue.html";
        }
    }
</script>
</body>
</html>

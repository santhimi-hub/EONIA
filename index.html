<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 5px; color: #4ade80; margin-bottom: 30px; font-size: 1.5rem; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        input:focus { border-color: #4ade80; }
        button { width: 100%; padding: 15px; background: #4ade80; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status-msg { margin-top: 15px; font-size: 0.8rem; min-height: 1.2rem; }
        .error { color: #ef4444; }
        .success { color: #4ade80; }
        .links { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        a { color: #666; text-decoration: none; font-size: 0.75rem; transition: 0.3s; }
        a:hover { color: #4ade80; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>ÉONIA</h1>
        <input type="email" id="email-input" placeholder="Email" autocomplete="email">
        <input type="password" id="pass-input" placeholder="Mot de passe">
        
        <button id="login-btn" onclick="handleLogin()">SE CONNECTER</button>
        
        <div id="status-msg"></div>

        <div class="links">
            <a href="#" onclick="handleForgotPassword()">Mot de passe oublié ?</a>
        </div>
    </div>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function handleLogin() {
        const email = document.getElementById('email-input').value.toLowerCase().trim();
        const pass = document.getElementById('pass-input').value.trim();
        const btn = document.getElementById('login-btn');
        const status = document.getElementById('status-msg');

        if (!email || !pass) {
            status.innerHTML = '<span class="error">Veuillez remplir tous les champs.</span>';
            return;
        }

        btn.disabled = true;
        btn.innerText = "VÉRIFICATION...";
        status.innerText = "";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // On cherche le client dans la base Notion
            const user = data.results.find(p => {
                const props = p.properties;
                // On récupère l'email et le password avec sécurité
                const n_email = props["Client_Email"]?.email || "";
                const n_pass = props["Password"]?.rich_text?.[0]?.plain_text || 
                               props["Password"]?.title?.[0]?.plain_text || "";
                
                return n_email.toLowerCase().trim() === email && n_pass === pass;
            });

            if (user) {
                status.innerHTML = '<span class="success">Connexion réussie ! Redirection...</span>';
                localStorage.setItem('user_email', email);
                setTimeout(() => {
                    window.location.href = "catalogue.html";
                }, 1000);
            } else {
                status.innerHTML = '<span class="error">Email ou mot de passe incorrect.</span>';
                btn.disabled = false;
                btn.innerText = "SE CONNECTER";
            }

        } catch (e) {
            console.error(e);
            status.innerHTML = '<span class="error">Erreur de connexion au serveur.</span>';
            btn.disabled = false;
            btn.innerText = "SE CONNECTER";
        }
    }

    function handleForgotPassword() {
        const emailContact = "ton-email@domaine.com"; // REMPLACE PAR TON EMAIL
        window.location.href = `mailto:${emailContact}?subject=Mot de passe oublié ÉONIA&body=Bonjour, j'ai oublié mon mot de passe pour mon compte ÉONIA.`;
    }

    // Permet de valider avec la touche "Entrée"
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });
    </script>
</body>
</html>

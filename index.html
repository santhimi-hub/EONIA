<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA | Mémoire Végétale</title>

    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body, html {
            height:100%;
            font-family:'Raleway', sans-serif;
            background:#000;
            color:#fff;
            scroll-behavior:smooth;
        }

        .hero {
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.85)),
                url('background.jpg') center/cover no-repeat;
        }

        .logo-main {
            width:120px;
            margin-bottom:25px;
        }

        .brand-title {
            font-size:4rem;
            font-weight:300;
            letter-spacing:6px;
            text-transform:uppercase;
        }

        .tagline {
            font-style:italic;
            font-size:0.9rem;
            color:rgba(255,255,255,0.8);
            margin-top:30px;
            margin-bottom:40px;
        }

        .auth-container {
            display:flex;
            flex-direction:column;
            gap:12px;
            width:280px;
        }

        input {
            width:100%;
            padding:14px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.1);
            color:white;
            text-align:center;
            outline:none;
        }

        input:focus {
            border-color:#4ade80;
        }

        .auth-footer {
            display:flex;
            justify-content:space-between;
            font-size:0.6rem;
            color:#aaa;
        }

        .btn-main {
            padding:14px;
            background:#fff;
            color:#000;
            border:none;
            border-radius:50px;
            cursor:pointer;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:2px;
        }

        .btn-main:hover {
            background:#4ade80;
        }

        .bottom-nav {
            margin-top:30px;
            display:flex;
            gap:20px;
        }

        .bottom-nav a {
            color:#4ade80;
            text-decoration:none;
            font-size:0.7rem;
        }

        /* 👁️ PIN WRAPPER */
        .pin-wrapper {
            position:relative;
        }

        .eye {
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:14px;
            color:#aaa;
            user-select:none;
        }

        #activation-help {
            display:none;
            font-size:0.55rem;
            color:#4ade80;
        }
    </style>
</head>

<body>

<main class="hero">

    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">

    <h1 class="brand-title">ÉONIA</h1>
    <p class="tagline">Bienvenue dans votre mémoire végétale.</p>

    <div class="auth-container">

        <input type="email" id="email" placeholder="Email" autocomplete="email">

        <div class="pin-wrapper">
            <input type="password" id="pin" placeholder="Code PIN" maxlength="4" inputmode="numeric">

            <!-- 👁️ OEIL -->
            <span class="eye" onclick="togglePin()">👁️</span>
        </div>

        <div class="auth-footer">
            <p id="activation-help">Saisissez votre PIN ou activez votre plaque.</p>
            <a href="mailto:contact@eonia.com">PIN oublié ?</a>
        </div>

        <button class="btn-main" id="btn-entrer" onclick="validerConnexion()">ENTRER</button>

    </div>

    <nav class="bottom-nav">
        <a href="#" onclick="accesInvite()">Accès Invité</a>
        <a href="#concept">Le Concept</a>
    </nav>

</main>

<script>

const WORKER_URL = "https://eonia-api.santhimi.workers.dev/";
const urlParams = new URLSearchParams(window.location.search);
const plaqueEnAttente = urlParams.get('id');

// 👁️ SHOW/HIDE PIN
function togglePin() {
    const pin = document.getElementById("pin");
    pin.type = pin.type === "password" ? "text" : "password";
}

window.onload = () => {
    if (plaqueEnAttente) {
        document.getElementById('btn-entrer').innerText = "ACTIVER MA PLAQUE";
        document.getElementById('activation-help').style.display = "block";
    }
};

// ENTER KEY
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') validerConnexion();
});

// 🔐 LOGIN OPTIMISÉ
async function validerConnexion() {

    const btn = document.getElementById('btn-entrer');
    const mail = document.getElementById('email').value.toLowerCase().trim();
    const pin = document.getElementById('pin').value.trim();

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailRegex.test(mail)) {
        alert("Email invalide");
        return;
    }

    if (!/^\d{4}$/.test(pin)) {
        alert("PIN doit contenir 4 chiffres");
        return;
    }

    // ⚡ CACHE LOCAL (ultra rapide)
    if (localStorage.getItem('user_email') === mail &&
        localStorage.getItem('user_pin') === pin) {
        redirectUser();
        return;
    }

    btn.innerText = "VÉRIFICATION...";
    btn.disabled = true;

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: mail, pin: pin }),
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) throw new Error();

        localStorage.setItem('user_email', mail);
        localStorage.setItem('user_pin', pin);
        localStorage.setItem('eonia_access', 'client');

        redirectUser();

    } catch (e) {
        alert("Connexion impossible ou PIN incorrect");
        btn.innerText = "ENTRER";
        btn.disabled = false;
    }
}

// 🔁 REDIRECTION
function redirectUser() {
    if (plaqueEnAttente) {
        window.location.href = "jardin.html?id=" + plaqueEnAttente;
    } else {
        window.location.href = "catalogue.html";
    }
}

// 👤 INVITÉ
function accesInvite() {
    localStorage.clear();
    localStorage.setItem('user_email', 'invite@eonia.com');
    localStorage.setItem('user_pin', '0000');
    localStorage.setItem('eonia_access', 'guest');
    window.location.href = "catalogue.html";
}

</script>

</body>
</html>

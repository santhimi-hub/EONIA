<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Accès Propriétaire</title>
    <style>
        :root { --accent: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #000; }

        /* FOND FORÊT LUMINEUSE */
        .hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2000') center/cover no-repeat;
            z-index: -1;
        }

        .overlay {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        .logo-main {
            width: 160px;
            filter: brightness(0) invert(1);
            margin-bottom: 10px;
        }

        .brand-title {
            font-size: 2.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 200;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* BLOC DE CONNEXION */
        .login-box {
            width: 100%;
            max-width: 300px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 10px;
            outline: none;
            font-size: 0.9rem;
        }

        input::placeholder { color: rgba(255,255,255,0.5); }

        .btn-enter {
            display: block;
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-enter:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .guest-link {
            margin-top: 20px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="overlay">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="ÉONIA" class="logo-main">
        
        <h1 class="brand-title">ÉONIA</h1>
        <p class="tagline">Connecter le vivant</p>

        <div class="login-box">
            <input type="email" placeholder="Email Client" id="userEmail">
            <input type="password" placeholder="Mot de passe" id="userPass">
            <button class="btn-enter" onclick="validerConnexion()">Entrer</button>
        </div>

        <a href="jardin.html?id=cerisier&mode=guest" class="guest-link">Continuer en tant qu'invité</a>
    </div>

    <script>
        function validerConnexion() {
            const email = document.getElementById('userEmail').value;
            if(email !== "") {
                // Pour l'instant, on laisse entrer. Firebase sécurisera cela plus tard.
                window.location.href = "jardin.html?id=cerisier";
            } else {
                alert("Veuillez entrer votre email.");
            }
        }
    </script>

</body>
</html>

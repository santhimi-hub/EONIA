<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Raleway', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        .login-container { 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            padding: 20px;
        }

        h1 { 
            font-weight: 200; 
            text-transform: uppercase; 
            letter-spacing: 12px; 
            color: #4ade80; 
            margin-bottom: 60px; 
            font-size: 2rem; 
        }
        
        input { 
            width: 100%; 
            padding: 18px 0; 
            margin-bottom: 10px; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #1a1a1a; 
            color: #fff; 
            font-family: 'Raleway', sans-serif; 
            text-align: center; 
            font-size: 0.8rem;
            letter-spacing: 2px;
            outline: none; 
            transition: border-color 0.4s;
        }
        
        input:focus { 
            border-bottom: 1px solid #4ade80; 
        }
        
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 40px; 
            background: transparent; 
            border: 1px solid #4ade80; 
            color: #4ade80; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.75rem; 
            cursor: pointer; 
            transition: all 0.4s; 
        }
        
        button:hover { 
            background: #4ade80; 
            color: #000; 
        }

        button:disabled { 
            opacity: 0.2; 
        }

        .links { 
            margin-top: 40px; 
        }
        
        .links a { 
            color: #444; 
            text-decoration: none; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        #status-msg { 
            margin-top: 25px; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            height: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>ÉONIA</h1>
        
        <input type="email" id="email-input" placeholder="EMAIL" spellcheck="false">
        <input type="password" id="pass-input" placeholder="MOT DE PASSE">
        
        <button id="login-btn" onclick="handleLogin()">SE CONNECTER</button>
        
        <div id="status-msg"></div>

        <div class="links">
            <a href="#" onclick="handleForgot()">Mot de passe oublié ?</a>
        </div>
    </div>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function handleLogin() {
        const email = document.getElementById('email-input').value.toLowerCase().trim();
        const pass = document.getElementById('pass-input').value.trim();
        const btn = document.getElementById('login-btn');
        const status = document.getElementById('status-msg');

        if (!email || !pass) {
            status.style.color = "#ff4444";
            status.innerText = "Champs requis";
            return;
        }

        btn.disabled = true;
        btn.innerText = "PATIENTEZ...";
        status.innerText = "";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // SÉCURITÉ RENFORCÉE : On scanne toute la base Notion
            const user = data.results.find(p => {
                const props = p.properties;
                
                // On récupère l'email peu importe son format dans Notion
                const n_email = props["Client_Email"]?.email || 
                                props["Client_Email"]?.rich_text?.[0]?.plain_text || "";
                
                // On récupère le password peu importe son format dans Notion
                const n_pass = props["Password"]?.rich_text?.[0]?.plain_text || 
                               props["Password"]?.title?.[0]?.plain_text || "";
                
                return n_email.toLowerCase().trim() === email && n_pass === pass;
            });

            if (user) {
                status.style.color = "#4ade80";
                status.innerText = "Accès validé";
                localStorage.setItem('user_email', email);
                setTimeout(() => { window.location.href = "catalogue.html"; }, 800);
            } else {
                status.style.color = "#ff4444";
                status.innerText = "Identifiants invalides";
                btn.disabled = false;
                btn.innerText = "SE CONNECTER";
            }
        } catch (e) {
            status.style.color = "#ff4444";
            status.innerText = "Erreur de liaison";
            btn.disabled = false;
            btn.innerText = "SE CONNECTER";
        }
    }

    function handleForgot() {
        // Remplace par ton mail si besoin
        window.location.href = "mailto:contact@eonia.com?subject=Mot de passe oublié";
    }

    // Connexion avec la touche Entrée
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>

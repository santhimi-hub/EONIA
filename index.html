<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; color: #fff; 
            font-family: 'Raleway', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            text-align: center; padding: 20px;
        }
        .login-box { max-width: 400px; width: 100%; }
        h1 { font-weight: 200; letter-spacing: 10px; text-transform: uppercase; color: #4ade80; margin-bottom: 10px; }
        p { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; margin-bottom: 40px; }
        
        input { 
            width: 100%; background: #111; border: 1px solid #333; 
            padding: 15px; border-radius: 10px; color: #fff; 
            font-family: inherit; margin-bottom: 15px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #4ade80; }
        
        button { 
            width: 100%; background: #4ade80; color: #000; 
            border: none; padding: 15px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; letter-spacing: 1px;
            text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #38c16d; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>ÉONIA</h1>
        <p>Accès à votre Jardin Privé</p>

        <input type="email" id="email-input" placeholder="Entrez votre adresse mail">
        
        <button onclick="validerAcces()">Entrer dans le jardin</button>
    </div>

    <script>
        // 1. Si on est déjà connecté, on gagne du temps et on va direct au catalogue
        if (localStorage.getItem('eonia_access')) {
            window.location.href = "catalogue.html";
        }

        // 2. La fonction qui ouvre la porte
        function validerAcces() {
            const mail = document.getElementById('email-input').value;

            if (mail.includes('@') && mail.length > 5) {
                // ON CRÉE LA CLÉ (Le Garde-barrière du catalogue la cherchera)
                localStorage.setItem('eonia_access', 'true');
                localStorage.setItem('user_email', mail);

                // ON REDIRIGE
                window.location.href = "catalogue.html";
            } else {
                alert("Veuillez entrer une adresse mail valide.");
            }
        }
    </script>

</body>
</html>

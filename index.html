<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Image de fond nature */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container { padding: 20px; }

        .logo {
            width: 100px;
            margin-bottom: 10px;
            filter: brightness(0) invert(1); /* Rend le logo blanc */
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            font-weight: 300;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 250px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .btn-entrer {
            background-color: white;
            color: #333;
            padding: 15px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: transform 0.2s;
            display: inline-block;
        }

        .btn-entrer:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px; margin-bottom: 10px;">♾️</div> 
        <h1>ÉONIA</h1>
        <p>Bienvenue dans votre mémoire végétale.</p>
        <a href="#" class="btn-entrer" onclick="alert('Chargement de votre jardin...')">ENTRER</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Mémoire Végétale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container { padding: 20px; animation: fadeIn 2s ease-out; }

        /* CONFIGURATION DE TON LOGO */
        .logo-eonia {
            width: 130px; /* Taille ajustable selon tes goûts */
            height: auto;
            margin-top: 100px; /* Descend le logo */
            margin-bottom: 20px;
            /* Si ton logo est blanc, on ajoute une petite lueur pour le faire ressortir */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: pulse 4s infinite;
        }

                h1 {
            font-size: 3.5rem; /* Taille un peu plus grande */
            letter-spacing: 2px; /* Espacement réduit (était à 10px) */
            font-weight: 800; /* Beaucoup plus gras */
            margin-bottom: 10px;
            text-transform: uppercase;
            /* Petit effet de relief pour que le gras ressorte bien sur la forêt */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }


        p {
            font-size: 1rem;
            margin-bottom: 60px;
            font-weight: 300;
            font-style: 1px;
            opacity: 0.8;
        }

        .btn-entrer {
            background-color: transparent; /* Font vide */
            color: white; /* Texte blanc */
            padding: 16px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 3px;
            display: inline-block;
            border: 1px solid white;
            transition: all 0.4s;
        }
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éonia - Catalogue</title>
    <style>
        :root { --accent: #4ade80; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        
        .logo { width: 80px; margin-bottom: 20px; filter: invert(1); }
        h1 { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; color: #666; }

        /* Grille du catalogue */
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        
        .plant-card { 
            background: #161616; border-radius: 15px; overflow: hidden; 
            text-decoration: none; color: #fff; border: 1px solid #222;
            transition: 0.3s;
        }
        .plant-card:active { transform: scale(0.95); border-color: var(--accent); }
        
        .plant-img { width: 100%; aspect-ratio: 1; object-fit: cover; opacity: 0.7; }
        .plant-name { padding: 12px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }

        footer { margin-top: 60px; font-size: 0.6rem; letter-spacing: 3px; opacity: 0.3; }
    </style>
</head>
<body>

    <img src="logo-eonia.png" alt="Éonia" class="logo"> <h1>Sélectionnez votre espèce</h1>

    <div class="catalog-grid">
        <a href="jardin.html?species=cerisier" class="plant-card">
            <img src="https://images.unsplash.com/photo-1528669835002-86927958f278?w=300" class="plant-img">
            <div class="plant-name">Cerisier Burlat</div>
        </a>

        <a href="olivier.html" class="plant-card">
            <img src="https://images.unsplash.com/photo-1541533848490-bc8115cd6522?w=300" class="plant-img">
            <div class="plant-name">Olivier</div>
        </a>
        
        </div>

    <footer>ÉONIA — CONNECTER LE VIVANT</footer>

</body>
</html>

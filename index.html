<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">

<style>

/* RESET */

* { margin:0; padding:0; box-sizing:border-box; }

body, html {
height:100%;
font-family:'Raleway',sans-serif;
background:#000;
color:#fff;
scroll-behavior:smooth;
overflow-x:hidden;
}

/* Loader Premium */

.loader {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1s;
}

.loader.fade {
opacity:0;
pointer-events:none;
}

.loader-logo {
width:90px;
opacity:0;
animation:loaderFade 1.8s ease forwards;
}

@keyframes loaderFade {
from {opacity:0; transform:scale(0.9);}
to {opacity:1; transform:scale(1);}
}

/* HERO */

.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)),
url('background.jpg') center/cover no-repeat;
animation:fadeIn 1.5s ease;
position:relative;
}

/* Light glow effect */

.hero::after {
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(74,222,128,0.15), transparent 70%);
top:20%;
left:50%;
transform:translateX(-50%);
filter:blur(80px);
pointer-events:none;
}

/* Logo */

.logo-main {
width:120px;
margin-bottom:25px;
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:0.2s;
transition:0.5s;
filter:drop-shadow(0 0 12px rgba(74,222,128,0.2));
}

.logo-main:hover {
transform:scale(1.08);
filter:drop-shadow(0 0 25px rgba(74,222,128,0.4));
}

/* Title */

.brand-title {
font-size:4rem;
font-weight:200;
letter-spacing:8px;
text-transform:uppercase;
color:#ffffff;
line-height:1;
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:0.4s;
}

/* Tagline */

.tagline {
font-style:italic;
font-weight:400;
font-size:0.85rem;
color:#ffffff;
margin-top:35px;
margin-bottom:45px;
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:0.6s;
}

/* Auth */

.auth-container {
display:flex;
flex-direction:column;
gap:12px;
width:280px;
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:0.8s;
}

input {
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
color:white;
outline:none;
font-family:'Raleway',sans-serif;
text-align:center;
transition:0.35s;
}

input:focus {
background:rgba(255,255,255,0.12);
border:1px solid rgba(74,222,128,0.3);
box-shadow:0 0 12px rgba(74,222,128,0.15);
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
-webkit-appearance:none;
margin:0;
}

input[type=number] {
-moz-appearance:textfield;
}

.auth-footer {
display:flex;
justify-content:space-between;
align-items:flex-start;
padding:0 4px;
margin-top:-4px;
min-height:25px;
}

#activation-help {
display:none;
font-size:0.58rem;
color:#4ade80;
font-style:italic;
text-align:left;
max-width:190px;
line-height:1.2;
}

.pin-forgot {
font-size:0.6rem;
color:rgba(255,255,255,0.4);
text-decoration:none;
transition:0.3s;
white-space:nowrap;
margin-left:5px;
margin-top:2px;
}

.pin-forgot:hover {
color:#fff;
}

/* Button */

.btn-main {
width:100%;
padding:14px;
background:linear-gradient(120deg,#ffffff,#eaeaea);
color:#000;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:700;
text-transform:uppercase;
letter-spacing:2px;
transition:0.35s;
margin-top:5px;
}

.btn-main:hover {
background:#4ade80;
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(74,222,128,0.35);
}

/* Link */

.link-order {
font-size:0.7rem;
color:rgba(255,255,255,0.5);
text-decoration:none;
margin-top:10px;
font-weight:400;
letter-spacing:1px;
text-transform:uppercase;
transition:0.3s;
text-align:center;
}

.link-order:hover {
color:#fff;
}

/* Bottom Nav */

.bottom-nav {
margin-top:35px;
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:1s;
}

.bottom-nav a {
color:#4ade80;
text-decoration:none;
margin:0 15px;
font-size:0.65rem;
text-transform:uppercase;
letter-spacing:2.5px;
transition:0.3s;
font-weight:500;
}

.bottom-nav a:hover {
color:#fff;
border-bottom:1px solid #4ade80;
}

/* Content */

.content-section {
padding:100px 30px;
text-align:center;
background:#050505;
}

.content-section h2 {
color:#4ade80;
font-weight:300;
text-transform:uppercase;
letter-spacing:4px;
margin-bottom:25px;
font-size:1.5rem;
}

.content-section p {
max-width:700px;
margin:0 auto 20px auto;
line-height:1.8;
color:#bbb;
}

.highlight {
color:#fff;
font-weight:500;
}

/* Animations */

@keyframes fadeUp {
from {
opacity:0;
transform:translateY(20px);
}
to {
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn {
from {opacity:0}
to {opacity:1}
}

/* Mobile */

@media (max-width:600px) {

.brand-title {
font-size:2.5rem;
}

.tagline {
margin-top:20px;
margin-bottom:30px;
}

.bottom-nav {
margin-top:25px;
}

}

</style>
</head>

<body>

<div class="loader">
<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="loader-logo">
</div>

setTimeout(()=>{
document.querySelector(".loader").classList.add("fade")
},800)
})

</script>

</body>
</html

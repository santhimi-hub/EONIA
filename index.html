<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Votre Jardin Connecté</title>
    <style>
        :root { --accent: #4ade80; --bg: #0a0a0a; --grey: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- LOGO ÉONIA --- */
        header { padding: 60px 20px; text-align: center; width: 100%; }
        .logo { 
            width: 140px; margin-bottom: 20px; 
            filter: brightness(0) invert(1); /* Pour que le logo soit blanc sur fond noir */
        }
        .brand-name { font-size: 1.5rem; letter-spacing: 8px; text-transform: uppercase; font-weight: 200; }
        .tagline { font-size: 0.6rem; color: var(--accent); letter-spacing: 3px; margin-top: 10px; opacity: 0.8; }

        /* --- CATALOGUE / MON JARDIN --- */
        .container { width: 100%; max-width: 600px; padding: 0 25px 80px 25px; }
        h2 { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: #444; margin-bottom: 30px; text-align: center; }

        .garden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .plant-card { 
            background: var(--grey); border-radius: 20px; overflow: hidden; 
            text-decoration: none; color: #fff; border: 1px solid #222;
            transition: all 0.4s ease; position: relative;
        }
        .plant-card:active { transform: scale(0.96); border-color: var(--accent); }
        
        .plant-img { width: 100%; aspect-ratio: 0.9; object-fit: cover; opacity: 0.6; }
        .plant-info { padding: 15px; text-align: center; }
        .plant-info h3 { font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
        .plant-info span { font-size: 0.6rem; color: #666; font-style: italic; }

        /* Badge pour indiquer une plante déjà configurée */
        .configured-badge { 
            position: absolute; top: 10px; right: 10px; 
            width: 8px; height: 8px; background: var(--accent); 
            border-radius: 50%; box-shadow: 0 0 10px var(--accent);
            display: none; /* S'affichera si le client a déjà rempli des infos */
        }

        footer { margin-top: auto; padding: 40px; opacity: 0.2; font-size: 0.5rem; letter-spacing: 5px; }
    </style>
</head>
<body>

    <header>
        <img src="1000043768.png" alt="ÉONIA" class="logo">
        <div class="brand-name">ÉONIA</div>
        <p class="tagline">CONNECTER LE VIVANT</p>
    </header>

    <div class="container">
        <h2>Votre Collection</h2>

        <div class="garden-grid">
            <a href="jardin.html" class="plant-card">
                <div class="configured-badge" id="badge-cerisier"></div>
                <img src="1000044205.jpg" class="plant-img">
                <div class="plant-info">
                    <h3>Cerisier</h3>
                    <span>Prunus avium</span>
                </div>
            </a>

            <a href="#" class="plant-card" style="opacity: 0.4;">
                <img src="1000044207.jpg" class="plant-img">
                <div class="plant-info">
                    <h3>Olivier</h3>
                    <span>Olea europaea</span>
                </div>
            </a>
            
            </div>
    </div>

    <footer>ÉONIA — LUXE & MÉMOIRE VÉGÉTALE</footer>

    <script>
        // Ce petit script vérifie si le client a déjà configuré son cerisier 
        // pour mettre un petit point vert brillant sur la carte
        window.onload = function() {
            if(localStorage.getItem('eonia_cerisier')) {
                document.getElementById('badge-cerisier').style.display = 'block';
            }
        }
    </script>
</body>
</html>

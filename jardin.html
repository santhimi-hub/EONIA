<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: auto; padding: 25px; }
        .hidden { display: none !important; }
        
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; opacity: 0.8; }
        
        /* Hero */
        .hero-img { width: 100%; height: 42vh; object-fit: cover; border-radius: 20px; margin: 20px 0; border: 1px solid var(--border); }
        h1 { font-size: 1.8rem; font-weight: 200; margin: 0; letter-spacing: 1px; }
        .sci-name { color: var(--accent); font-size: 0.75rem; font-style: italic; opacity: 0.6; margin-bottom: 30px; margin-top: 5px; }
        
        /* Grille de Rubriques Épurée */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .info-box { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 12px 15px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        
        /* Le liseré vert pour Famille et Type */
        .info-box.highlight { border-left: 2px solid var(--accent); background: rgba(74, 222, 128, 0.02); }
        
        .label { color: var(--accent); font-size: 0.5rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; margin-bottom: 6px; opacity: 0.7; }
        .value { font-size: 0.75rem; font-weight: 300; color: #ccc; }
        
        /* Pictos plus petits et élégants */
        .visual-val { font-size: 1.1rem; display: flex; align-items: center; min-height: 1.2rem; }

        /* Description */
        .desc-box { margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--border); }
        .section-title { color: #444; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        #p-desc { line-height: 1.7; color: #999; font-size: 0.85rem; font-weight: 300; }

        /* Bouton Vert Éonia */
        .btn-order { 
            display: block; width: 100%; padding: 18px; 
            background: var(--accent); color: #000; 
            text-decoration: none; border-radius: 40px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem;
            text-align: center; margin: 40px 0; transition: 0.3s;
        }
        .btn-order:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <a onclick="history.back()" class="back-link">← Retour</a>
        
        <img id="p-photo" class="hero-img">
        <h1 id="p-titre">...</h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" class="hidden">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');

    function getVisual(type, val) {
        if (!val || val === "-" || val === "0") return "-";
        const v = val.toString().toLowerCase();
        if (type === "arrosage") {
            if (v.includes("1")) return "💧";
            if (v.includes("2")) return "💧💧";
            if (v.includes("3")) return "💧💧💧";
            return "💧";
        }
        if (type === "exposition") {
            if (v.includes("soleil")) return "☀️";
            if (v.includes("mi-ombre")) return "⛅";
            if (v.includes("ombre")) return "☁️";
            return "☀️";
        }
        if (type === "difficulté") {
            if (v.includes("1") || v.includes("facile")) return "🟢";
            if (v.includes("2") || v.includes("moyen")) return "🟡";
            return "🔴";
        }
        return val;
    }

    async function load() {
        const res = await fetch(API_URL, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
        });
        const data = await res.json();
        const p = data.find(x => x.id === rawId || x.cleanId === (rawId||"").replace(/-/g,"").toLowerCase());
        
        if (p) {
            document.getElementById('p-photo').src = p.Photo;
            document.getElementById('p-titre').innerText = p["Nom commun"];
            document.getElementById('p-sci').innerText = p["Nom scientifique"];
            document.getElementById('p-desc').innerText = p["Description"];
            
            if (!p.est_dans_jardin) document.getElementById('catalog-area').classList.remove('hidden');

            const fields = [
                {l:"Famille", v:p.Famille, h:true},
                {l:"Type", v:p.Type, h:true},
                {l:"Difficulté", v:getVisual("difficulté", p.Difficulté), vis:true},
                {l:"Arrosage", v:getVisual("arrosage", p.Arrosage), vis:true},
                {l:"Exposition", v:getVisual("exposition", p.Exposition), vis:true},
                {l:"Rusticité", v:p.Rusticité},
                {l:"Taille", v:p["Taille à maturité"]},
                {l:"Floraison", v:p.Floraison},
                {l:"Persistance", v:p.Persistance}
            ];

            document.getElementById('p-grid').innerHTML = fields.map(f => `
                <div class="info-box ${f.h ? 'highlight' : ''}">
                    <div class="label">${f.l}</div>
                    <div class="${f.vis ? 'visual-val' : 'value'}">${f.v || "-"}</div>
                </div>
            `).join('');
        }
    }
    load();
</script>
</body>
</html>

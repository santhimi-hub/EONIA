<!DOCTYPE html>
<html lang="fr">
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jardin - Éonia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #0f0f0f; 
            color: #e0e0e0; 
            font-family: -apple-system, sans-serif; 
            padding: 20px;
        }

        /* --- CARTE PRINCIPALE --- */
        .card {
            background: #1a1a1a;
            border-radius: 25px;
            overflow: hidden;
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* --- PHOTO DE L'ARBRE --- */
        .tree-photo {
            width: 100%;
            height: 280px;
            background-image: url('https://images.unsplash.com/photo-1528669835002-86927958f278?q=80&w=1000');
            background-size: cover;
            background-position: center;
        }

        .content { padding: 25px; }

        /* --- TITRES --- */
        h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: 1px; 
            color: #fff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle { 
            color: #4ade80; /* Vert émeraude */
            font-size: 0.9rem; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- GRILLE D'INFOS --- */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .info-box {
            background: #252525;
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid #4ade80;
        }
        .info-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .info-value { font-size: 0.9rem; font-weight: 600; color: #fff; margin-top: 3px; }

        /* --- CHECKLIST ARROSAGE --- */
        .section-title { font-size: 1rem; margin-bottom: 15px; color: #fff; font-weight: 600; }
        
        .check-list { list-style: none; }
        .check-item {
            display: flex;
            align-items: center;
            background: #252525;
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
        }
        .check-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: #4ade80; }
        .check-item span { font-size: 0.9rem; }

        /* --- BOUTON RETOUR --- */
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="tree-photo"></div>
        
        <div class="content">
            <h1>CERISIER BURLAT</h1>
            <p class="subtitle">Mémoire de Santhimi</p>

            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Planté le</div>
                    <div class="info-value">12 Mars 2026</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Exposition</div>
                    <div class="info-value">Plein Soleil ☀️</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Taille</div>
                    <div class="info-value">1.20 m</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Prochain Soin</div>
                    <div class="info-value">Taille d'été</div>
                </div>
            </div>

            <p class="section-title">Suivi Arrosage (Avril)</p>
            <ul class="check-list">
                <li class="check-item"><input type="checkbox"> <span>Semaine 1 - Fait</span></li>
                <li class="check-item"><input type="checkbox"> <span>Semaine 2 - En attente</span></li>
                <li class="check-item"><input type="checkbox"> <span>Semaine 3 - En attente</span></li>
                <li class="check-item"><input type="checkbox"> <span>Semaine 4 - En attente</span></li>
            </ul>

            <a href="index.html" class="btn-back">← Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>

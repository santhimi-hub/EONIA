<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #080808; --border: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; 
            -webkit-font-smoothing: antialiased; line-height: 1.4;
        }

        /* CHARGEMENT */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(74, 222, 128, 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CONTAINER GLOBAL */
        .container { max-width: 900px; margin: auto; padding: 10px 15px 40px; opacity: 0; transition: 0.5s; }
        .container.loaded { opacity: 1; }

        /* BOUTON RETOUR */
        .nav-header { padding: 10px 0; margin-bottom: 10px; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 10px;
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 16px; border-radius: 40px; 
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px;
            text-decoration: none; cursor: pointer; transition: 0.3s;
        }
        .back-btn img { width: 12px; height: auto; }
        .back-btn:hover { background: var(--accent); color: #000; }
        .back-btn:hover img { filter: brightness(0); }

        /* IMAGE HERO */
        .hero-wrapper { position: relative; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: #050505; }
        .hero-img { width: 100%; height: 50vh; object-fit: cover; display: block; }
        
        .fav-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px); z-index: 10; transition: 0.3s;
        }
        .fav-btn svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 1.5; }
        .fav-btn.active svg { fill: var(--accent); stroke: var(--accent); }
        
        /* IDENTITÉ PLANTE */
        .plant-identity { margin: 15px 0 20px; }
        h1 { font-size: 2rem; font-weight: 100; letter-spacing: 2px; text-transform: uppercase; }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; opacity: 0.5; font-weight: 300; }
        
        /* GRILLE D'INFOS (MOBILE PAR DÉFAUT) */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 10px 15px; border-radius: 10px; transition: 0.3s; }
        .info-box.highlight { border-left: 2px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.5rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; margin-bottom: 2px; }
        .value { font-size: 0.75rem; font-weight: 300; color: #ccc; }

        /* DESCRIPTION */
        .desc-box { margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
        #p-desc { line-height: 1.5; color: #999; font-size: 0.8rem; font-weight: 300; white-space: pre-wrap; }
        #p-desc strong { color: #fff; font-weight: 500; display: block; margin: 12px 0 4px 0; font-size: 0.85rem; }

        .btn-order-container { margin-top: 25px; }
        .btn-order { display: block; width: 100%; padding: 15px; background: var(--accent); color: #000; text-decoration: none; border-radius: 40px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; text-align: center; }

        /* --- OPTIMISATION PC (Écrans > 1024px) --- */
        @media (min-width: 1025px) {
            .container { max-width: 1100px; padding: 40px 20px; }
            .nav-header { margin-bottom: 25px; }
            .back-btn { font-size: 0.75rem; padding: 12px 24px; }
            .back-btn img { width: 16px; }

            .hero-img { height: 60vh; border-radius: 24px; }
            
            .plant-identity { margin: 30px 0; }
            h1 { font-size: 3.5rem; letter-spacing: 6px; }
            .sci-name { font-size: 1.1rem; }

            .info-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .info-box { padding: 25px; border-radius: 15px; }
            .label { font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 8px; }
            .value { font-size: 1.1rem; }

            .desc-box { margin-top: 50px; padding-top: 30px; }
            .section-title { font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 20px; }
            #p-desc { font-size: 1.05rem; line-height: 1.8; color: #bbb; max-width: 900px; }
            #p-desc strong { font-size: 1.2rem; margin: 30px 0 10px 0; }
        }

        /* Ajustement tablette intermédiaire */
        @media (max-width: 1024px) and (min-width: 601px) {
            h1 { font-size: 2.5rem; }
            .info-grid { gap: 12px; }
        }

        @media (max-width: 600px) { .hero-img { height: 40vh; } h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 0.6rem; letter-spacing: 2px; color: #4ade80;">ÉONIA — CHARGEMENT</p>
    </div>

    <div class="container" id="main-content">
        <div class="nav-header">
            <a onclick="history.back()" class="back-btn">
                <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="Logo">
                <span>NOTRE COLLECTION</span>
            </a>
        </div>

        <div class="hero-wrapper">
            <img id="p-photo" class="hero-img">
            <div id="fav-trigger" class="fav-btn" onclick="toggleFav()">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
        </div>
        
        <div class="plant-identity">
            <h1 id="p-titre">...</h1>
            <div id="p-sci" class="sci-name"></div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" style="display:none;" class="btn-order-container">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');
    let currentPlant = null;

    function formatNotionText(text) {
        if (!text) return "";
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function toggleFav() {
        if (!currentPlant) return;
        let favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
        const idx = favs.findIndex(f => f.id === currentPlant.id);
        const btn = document.getElementById('fav-trigger');
        if (idx > -1) {
            favs.splice(idx, 1);
            btn.classList.remove('active');
        } else {
            favs.push({ id: currentPlant.id, name: currentPlant["Nom commun"], photo: currentPlant.Photo });
            btn.classList.add('active');
        }
        localStorage.setItem('eonia_favs', JSON.stringify(favs));
    }

    function getVisual(type, val) {
        if (!val || val === "-" || val === "0") return "-";
        const v = val.toString().toLowerCase();
        if (type === "arrosage") {
            if (v.includes("1")) return "💧";
            if (v.includes("2")) return "💧💧";
            if (v.includes("3")) return "💧💧💧";
        } 
        if (type === "exposition") {
            if (v.includes("soleil")) return "☀️";
            if (v.includes("ombre")) return "⛅";
            if (v.includes("mi")) return "⛅☀️";
        } 
        if (type === "difficulté") {
            if (v.includes("1") || v.includes("facile")) return "🟢";
            if (v.includes("2") || v.includes("moyen")) return "🟡";
            if (v.includes("3") || v.includes("difficile")) return "🔴";
        }
        return val;
    }

    async function load() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
            });
            const data = await res.json();
            currentPlant = data.find(x => x.id === rawId);
            
            if (currentPlant) {
                document.getElementById('p-photo').src = currentPlant.Photo;
                document.getElementById('p-titre').innerText = currentPlant["Nom commun"];
                document.getElementById('p-sci').innerText = currentPlant["Nom scientifique"];
                document.getElementById('p-desc').innerHTML = formatNotionText(currentPlant["Description"]);
                
                const favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
                if (favs.some(f => f.id === currentPlant.id)) {
                    document.getElementById('fav-trigger').classList.add('active');
                }

                if (!currentPlant.est_dans_jardin) document.getElementById('catalog-area').style.display = 'block';

                const fields = [
                    {l:"Famille", v: currentPlant.Famille, h:true},
                    {l:"Type", v: currentPlant.Type, h:true},
                    {l:"Difficulté", v: getVisual("difficulté", currentPlant.Difficulté)},
                    {l:"Arrosage", v: getVisual("arrosage", currentPlant.Arrosage)},
                    {l:"Exposition", v: getVisual("exposition", currentPlant.Exposition)},
                    {l:"Rusticité", v: currentPlant.Rusticité},
                    {l:"Taille", v: currentPlant["Taille à maturité"]},
                    {l:"Floraison", v: currentPlant.Floraison},
                    {l:"Persistance", v: currentPlant.Persistance}
                ];

                document.getElementById('p-grid').innerHTML = fields.map(f => `
                    <div class="info-box ${f.h ? 'highlight' : ''}">
                        <div class="label">${f.l}</div>
                        <div class="value">${f.v || "-"}</div>
                    </div>
                `).join('');

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').classList.add('loaded');
                }, 500);
            }
        } catch(e) { console.error(e); }
    }
    load();
</script>
</body>
</html>

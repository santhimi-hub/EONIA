<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Bouton Retour */
        .back-btn { background: none; border: 1px solid #4ade80; color: #4ade80; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .hero-img { width: 100%; height: 45vh; object-fit: cover; border-radius: 15px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .sci-name { color: #4ade80; font-size: 0.9rem; font-style: italic; margin-bottom: 20px; opacity: 0.8; }
        
        /* Tes Onglets Famille et Type */
        .badge-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .badge { background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.2); padding: 8px 15px; border-radius: 8px; min-width: 110px; }
        .badge-label { color: #4ade80; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; opacity: 0.7; }
        .badge-value { color: #eee; font-size: 0.75rem; text-transform: uppercase; font-weight: 500; }

        /* Grille d'infos */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; }
        .label { color: #4ade80; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .value { color: #eee; font-size: 0.85rem; }
        
        .desc-box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .desc { line-height: 1.6; color: #ccc; font-size: 0.9rem; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <div id="section-detail" class="hidden">
        <button id="custom-back" class="back-btn">← Retour</button>
        
        <img id="p-photo" class="hero-img">
        <h1 id="p-titre" style="font-size: 2.2rem; font-weight: 300; margin: 0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="badge-container">
            <div class="badge">
                <span class="badge-label">Famille</span>
                <span id="p-famille" class="badge-value">-</span>
            </div>
            <div class="badge">
                <span class="badge-label">Type</span>
                <span id="p-type" class="badge-value">-</span>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-box"><div class="label">Arrosage</div><div id="p-arrosage" class="value"></div></div>
            <div class="info-box"><div class="label">Exposition</div><div id="p-expo" class="value"></div></div>
            <div class="info-box"><div class="label">Difficulté</div><div id="p-diff" class="value"></div></div>
            <div class="info-box"><div class="label">Rusticité</div><div id="p-rust" class="value"></div></div>
            <div class="info-box"><div class="label">Taille adulte</div><div id="p-taille" class="value"></div></div>
            <div class="info-box"><div class="label">Persistance</div><div id="p-pers" class="value"></div></div>
        </div>

        <div class="desc-box">
            <div class="label">Description & Conseils</div>
            <div id="p-desc" class="desc"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const params = new URLSearchParams(window.location.search);
    const plantId = params.get('id');
    const fromCatalogue = params.get('from') === 'catalogue';

    document.getElementById('custom-back').onclick = function() {
        if (fromCatalogue) window.location.href = 'catalogue.html';
        else window.location.href = 'jardin.html';
    };

    // La fonction "Détective" qui va chercher dans tes colonnes Notion
    function findData(plant, labels) {
        // On nettoie les labels pour la comparaison (pas d'accents, minuscule)
        const clean = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        
        for (let key in plant) {
            const cleanKey = clean(key);
            // Si la colonne contient l'un de nos mots-clés (ex: "famille" ou "family")
            if (labels.some(l => cleanKey === clean(l) || cleanKey.includes(clean(l)))) {
                const val = plant[key];
                if (!val) continue;
                // Si c'est du texte
                if (typeof val === 'string') return val;
                // Si c'est une liste Notion (Multi-select)
                if (Array.isArray(val)) return val.map(v => v.name || v).join(', ');
                // Si c'est un objet (Select)
                if (val.name) return val.name;
            }
        }
        return "-"; // Si vraiment rien n'est trouvé
    }

    async function loadPlant() {
        if (!plantId) return;
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'invite@eonia.com' }) 
            });
            const allPlants = await response.json();
            
            // On trouve la plante par son ID
            const p = allPlants.find(item => String(item.id || item.ID_Plaque) === plantId);

            if (p) {
                document.getElementById('section-detail').classList.remove('hidden');
                document.getElementById('p-photo').src = p.Photo || '';
                document.getElementById('p-titre').innerText = p["Nom commun"] || 'Spécimen';

                // --- REMPLISSAGE AVEC LA FONCTION DETECTIVE ---
                
                // On lui donne plusieurs variantes au cas où
                document.getElementById('p-famille').innerText = findData(p, ["Famille"]);
                document.getElementById('p-type').innerText = findData(p, ["Type", "Genre"]);
                document.getElementById('p-sci').innerText = findData(p, ["Nom scientifique", "Scientifique"]);
                document.getElementById('p-arrosage').innerText = findData(p, ["Arrosage", "Water"]);
                document.getElementById('p-expo').innerText = findData(p, ["Exposition", "Soleil"]);
                document.getElementById('p-diff').innerText = findData(p, ["Difficulte", "Difficulté"]);
                document.getElementById('p-rust').innerText = findData(p, ["Rusticite", "Rusticité", "Résistance"]);
                document.getElementById('p-taille').innerText = findData(p, ["Taille", "Hauteur"]);
                document.getElementById('p-pers').innerText = findData(p, ["Persistance", "Feuillage"]);
                
                // Description (souvent une colonne longue)
                document.getElementById('p-desc').innerText = findData(p, ["Description"]) || 'Aucune description disponible.';
            }
        } catch (error) {
            console.error("Erreur de connexion à l'API");
        }
    }

    window.onload = loadPlant;
</script>



</body>
</html>

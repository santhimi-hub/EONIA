<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Plante</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
}

.container{
max-width:800px;
margin:auto;
padding:30px 20px;
}

h1{
color:#4ade80;
text-transform:uppercase;
font-weight:200;
letter-spacing:4px;
text-align:center;
margin-bottom:20px;
}

img{
width:100%;
height:300px;
object-fit:cover;
border-radius:12px;
margin-bottom:20px;
}

.box{
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.label{
color:#4ade80;
font-size:0.7rem;
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:5px;
}

.back{
display:block;
text-align:center;
margin-top:30px;
color:#4ade80;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
<h1 id="name">Chargement...</h1>

<img id="img">

<div class="box">
<div class="label">Informations</div>
<div id="info"></div>
</div>

<div class="box">
<div class="label">Culture</div>
<div id="culture"></div>
</div>

<a class="back" href="catalogue.html">← Retour au catalogue</a>
</div>

<script>

const API_URL="https://eonia-api.santhimi.workers.dev";
const params=new URLSearchParams(window.location.search);

/* ✅ IMPORTANT : récupération ID */
const id = params.get("id") || params.get("id_botanique");

if(!id){
document.getElementById("name").innerText="Plante introuvable";
throw new Error("ID manquant");
}

window.onload = async () => {

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"get_plante",
id:id
})
});

const data=await res.json();

/* 🔴 sécurité : on prend UN SEUL objet */
const p = Array.isArray(data) ? data[0] : data;

if(!p){
document.getElementById("name").innerText="Plante introuvable";
return;
}

/* IMAGE */
document.getElementById("img").src = p.Photo || "";

/* NOM */
document.getElementById("name").innerText = p["Nom commun"] || "Sans nom";

/* INFOS */
document.getElementById("info").innerText =
p["Informations générales"] || "Aucune information";

/* CULTURE */
document.getElementById("culture").innerText =
`Exposition: ${p.Exposition || "-"}
Arrosage: ${p.Arrosage || "-"}
Rusticité: ${p.Rusticite || "-"}
Sol: ${p["Type de sol"] || "-"}`;

}catch(e){
document.getElementById("name").innerText="Erreur de chargement";
console.error(e);
}

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Jardin & Météo</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        /* MÉTÉO (RESTAURÉE) */
        .weather-bar { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(10px); border: 1px solid var(--border);
            border-radius: 24px; padding: 15px; margin-bottom: 25px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .w-day { font-size: 0.6rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .w-icon { font-size: 1.5rem; margin-bottom: 5px; }
        .w-temp { font-size: 0.8rem; font-weight: 400; }

        .plant-hero { width: 100%; height: 250px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; border: 1px solid var(--border); }

        .main-title { font-size: 2.2rem; margin: 0; font-weight: 200; }
        .sci-title { color: var(--accent); font-style: italic; font-size: 0.9rem; opacity: 0.7; margin-bottom: 25px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .section-title { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; border-left: 2px solid var(--accent); padding-left: 10px; }

        /* GRILLE DE DONNÉES (EMPLACEMENT RESTAURÉ) */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .info-box { background: #111; border: 1px solid #1a1a1a; padding: 12px; border-radius: 14px; }
        .info-label { font-size: 0.55rem; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .info-value { font-size: 0.8rem; color: #fff; }

        .btn-water { background: var(--water); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; }
        .cancel-link { color: #444; font-size: 0.7rem; display: block; margin-top: 10px; text-align: center; cursor: pointer; text-decoration: underline; }

        input[type="date"], textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-family: inherit; margin-bottom: 15px; box-sizing: border-box; }
        .save-btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; }

        /* BOUTON COMMANDER AMÉLIORÉ */
        .btn-order-premium { 
            display: block; width: 100%; padding: 20px; border-radius: 18px; text-align: center; font-weight: 700;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); color: #000; text-decoration: none;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.2); margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:15px;">← RETOUR</button>

        <div id="weather-section" class="weather-bar hidden"></div>

        <img id="p-img" class="plant-hero hidden">

        <h1 id="p-titre" class="main-title">Chargement...</h1>
        <div id="p-sci" class="sci-title"></div>

        <div id="owner-tools" class="hidden">
            <div class="card">
                <div class="section-title">Entretien Rapide</div>
                <button class="btn-water" onclick="updateWater(false)">💦 MARQUER COMME ARROSÉ</button>
                <div id="water-info" style="font-size:0.7rem; color:#555; text-align:center; margin-top:10px;"></div>
                <span id="btn-cancel" class="cancel-link hidden" onclick="updateWater(true)">Annuler l'arrosage</span>
            </div>

            <div class="card">
                <div class="section-title">Journal de Suivi</div>
                <label class="info-label">Date de plantation</label>
                <input type="date" id="input-date" onchange="showSave()">
                <label class="info-label">Mes notes</label>
                <textarea id="input-note" rows="3" placeholder="Notes..." oninput="showSave()"></textarea>
                <button id="btn-save" class="save-btn hidden" onclick="saveData()">ENREGISTRER</button>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Fiche Technique</div>
            <div class="info-grid">
                <div class="info-box"><span class="info-label">Arrosage</span><div id="v-arr">-</div></div>
                <div class="info-box"><span class="info-label">Exposition</span><div id="v-exp">-</div></div>
                <div class="info-box"><span class="info-label">Difficulté</span><div id="v-dif">-</div></div>
                <div class="info-box"><span class="info-label">Type</span><div id="v-type">-</div></div>
                <div class="info-box"><span class="info-label">Taille</span><div id="v-taille">-</div></div>
                <div class="info-box"><span class="info-label">Floraison</span><div id="v-flo">-</div></div>
                <div class="info-box"><span class="info-label">Rusticité</span><div id="v-rust">-</div></div>
                <div class="info-box"><span class="info-label">Feuillage</span><div id="v-feu">-</div></div>
            </div>
            <div class="section-title">Description</div>
            <p id="p-desc" style="color:#888; font-size:0.9rem; line-height:1.6;"></p>
        </div>

        <div id="cta-order" class="hidden">
            <a href="commander.html" class="btn-order-premium">Commander ma plaque Éonia</a>
        </div>
    </div>

    <script>
        const API_URL = "https://eonia-api.santhimi.workers.dev";
        const plantId = new URLSearchParams(window.location.search).get('id');
        const userEmail = localStorage.getItem('user_email');
        const userPin = localStorage.getItem('user_pin');
        const lat = localStorage.getItem('user_lat'), lon = localStorage.getItem('user_lon');

        async function init() {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, plantId, lat, lon })
            });
            const data = await res.json();
            const p = data.find(i => String(i.id) === plantId || String(i.ID_Plaque) === plantId);
            
            if (!p) return;

            // Image et Titres
            if (p.Photo) { document.getElementById('p-img').src = p.Photo; document.getElementById('p-img').classList.remove('hidden'); }
            document.getElementById('p-titre').innerText = (p.est_dans_jardin && p.Surnom) ? p.Surnom : p["Nom commun"];
            document.getElementById('p-sci').innerText = p["Nom scientifique"];
            document.getElementById('p-desc').innerText = p.Description;

            // Grille technique
            document.getElementById('v-arr').innerText = p.Arrosage;
            document.getElementById('v-exp').innerText = p.Exposition;
            document.getElementById('v-dif').innerText = p.Difficulté;
            document.getElementById('v-type').innerText = p.Type;
            document.getElementById('v-taille').innerText = p.Taille;
            document.getElementById('v-flo').innerText = p.Floraison;
            document.getElementById('v-rust').innerText = p.Rusticité;
            document.getElementById('v-feu').innerText = p.Feuillage;

            // Météo
            if (p.Alertes) {
                const w = document.getElementById('weather-section');
                w.innerHTML = p.Alertes.map(str => {
                    const [d, i, t] = str.split('|');
                    return `<div style="text-align:center"><div class="w-day">${d}</div><div class="w-icon">${i}</div><div class="w-temp">${t}</div></div>`;
                }).join('');
                w.classList.remove('hidden');
            }

            if (p.est_dans_jardin) {
                document.getElementById('owner-tools').classList.remove('hidden');
                document.getElementById('input-date').value = p.Date_Plantation || "";
                document.getElementById('input-note').value = p.Note_Privee || "";
                if (p.Dernier_Arrosage && p.Dernier_Arrosage !== "-") {
                    document.getElementById('water-info').innerText = "Dernier arrosage : " + new Date(p.Dernier_Arrosage).toLocaleDateString();
                    document.getElementById('btn-cancel').classList.remove('hidden');
                }
            } else {
                document.getElementById('cta-order').classList.remove('hidden');
            }
        }

        async function updateWater(cancel) {
            await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, action: 'record_watering', plantId, cancel })
            });
            location.reload();
        }

        function showSave() { document.getElementById('btn-save').classList.remove('hidden'); }

        async function saveData() {
            const date = document.getElementById('input-date').value;
            const note = document.getElementById('input-note').value;
            await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, action: 'update_prive', plantId, date, note })
            });
            document.getElementById('btn-save').classList.add('hidden');
            alert("Journal mis à jour !");
        }

        init();
    </script>
</body>
</html>

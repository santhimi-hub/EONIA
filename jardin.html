<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #080808; --border: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; 
            -webkit-font-smoothing: antialiased; line-height: 1.4;
        }

        .container { max-width: 900px; margin: auto; padding: 10px 15px 40px; }

        /* BOUTON RETOUR ÉONIA */
        .nav-header { padding: 10px 0; margin-bottom: 10px; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 10px;
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 16px; border-radius: 40px; 
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px;
            text-decoration: none; cursor: pointer; transition: 0.3s;
        }
        .back-btn img { width: 12px; height: auto; }
        .back-btn:hover { background: var(--accent); color: #000; }
        .back-btn:hover img { filter: brightness(0); }

        /* IMAGE PANORAMIQUE */
        .hero-wrapper { position: relative; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .hero-img { width: 100%; height: 50vh; object-fit: cover; display: block; }
        
        .fav-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .fav-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 1.5; }
        .fav-btn.active svg { fill: var(--accent); stroke: var(--accent); }
        
        /* TITRES COMPACTS */
        .plant-identity { margin: 15px 0 20px; }
        h1 { font-size: 2rem; font-weight: 100; letter-spacing: 2px; text-transform: uppercase; }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; opacity: 0.5; font-weight: 300; }
        
        /* GRILLE DENSE */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .info-box { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 10px;
        }
        .info-box.highlight { border-left: 2px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.5rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; margin-bottom: 2px; }
        .value { font-size: 0.75rem; font-weight: 300; color: #ccc; }

        /* DESCRIPTION SANS ESPACES INUTILES */
        .desc-box { margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
        
        #p-desc { line-height: 1.5; color: #999; font-size: 0.8rem; font-weight: 300; white-space: pre-wrap; }
        #p-desc strong { 
            color: #fff; font-weight: 500; display: block; 
            margin: 12px 0 4px 0; font-size: 0.85rem;
        }

        .btn-order-container { margin-top: 25px; }
        .btn-order { 
            display: block; width: 100%; padding: 15px; background: var(--accent); color: #000; 
            text-decoration: none; border-radius: 40px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 2px; font-size: 0.7rem; text-align: center;
        }

        @media (max-width: 600px) { .hero-img { height: 40vh; } h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-header">
            <a onclick="history.back()" class="back-btn">
                <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="Logo">
                <span>NOTRE COLLECTION</span>
            </a>
        </div>

        <div class="hero-wrapper">
            <img id="p-photo" class="hero-img">
            <div id="fav-trigger" class="fav-btn">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
        </div>
        
        <div class="plant-identity">
            <h1 id="p-titre">...</h1>
            <div id="p-sci" class="sci-name"></div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" style="display:none;" class="btn-order-container">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');

    function formatNotionText(text) {
        if (!text) return "";
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    async function load() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
            });
            const data = await res.json();
            const p = data.find(x => x.id === rawId);
            
            if (p) {
                document.getElementById('p-photo').src = p.Photo;
                document.getElementById('p-titre').innerText = p["Nom commun"];
                document.getElementById('p-sci').innerText = p["Nom scientifique"];
                document.getElementById('p-desc').innerHTML = formatNotionText(p["Description"]);
                
                if (!p.est_dans_jardin) document.getElementById('catalog-area').style.display = 'block';

                const fields = [
                    {l:"Famille", v: p.Famille, h:true},
                    {l:"Type", v: p.Type, h:true},
                    {l:"Difficulté", v: p.Difficulté},
                    {l:"Arrosage", v: p.Arrosage},
                    {l:"Exposition", v: p.Exposition},
                    {l:"Rusticité", v: p.Rusticité},
                    {l:"Taille", v: p["Taille à maturité"]},
                    {l:"Floraison", v: p.Floraison}
                ];

                document.getElementById('p-grid').innerHTML = fields.map(f => `
                    <div class="info-box ${f.h ? 'highlight' : ''}">
                        <div class="label">${f.l}</div>
                        <div class="value">${f.v || "-"}</div>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    load();
</script>
</body>
</html>

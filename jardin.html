<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
       :root { 
    --accent: #4ade80; 
    --bg: #030303; 
    --card: rgba(255, 255, 255, 0.03); 
    --border: rgba(255, 255, 255, 0.06); 
    --water: #38bdf8; 
    --error: #f87171; 
}

body { 
    background: var(--bg); 
    color: #fff; 
    font-family: 'Raleway', sans-serif; 
    margin: 0; 
    padding: 0; 
    line-height: 1.6;
}

.container { 
    max-width: 600px; /* Plus étroit pour un look "App Mobile" de luxe */
    margin: auto; 
    padding: 30px 20px; 
}

/* Bouton Retour minimaliste */
.back-btn { 
    background: var(--card); 
    border: 1px solid var(--border); 
    color: #888; 
    padding: 8px 16px; 
    border-radius: 12px; 
    cursor: pointer; 
    font-size: 0.8rem;
    transition: 0.3s;
}

/* Localisation : La "Pill" Chic */
#display-city { 
    display: inline-block;
    font-size: 0.65rem; 
    color: var(--accent); 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    padding: 10px 20px;
    background: rgba(74, 222, 128, 0.05);
    border: 1px solid rgba(74, 222, 128, 0.1);
    border-radius: 40px;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

#display-city:hover {
    background: rgba(74, 222, 128, 0.15);
    letter-spacing: 3px;
}

/* Blocs : On supprime l'effet "boite" lourde */
.maintenance-card, .cycle-box, .info-box { 
    background: var(--card); 
    border: 1px solid var(--border); 
    border-radius: 28px; 
    padding: 25px; 
    margin-bottom: 20px; 
    backdrop-filter: blur(10px); /* Effet verre dépoli */
}

/* Grille d'infos techniques épurée */
.info-grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 12px; 
    margin: 25px 0; 
}

.info-box { 
    padding: 15px; 
    margin-bottom: 0; 
    text-align: center;
}

.info-box .label { 
    color: #666; 
    font-size: 0.55rem; 
    text-transform: uppercase; 
    margin-bottom: 4px;
}

.info-box .value { 
    font-size: 0.8rem; 
    font-weight: 500;
}

/* Barre de progression ultra-fine */
.progress-bg { 
    background: rgba(255,255,255,0.05); 
    height: 3px; 
    border-radius: 10px; 
    margin: 15px 0; 
}

.progress-fill { 
    background: var(--accent); 
    box-shadow: 0 0 15px var(--accent); /* Halo lumineux */
}

/* Titres de sections */
.section-title { 
    color: #555; 
    font-size: 0.6rem; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-bottom: 20px;
    text-align: center;
}

/* Boutons d'action */
.btn-eonia { 
    background: #fff; 
    color: #000; 
    border: none; 
    padding: 16px; 
    border-radius: 18px; 
    width: 100%; 
    font-weight: 600; 
    font-size: 0.8rem; 
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.3s;
}

.btn-eonia:active { transform: scale(0.98); }

/* Météo fluide */
#weather-container { 
    display: flex; 
    justify-content: space-around; 
    padding: 20px 0;
}

.w-day { font-size: 0.5rem; color: #555; }
.w-temp { font-size: 0.75rem; font-weight: bold; }

/* Masquer les éléments inutiles */
.location-btn { display: none; }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div class="weather-header">
                <span id="display-city">📍 Recherche...</span>
                <div>
                    <div>
    <button class="location-btn" onclick="changeLocation()">📍 Modifier ma ville</button>
</div>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse des conditions...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="" onclick="document.getElementById('lightbox-img').src=this.src; document.getElementById('lightbox').style.display='flex';">
        <h1 id="p-titre" style="font-size:2.1rem; font-weight:200; margin:0 0 5px 0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div id="cycle-area" class="cycle-box">
                <div class="section-title">Cycle de Vie Annuel</div>
                <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.55rem; color: #666;">
                    <span id="cycle-label">Chargement...</span>
                    <span id="cycle-pct">0%</span>
                </div>
            </div>

            <div class="maintenance-card" id="watering-card">
                <div class="section-title">ENTRETIEN & SUIVI</div>
                <button class="btn-eonia btn-water-theme" id="btn-water-main" onclick="handleWateringAction()">💦 Marquer comme arrosé</button>
                <div style="height: 120px; margin-top: 15px; position: relative;"><canvas id="wateringChart"></canvas></div>
                <div id="watering-history" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px;"></div>
                <div id="next-watering" style="font-size:0.6rem; color:#666; margin-top:8px;"></div>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area-2" class="hidden">
            <div id="notif-card" class="maintenance-card">
                <div class="section-title">ALERTE & RAPPEL</div>
                <button class="btn-eonia" style="border-color: #a855f7; color: #a855f7;" onclick="enableNotifications()">🔔 Activer les notifications</button>
            </div>

            <div class="maintenance-card">
                <div class="section-title">GUIDE EXPERT</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>Description</span><span>+</span></button>
                <div id="acc-desc" class="acc-content"><div class="acc-inner" id="val-desc"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-flore')"><span>Floraison</span><span>+</span></button>
                <div id="acc-flore" class="acc-content"><div class="acc-inner" id="val-flore"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>Sol & Fertilisation</span><span>+</span></button>
                <div id="acc-sol" class="acc-content"><div class="acc-inner" id="val-sol"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-health')"><span>Protection & Santé</span><span>+</span></button>
                <div id="acc-health" class="acc-content"><div class="acc-inner" id="val-health"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-asso')"><span>Plantes associées</span><span>+</span></button>
                <div id="acc-asso" class="acc-content"><div class="acc-inner" id="val-asso"></div></div>
            </div>
            
            <div id="expert-area" class="expert-card">
                <div class="section-title">Le Geste de l'Artisan — <span id="expert-month"></span></div>
                <div id="expert-text" style="font-size: 0.85rem; line-height: 1.6; color: #ddd; font-style: italic;"></div>
            </div>

            <div class="maintenance-card" id="gallery-area">
                <div class="section-title">PHOTOS D'ÉVOLUTION</div>
                <div id="evo-gallery" class="evo-scroll"></div>
                <div id="upload-zone" class="hidden">
                    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
                    <button class="btn-eonia" style="border-color:var(--accent); color:var(--accent); margin-top:10px;" onclick="document.getElementById('file-input').click()">📸 Ajouter une photo</button>
                </div>
            </div>

            <div class="maintenance-card" id="journal-card">
                <div class="section-title">TABLEAU DE BORD - JOURNAL</div>
                <div class="toggle-container">
                    <span class="toggle-label">Partager le journal (Public)</span>
                    <label class="switch"><input type="checkbox" id="journal-public-toggle" onchange="showSave()"><span class="slider"></span></label>
                </div>
                <label style="font-size: 0.55rem; color: #555;">Date de plantation</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label style="font-size: 0.55rem; color: #555; margin-top: 15px; display: block;">Observations</label>
                <textarea id="plant-note" rows="3" placeholder="Notes..." oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia btn-save-theme" onclick="saveJournal()">💾 Enregistrer</button>
            </div>
            <button class="location-btn" style="width:100%; padding: 15px; margin-bottom: 25px; justify-content: center;" onclick="sharePlant()">✨ Partager ma plante</button>
        </div>

        <div class="maintenance-card hidden" id="catalog-desc-area">
            <div class="section-title">DESCRIPTION</div>
            <div id="p-desc-catalog" style="line-height:1.8; color:#ffffff;"></div>
        </div>

        <div id="catalog-area" class="hidden">
            <button style="background:var(--accent); color:#000; border:none; padding:18px; border-radius:15px; width:100%; font-weight:800; cursor:pointer; text-transform:uppercase; margin-top:30px; margin-bottom:40px;" onclick="window.location.href='commander.html'">🏷️ Commander ma plaque ÉONIA</button>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    const isOwner = (userEmail && userPin); 
    const cacheKey = `eonia_cache_${userEmail || 'visitor'}`;

    function fixNotionValues(key, val) {
        if (!val || val === "-" || val === "") return "-";
        const v = String(val).trim();
        if (key === "Difficulté") {
            if (v === "1") return "💪"; if (v === "2") return "💪💪"; if (v === "3") return "💪💪💪";
        }
        if (key === "Exposition") {
            if (v === "1") return "☀️"; if (v === "2") return "⛅"; if (v === "3") return "☁️";
        }
        if (key === "Arrosage") {
            if (v.includes("3")) return "💧💧💧"; if (v.includes("2")) return "💧💧"; if (v.includes("1")) return "💧";
        }
        return v;
    }

    async function init() {
        if (!rawPlantId) return;
        const cachedData = localStorage.getItem(cacheKey);
        if (cachedData) {
            const plants = JSON.parse(cachedData);
            const p = plants.find(item => item.id.replace(/-/g, "").toLowerCase() === rawPlantId.replace(/-/g, "").toLowerCase());
            if (p) render(p); 
        }
        fetchUpdate(null, null, localStorage.getItem('user_city'));
    }

    async function fetchUpdate(lat, lon, city = null) {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail || "visitor@eonia.com", pin: userPin || "0000", plantId: rawPlantId, lat, lon, city }) 
            });
            const data = await res.json();
            localStorage.setItem(cacheKey, JSON.stringify(data));
            const p = data.find(item => item.id.replace(/-/g, "").toLowerCase() === rawPlantId.replace(/-/g, "").toLowerCase());
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function askLocationIfInGarden() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetchUpdate(pos.coords.latitude, pos.coords.longitude);
            }, err => console.log("Géo refusée"), { timeout: 8000 });
        }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
        const city = localStorage.getItem('user_city');
        document.getElementById('display-city').innerText = city ? "📍 " + city.toUpperCase() : "📍 VILLE ?";

        if (p.est_dans_jardin) {
            if (!city) askLocationIfInGarden();
            
            sendWaterReminder(p);
            plantHealthAI(p);

            if (p.Alertes && p.Alertes.length > 0) {
                document.getElementById('weather-wrapper').classList.remove('hidden');
                
                // --- LOGIQUE METEO AFFINÉE ---
                const today = p.Alertes[0].toLowerCase();
                const tomorrow = p.Alertes[1] ? p.Alertes[1].toLowerCase() : "";
                let advice = "";
                
                // --- LOGIQUE METEO DU WORKER ---
if (p.Conseil_Expert) {
    document.getElementById("weather-advice").innerText = p.Conseil_Expert;
} else {
    document.getElementById("weather-advice").innerText = "Analyse des conditions en cours...";
}
                document.getElementById("weather-advice").innerText = advice;

                document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                    const s = str.split('|'); 
                    const d = new Date(); d.setDate(new Date().getDate() + idx);
                    const tempDisplay = (s[2] && s[2] !== "undefined") ? s[2] : "--";
                    return `<div class="w-col">
                        <span class="w-day">${idx===0?"AUJOURD'HUI":d.toLocaleDateString('fr-FR',{weekday:'short'}).toUpperCase()}</span>
                        <span class="w-icon">${s[1]}</span>
                        <span class="w-temp" style="font-weight:bold; font-size:0.7rem;">${tempDisplay}</span>
                    </div>`;
                }).join('');
            }

            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('owner-area-2').classList.remove('hidden');
            
            if (isOwner) {
                document.getElementById('upload-zone').classList.remove('hidden');
                document.getElementById('plant-note').value = p.Note_Privee !== "-" ? p.Note_Privee : "";
                document.getElementById('plant-date').value = p.Date_Plantation !== "-" ? p.Date_Plantation : "";
                document.getElementById('journal-public-toggle').checked = (p.Journal_Public === true || p.Journal_Public === "TRUE");
            }

            const gallery = document.getElementById('evo-gallery');
            gallery.innerHTML = (p.Photos_Evolution && p.Photos_Evolution.length > 0) 
                ? p.Photos_Evolution.map(url => `
                    <div style="position:relative; flex-shrink:0;">
                        <img src="${url}" onclick="document.getElementById('lightbox-img').src='${url}'; document.getElementById('lightbox').style.display='flex';">
                        ${isOwner ? `<div onclick="deletePhoto('${url}')" style="position:absolute; top:5px; right:5px; background:rgba(255,0,0,0.7); color:white; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer;">×</div>` : ''}
                    </div>`).join('') : `<div style="color:#444; font-size:0.7rem;">Aucune photo d'évolution.</div>`;
            
            document.getElementById('val-desc').innerText = p.Description_Technique || p.Description || "-";
            document.getElementById('val-flore').innerText = p.Floraison || "-";
            document.getElementById('val-sol').innerText = p["Sol et fertilisation"] || "-";
            document.getElementById('val-health').innerText = p["Protection et santé"] || "-";
            document.getElementById('val-asso').innerText = p["Campagnonnage/ Plantes associées"] || "-";
            
            const h = document.getElementById('watering-history');
            if (p.Historique_Data && p.Historique_Data !== "-") {
                const uniqueDates = [...new Set(p.Historique_Data.split(',').map(d => d.trim()))].filter(d => d !== "");
                h.innerHTML = uniqueDates.slice().reverse().map(date => `<span class="history-tag">${date}${isOwner ? `<b onclick="deleteWatering('${date}')" style="color:var(--error); cursor:pointer; padding-left:5px;">×</b>` : ''}</span>`).join('');
                if (isOwner && uniqueDates.includes(new Date().toLocaleDateString('fr-FR'))) {
                    const btn = document.getElementById('btn-water-main'); btn.innerText = "✅ Arrosé aujourd'hui"; btn.className = "btn-eonia btn-disabled"; btn.onclick = null;
                } else if (isOwner) {
                    const btn = document.getElementById('btn-water-main'); btn.innerText = "💦 Marquer comme arrosé"; btn.className = "btn-eonia btn-water-theme"; btn.onclick = handleWateringAction;
                }
            }
            updateWateringChart(p.Historique_Data);
            updateNextWatering(p.Historique_Data);
            updateExtraFeatures();
        } else {
            document.getElementById('catalog-area').classList.remove('hidden');
            document.getElementById('catalog-desc-area').classList.remove('hidden');
            document.getElementById('p-desc-catalog').innerText = p.Description || "";
        }
        const fds = [
            {l:"Famille", v:p.Famille, h:true}, {l:"Type", v:p.Type, h:true},
            {l:"Persistance", v:p.Persistance}, {l:"Taille Adulte", v: p["Taille à maturité"] || p["Taille maturité"]},
            {l:"Difficulté", v: fixNotionValues("Difficulté", p.Difficulté)}, 
            {l:"Arrosage", v: fixNotionValues("Arrosage", p.Arrosage)},
            {l:"Exposition", v: fixNotionValues("Exposition", p.Exposition)}, 
            {l:"Rusticité", v:p.Rusticité}
        ];
        document.getElementById('p-grid').innerHTML = fds.map(f => `<div class="info-box ${f.h ? 'highlight' : ''}"><div class="label">${f.l}</div><div class="value">${f.v||"-"}</div></div>`).join('');
    }

    function updateWateringChart(historyData) {
        const ctx = document.getElementById('wateringChart').getContext('2d');
        const dates = historyData && historyData !== "-" ? historyData.split(',').map(d => d.trim()) : [];
        const labels = []; const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const format = d.toLocaleDateString('fr-FR');
            labels.push(format.split('/')[0] + '/' + format.split('/')[1]);
            data.push(dates.includes(format) ? 1 : 0.3);
        }
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data, backgroundColor: data.map(v => v===1?'#38bdf8':'#1a1a1a'), barPercentage: 0.2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, max: 1.1 }, x: { grid: { display: false }, ticks: { color: '#666', font: { size: 9 } } } } } });
    }

    async function handleWateringAction() { await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'water' })}); fetchUpdate(); }
    
    async function deleteWatering(date) { 
        if (!confirm(`Supprimer l'arrosage du ${date} ?`)) return; 
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'delete_watering', date: date })}); 
        if(res.ok) fetchUpdate();
    }
    
    async function deletePhoto(photoUrl) { 
        if (!confirm("Supprimer cette photo ?")) return; 
        try {
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'delete_photo', photoUrl }) }); 
            if(res.ok) fetchUpdate(); 
        } catch(e) { alert("Erreur suppression"); }
    }

    async function uploadPhoto(input) { const formData = new FormData(); formData.append('file', input.files[0]); formData.append('action', 'upload_photo_binaire'); formData.append('plantId', rawPlantId); formData.append('email', userEmail); formData.append('pin', userPin); await fetch(API_URL, { method: 'POST', body: formData }); fetchUpdate(); }
    
    async function saveJournal() { const note = document.getElementById('plant-note').value; const date = document.getElementById('plant-date').value; const isPublic = document.getElementById('journal-public-toggle').checked; await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note, date_plantation: date, journal_public: isPublic })}); document.getElementById('btn-save-note').style.display = "none"; fetchUpdate(); }
    
    function toggleAcc(id) { const c = document.getElementById(id); c.style.maxHeight = (c.style.maxHeight && c.style.maxHeight !== "0px") ? "0px" : c.scrollHeight + "px"; }
    
    function updateNextWatering(historyData){
        if(!historyData || historyData==="-") return;
        const dates = historyData.split(',').map(d=>d.trim());
        const last = dates[dates.length-1]; if(!last) return;
        const parts = last.split('/');
        const lastDate = new Date(parts[2],parts[1]-1,parts[0]);
        const next = new Date(lastDate); next.setDate(next.getDate()+3);
        document.getElementById("next-watering").innerText = "Prochain arrosage conseillé : "+next.toLocaleDateString("fr-FR");
    }

    function updateExtraFeatures() {
        const now = new Date(); const m = now.getMonth();
        const pct = Math.round((Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000) / 365) * 100);
        document.getElementById('cycle-fill').style.width = pct + "%";
        document.getElementById('cycle-pct').innerText = pct + "%";
        const labels = ["Repos hivernal", "Repos hivernal", "Réveil printanier 🌱", "Croissance active 🌱", "Pleine sève ☀️", "Floraison 🌸", "Stabilité ☀️", "Maturation", "Préparation au repos", "Couleurs d'automne", "Dormance", "Repos"];
        document.getElementById('cycle-label').innerText = labels[m];
        const tips = ["Paillage épais recommandé.", "Supprimez le bois mort.", "Apport d'engrais organique.", "Surveillez les jeunes pousses.", "Binez le sol pour aérer.", "Arrosez généreusement le soir.", "Maintenez le pied humide.", "Taillez les fleurs fanées.", "Réduisez l'eau doucement.", "Installez les voiles d'hivernage.", "Laissez les feuilles au sol.", "La plante dort, ne taillez pas."];
        document.getElementById('expert-month').innerText = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"][m];
        document.getElementById('expert-text').innerText = tips[m];
    }

    function showSave() { if(isOwner) document.getElementById('btn-save-note').style.display = "block"; }
    function changeLocation() { const c = prompt("Ville :"); if(c){ localStorage.setItem('user_city', c); fetchUpdate(null, null, c); }}
    function sharePlant() { const url = window.location.href; navigator.share ? navigator.share({title: 'Ma plante', url}) : window.prompt("Lien :", url); }

    function enableNotifications() {
        if (!("Notification" in window)) return alert("Non supporté");
        Notification.requestPermission().then(permission => {
            if (permission === "granted") new Notification("🌿 ÉONIA activé", { body: "Notifications actives." });
        });
    }

    function sendWaterReminder(p) {
        if (Notification.permission !== "granted") return;
        const last = p.Historique_Data?.split(',').pop(); if (!last) return;
        const parts = last.trim().split('/'); if(parts.length < 3) return;
        const diff = (new Date() - new Date(parts[2], parts[1]-1, parts[0])) / (1000 * 60 * 60 * 24);
        if (diff >= 3) new Notification("💧 ÉONIA - Arrosage", { body: "Votre plante a besoin d’eau." });
    }

    function plantHealthAI(p) {
        let score = 100;
        if (p.Historique_Data && p.Historique_Data !== "-") {
            const days = p.Historique_Data.split(',').length;
            if (days < 2) score -= 30; if (days < 5) score -= 15;
        } else { score -= 40; }
        let status = score >= 85 ? "🟢 Plante en pleine santé" : (score >= 60 ? "🟡 Plante correcte" : "🔴 Attention : stress détecté");
        let color = score >= 85 ? "#4ade80" : (score >= 60 ? "#facc15" : "#f87171");
        let el = document.getElementById("plant-ai");
        if (!el) {
            el = document.createElement("div"); el.id = "plant-ai"; el.className = "maintenance-card";
            const parent = document.getElementById("owner-area");
            parent.insertBefore(el, parent.firstChild);
        }
        el.innerHTML = `<div style="color:${color}; font-size:0.6rem; text-transform:uppercase; letter-spacing:1.5px; font-weight:bold;">🌱 IA ÉONIA — SANTÉ</div>
                        <div style="font-size:0.9rem; margin-top:8px;">${status} <span style="opacity:0.5; font-size:0.7rem;">(${score}/100)</span></div>`;
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <style>
        :root { --accent: #4ade80; --bg: #0a0a0a; --card: #161616; --text-dim: #aaa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; }

        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .back-nav { display: block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .hero-img { width: 100%; height: 35vh; object-fit: cover; border-bottom: 1px solid #222; background: #111; }

        .container { padding: 30px 20px 80px 20px; max-width: 700px; margin: auto; }

        #plant-name { font-size: 3rem; font-weight: 800; text-transform: uppercase; line-height: 0.9; margin-bottom: 5px; }
        #plant-surnom { color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 25px; }

        .specs-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
            background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 25px;
        }
        .spec-item span { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .spec-item p { font-size: 0.85rem; color: #eee; font-weight: 500; }

        .menu-item { border-bottom: 1px solid #222; }
        .menu-header { 
            width: 100%; background: none; border: none; color: #fff; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 0; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-transform: uppercase;
        }
        .menu-header::after { content: '+'; color: var(--accent); }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; color: var(--text-dim); font-size: 0.9rem; padding-right: 10px; }
        .menu-item.active .menu-content { max-height: 1000px; padding-bottom: 25px; }
        .menu-item.active .menu-header::after { content: '−'; }

        #status-msg { text-align: center; padding: 50px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
        footer { text-align: center; padding: 60px; opacity: 0.2; font-size: 0.5rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.2rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 200;">ÉONIA</div>
        <a href="catalogue.html" class="back-nav">← Retour au catalogue</a>
    </header>

    <div id="status-msg">Chargement de la mémoire végétale...</div>

    <div id="plant-details" style="display:none;">
        <img src="" id="main-img" class="hero-img">
        
        <div class="container">
            <h1 id="plant-name"></h1>
            <p id="plant-surnom"></p>

            <div class="specs-grid">
                <div class="spec-item"><span>Famille</span><p id="info-famille"></p></div>
                <div class="spec-item"><span>Exposition</span><p id="info-expo"></p></div>
                <div class="spec-item"><span>Rusticité</span><p id="info-rust"></p></div>
                <div class="spec-item"><span>Difficulté</span><p id="info-diff"></p></div>
            </div>

            <div class="menu-item">
                <button class="menu-header" onclick="this.parentElement.classList.toggle('active')">Description</button>
                <div class="menu-content" id="desc-text"></div>
            </div>

            <div class="menu-item">
                <button class="menu-header" onclick="this.parentElement.classList.toggle('active')">Entretien & Arrosage</button>
                <div class="menu-content">
                    <p><strong>Arrosage :</strong> <span id="info-arrosage"></span></p><br>
                    <p><strong>Entretien :</strong> <span id="info-entretien"></span></p>
                </div>
            </div>
            
            <div class="menu-item">
                <button class="menu-header" onclick="this.parentElement.classList.toggle('active')">Sol & Fertilisation</button>
                <div class="menu-content" id="info-sol"></div>
            </div>
        </div>
    </div>

    <footer>ÉONIA — MÉMOIRE VÉGÉTALE</footer>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function loadDetails() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const page = data.results.find(p => p.id === id);

            if (page) {
                const p = page.properties;

                // FONCTION MAGIQUE : Elle extrait le texte peu importe le format Notion
                const getTxt = (name) => {
                    const prop = p[name];
                    if (!prop) return "Non renseigné";
                    
                    // Si c'est un Titre ou du Texte Riche
                    if (prop.title) return prop.title.map(t => t.plain_text).join('') || "NC";
                    if (prop.rich_text) return prop.rich_text.map(t => t.plain_text).join('') || "NC";
                    
                    // Si c'est un Menu Déroulant (Select)
                    if (prop.select) return prop.select.name || "NC";
                    
                    // Si c'est un Menu Multi-sélection
                    if (prop.multi_select) return prop.multi_select.map(s => s.name).join(', ') || "NC";
                    
                    return "NC";
                };

                // --- REMPLISSAGE DES CHAMPS ---
                document.getElementById('plant-name').innerText = getTxt("Nom commun");
                document.getElementById('plant-surnom').innerText = getTxt("Surnom de ma plante");
                
                // Infos du haut
                document.getElementById('info-famille').innerText = getTxt("Famille");
                document.getElementById('info-expo').innerText = getTxt("Exposition");
                document.getElementById('info-rust').innerText = getTxt("Rusticite");
                document.getElementById('info-diff').innerText = getTxt("Difficulte");

                // Menus déroulants (Accordéons)
                document.getElementById('desc-text').innerText = getTxt("Description");
                document.getElementById('info-arrosage').innerText = getTxt("Arrosage");
                document.getElementById('info-entretien').innerText = getTxt("Entretien");
                document.getElementById('info-sol').innerText = getTxt("Sol et fertilisation");

                // GESTION DE L'IMAGE
                const imgCol = p["Photo"]?.files?.[0];
                const imgUrl = imgCol?.file?.url || imgCol?.external?.url || page.cover?.external?.url || page.cover?.file?.url || "";
                if (imgUrl) {
                    document.getElementById('main-img').src = imgUrl;
                }

                // Affichage final
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('plant-details').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Erreur de connexion aux données.";
            console.error(e);
        }
    }
    loadDetails();
</script>

</body>
</html>

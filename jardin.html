<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --blue: #00aaff; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: #fff;
font-family: 'Raleway', sans-serif;
-webkit-font-smoothing: antialiased;
}

/* LOADER */
#loader {
position: fixed;
inset: 0;
background: #000;
z-index: 9999;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.spinner-logo {
width: 60px;
animation: spin 2s linear infinite;
margin-bottom: 15px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.load-txt {
font-size: 0.6rem;
letter-spacing: 3px;
color: var(--accent);
text-transform: uppercase;
}

.container {
max-width: 850px;
margin: auto;
padding: 20px 15px 120px;
opacity: 0;
transition: 0.5s;
}

.container.loaded { opacity: 1; }

/* TOP BUTTON */
#backToTop {
display: none;
position: fixed;
bottom: 25px;
right: 20px;
z-index: 1000;
width: 45px;
height: 45px;
background: var(--accent);
color: #000;
border: none;
border-radius: 50%;
cursor: pointer;
font-size: 1.2rem;
font-weight: bold;
}

/* WEATHER (IMPORTANT FIX) */
.weather-bar {
display: flex;
flex-direction: row;
justify-content: space-between;
gap: 10px;
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 12px;
margin-bottom: 25px;
}

.weather-item {
flex: 1;
text-align: center;
padding: 5px;
}

.weather-item span {
display: block;
font-size: 0.55rem;
color: #888;
margin-bottom: 4px;
text-transform: uppercase;
}

.weather-item b {
font-size: 0.75rem;
color: #fff;
}

/* HERO */
.hero-wrapper {
width: calc(100% + 40px);
margin-left: -20px;
border-radius: 0 0 30px 30px;
overflow: hidden;
margin-bottom: 25px;
}

.hero-img {
width: 100%;
aspect-ratio: 16/9;
object-fit: cover;
}

/* TITRES */
h1 {
font-size: 2rem;
font-weight: 200;
text-transform: uppercase;
}

.sci-name {
color: var(--accent);
font-size: 0.85rem;
margin-bottom: 20px;
}

/* GRID */
.info-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin-bottom: 25px;
}

.info-box {
background: var(--card);
border: 1px solid var(--border);
padding: 12px;
border-radius: 12px;
}

.label {
color: var(--accent);
font-size: 0.5rem;
text-transform: uppercase;
margin-bottom: 4px;
}

.value {
font-size: 0.85rem;
color: #eee;
}

/* BLOCKS */
.dash-block {
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 20px;
margin-bottom: 20px;
}

.block-title {
font-size: 0.6rem;
color: var(--accent);
text-transform: uppercase;
margin-bottom: 15px;
}

textarea, input[type="date"] {
width: 100%;
background: #080808;
border: 1px solid #1a1a1a;
color: #fff;
padding: 12px;
border-radius: 10px;
}

.btn-main {
width: 100%;
padding: 16px;
border-radius: 40px;
border: 1px solid var(--accent);
background: transparent;
color: var(--accent);
cursor: pointer;
text-transform: uppercase;
font-size: 0.7rem;
}

.btn-save {
background: var(--accent);
color: #000;
border: none;
}

.mon-jardin-only, .collection-only {
display: none;
}

</style>
</head>

<body>

<div id="loader">
<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo">
<div class="load-txt">Téléchargement...</div>
</div>

<button id="backToTop">↑</button>

<div class="container" id="app">

<button onclick="history.back()" style="margin-bottom:20px;background:none;border:1px solid var(--accent);color:var(--accent);padding:7px 18px;border-radius:40px;">
← RETOUR
</button>

<!-- WEATHER FIXÉ -->
<div class="weather-bar mon-jardin-only" id="weatherBar"></div>

<div class="hero-wrapper">
<img id="p-photo" class="hero-img">
</div>

<h1 id="p-titre">...</h1>
<div id="p-sci" class="sci-name">...</div>

<div class="info-grid" id="p-grid"></div>

<div class="dash-block">
<div class="block-title">DESCRIPTION</div>
<p id="p-desc"></p>
</div>

</div>

<script>

const API_URL = "https://eonia-api.santhimi.workers.dev";
const plantId = new URLSearchParams(window.location.search).get('id');

async function load() {

const res = await fetch(API_URL, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({
plantId,
email: localStorage.getItem('user_email') || "invite@eonia.com"
})
});

const data = await res.json();
const p = data.find(x => x.id === plantId);

if (!p) return;

document.getElementById("p-photo").src = p.Photo;
document.getElementById("p-titre").innerText = p["Nom commun"];
document.getElementById("p-sci").innerText = p["Nom scientifique"];
document.getElementById("p-desc").innerText = p.Description;

/* GRID */
document.getElementById("p-grid").innerHTML = `
<div class="info-box"><div class="label">TYPE</div><div class="value">${p.Type}</div></div>
<div class="info-box"><div class="label">EXPOSITION</div><div class="value">${p.Exposition}</div></div>
<div class="info-box"><div class="label">ARROSAGE</div><div class="value">${p.Arrosage}</div></div>
<div class="info-box"><div class="label">DIFFICULTÉ</div><div class="value">${p.Difficulté}</div></div>
`;

/* WEATHER FIX PROPRE */
loadWeather();

/* SHOW */
document.getElementById("loader").style.display = "none";
document.getElementById("app").classList.add("loaded");

}

/* METEO FIABLE */
async function loadWeather() {

try {

const url = "https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522&daily=temperature_2m_max&timezone=auto";

const res = await fetch(url);
const data = await res.json();

const days = data.daily.time.slice(0, 4);
const temps = data.daily.temperature_2m_max.slice(0, 4);

document.getElementById("weatherBar").innerHTML =
days.map((d, i) => {
const date = new Date(d);
const label = date.toLocaleDateString("fr-FR", { weekday: "short" });

return `
<div class="weather-item">
<span>${label}</span>
<b>${Math.round(temps[i])}°</b>
</div>
`;
}).join("");

} catch (e) {
console.log("Météo error", e);
}

}

/* TOP BUTTON */
window.onscroll = () => {
document.getElementById("backToTop").style.display =
window.scrollY > 300 ? "block" : "none";
};

document.getElementById("backToTop").onclick = () =>
window.scrollTo({ top: 0, behavior: "smooth" });

load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Expertise Botanique</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; line-height: 1.6; }
        
        #status-msg { text-align: center; padding: 50px; color: #4ade80; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
        
        /* Interfaces */
        #config-plaque, #plant-details { display: none; }
        
        .main-img-container { width: 100%; height: 45vh; overflow: hidden; border-bottom: 2px solid #4ade80; background: #111; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .content-padding { padding: 25px 20px; max-width: 800px; margin: 0 auto; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 4px; color: #4ade80; font-size: 1.6rem; margin-bottom: 10px; }
        
        .grid-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .info-item { background: #0c0c0c; padding: 12px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .label { font-size: 0.55rem; text-transform: uppercase; color: #555; display: block; margin-bottom: 4px; }
        .value { font-size: 0.8rem; color: #ddd; }
        
        #espace-proprietaire { border: 1px solid #4ade80; padding: 20px; border-radius: 12px; margin-top: 30px; background: rgba(74, 222, 128, 0.05); }
        .vip-title { color: #4ade80; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        
        .btn-action { width: 100%; padding: 15px; background: #4ade80; border: none; color: #000; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; border-radius: 50px; margin-top: 10px; }
        .btn-logout { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; margin-top: 30px; }
        
        .chart-container { height: 180px; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="status-msg">Analyse de la plaque...</div>

    <div id="config-plaque" class="content-padding" style="text-align: center; padding-top: 100px;">
        <h1>Nouvelle Plaque</h1>
        <p style="color:#bbb; margin-bottom:30px;">Bonjour, cette plaque n'est pas encore associée à votre jardin.</p>
        <button onclick="allerAuCatalogue()" class="btn-action">Choisir une plante pour cette plaque</button>
        <button onclick="deconnexion()" class="btn-logout btn-action">Se déconnecter</button>
    </div>

    <div id="plant-details">
        <div class="main-img-container">
            <img id="main-img" src="" alt="Spécimen">
        </div>

        <div class="content-padding">
            <h1 id="nom-commun">...</h1>
            <p id="nom-scientifique" style="font-style:italic; color:#666; margin-bottom:20px;"></p>

            <div class="grid-info">
                <div class="info-item"><span class="label">Famille</span><span id="famille" class="value">-</span></div>
                <div class="info-item"><span class="label">Exposition</span><span id="exposition" class="value">-</span></div>
            </div>

            <div id="espace-proprietaire">
                <h2 class="vip-title">Mon Tableau de Bord</h2>
                <div class="grid-info" style="margin-top:0;">
                    <div class="info-item"><span class="label">Plantée le</span><span id="date-plant" class="value">-</span></div>
                    <div class="info-item"><span class="label">ID Plaque</span><span id="plaque-id-display" class="value">-</span></div>
                </div>
                <div class="chart-container"><canvas id="arrosageChart"></canvas></div>
                <button onclick="alert('Soin enregistré !')" class="btn-action">Valider un arrosage</button>
            </div>

            <button onclick="deconnexion()" class="btn-logout btn-action">Déconnexion</button>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    let currentPlaqueId = "";

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        currentPlaqueId = params.get('id');
        
        const userEmail = localStorage.getItem('user_email');
        const userPin = localStorage.getItem('user_pin');

        // 1. SI PAS DE SESSION -> LOGIN DIRECT
        if (!userEmail || !userPin) {
            window.location.href = "index.html" + (currentPlaqueId ? "?id=" + currentPlaqueId : "");
            return;
        }

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: currentPlaqueId, 
                    email: userEmail,
                    pin: userPin
                })
            });
            const data = await res.json();
            const p = data[0];

            // 2. CAS PLAQUE NEUVE
            if (currentPlaqueId && p && !p.aUnePlante) {
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('config-plaque').style.display = 'block';
                return;
            }

            // 3. CAS ACCÈS AUTORISÉ (Propriétaire)
            if (p && p.estProprietaire) {
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('plant-details').style.display = 'block';
                
                document.getElementById('nom-commun').innerText = p["Nom commun"] || "Spécimen";
                document.getElementById('nom-scientifique').innerText = p["Nom scientifique"] || "";
                document.getElementById('famille').innerText = p["Famille"] || "-";
                document.getElementById('exposition').innerText = p["Exposition"] || "-";
                document.getElementById('date-plant').innerText = p["Date de plantation"] || "Non renseignée";
                document.getElementById('plaque-id-display').innerText = currentPlaqueId;
                document.getElementById('main-img').src = p["Photo"] || "";
                
                initChart();
            } else {
                // Si la plaque appartient à quelqu'un d'autre
                document.getElementById('status-msg').innerText = "Accès refusé : cette plaque ne vous appartient pas.";
            }

        } catch (e) {
            document.getElementById('status-msg').innerText = "Erreur de connexion aux serveurs ÉONIA.";
        }
    };

    function deconnexion() {
        if(confirm("Voulez-vous vous déconnecter ?")) {
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_pin');
            window.location.href = "index.html";
        }
    }

    function allerAuCatalogue() {
        localStorage.setItem('plaque_en_cours_de_liaison', currentPlaqueId);
        window.location.href = "catalogue.html";
    }

    function initChart() {
        const ctx = document.getElementById('arrosageChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['S1', 'S2', 'S3', 'S4'],
                datasets: [{
                    label: 'Humidité',
                    data: [60, 45, 70, 50],
                    borderColor: '#4ade80',
                    backgroundColor: 'rgba(74, 222, 128, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { grid: { display: false } } }
            }
        });
    }
</script>
</body>
</html>

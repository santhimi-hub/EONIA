<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; --error: #f87171; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        /* Visibilité améliorée pour les textes secondaires */
        #display-city { font-size: 0.65rem; color: #ddd; text-transform: uppercase; letter-spacing: 1px; }
        .w-day { font-size: 0.6rem; color: #eee; font-weight: bold; }
        .w-temp { font-size: 0.85rem; color: #fff; }
        #weather-advice { background: rgba(74, 222, 128, 0.15); border: 1px solid var(--border); border-top: none; border-radius: 0 0 24px 24px; padding: 12px; font-size: 0.85rem; color: var(--accent); text-align: center; font-style: italic; }
        
        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .sci-name { color: var(--accent); font-size: 0.9rem; font-style: italic; margin-bottom: 20px; opacity: 1; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box.highlight { border-left: 3px solid var(--accent); }
        .info-box .label { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.95rem; color: #fff; }

        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: bold; }
        .acc-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.75rem; border-top: 1px solid var(--border); }
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; font-size: 0.95rem; color: #eee; line-height: 1.6; }
        
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-water-theme { border-color: var(--water); color: var(--water); }
        .history-tag { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; color: #fff; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }
        
        #plant-date, #plant-note { width: 100%; background: #111 !important; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        .input-label { font-size: 0.65rem; color: #ccc; text-transform: uppercase; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span id="display-city">📍 Recherche...</span>
                <button style="background:none; border:1px solid #444; color:#fff; font-size:0.6rem; padding:5px 10px; border-radius:20px;" onclick="changeLocation()">Changer ville</button>
            </div>
            <div id="weather-container" style="background:rgba(255,255,255,0.05); border-radius:24px 24px 0 0; padding:20px; display:flex; justify:center; gap:10px;"></div>
            <div id="weather-advice"></div>
        </div>
        
        <img id="p-photo" class="hero-img" src="">
        <h1 id="p-titre" style="font-size:2.1rem; font-weight:200; margin:0 0 5px 0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card" id="watering-card">
                <div class="section-title">SUIVI D'ARROSAGE</div>
                <div style="width:100%; height:180px; margin-bottom:20px;"><canvas id="wateringChart"></canvas></div>
                <button class="btn-eonia btn-water-theme" id="btn-water-main" onclick="handleWateringAction()">💦 Marquer comme arrosé</button>
                <div id="watering-history" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:15px;"></div>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area-2" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">GUIDE EXPERT</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>Description</span><span>+</span></button>
                <div id="acc-desc" class="acc-content"><div style="padding:15px 0;" id="val-desc"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>Sol & Soins</span><span>+</span></button>
                <div id="acc-sol" class="acc-content"><div style="padding:15px 0;" id="val-sol"></div></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">NOTES DU JARDINIER</div>
                <label class="input-label">Date de plantation</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label class="input-label">Observations</label>
                <textarea id="plant-note" rows="3" oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia" style="border-color:var(--accent); color:var(--accent); display:none;" onclick="saveJournal()">💾 Enregistrer</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    const isOwner = (userEmail && userPin);

    // --- LA TRADUCTRICE DE CHIFFRES NOTION ---
    function translateNotion(key, value) {
        if (!value || value === "-") return "-";
        
        if (key === "Difficulté") {
            const diff = { "1": "💪 Débutant", "2": "💪💪 Intermédiaire", "3": "💪💪💪 Expert" };
            return diff[value] || value;
        }
        if (key === "Exposition") {
            const expo = { "1": "☀️ Plein Soleil", "2": "⛅ Mi-ombre", "3": "☁️ Ombre" };
            return expo[value] || value;
        }
        return value;
    }

    async function init() {
        if (!rawPlantId) return;
        fetchUpdate(null, null, localStorage.getItem('user_city'));
    }

    async function fetchUpdate(lat, lon, city = null) {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail || "invite@eonia.com", pin: userPin || "0000", plantId: rawPlantId, lat, lon, city }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "") === rawPlantId.replace(/-/g, "") || item.id === rawPlantId);
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('owner-area-2').classList.remove('hidden');
            
            if (p.Alertes) {
                document.getElementById('weather-wrapper').classList.remove('hidden');
                document.getElementById('weather-advice').innerText = p.Alertes[0].split('|')[0];
                document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                    const s = str.split('|');
                    return `<div style="flex:1; text-align:center;"><div class="w-day">${idx==0?"AUJ.":"J+"+idx}</div><div style="font-size:1.2rem;margin:5px 0;">${s[1]}</div><div class="w-temp">${s[2]}</div></div>`;
                }).join('');
            }

            if (isOwner) {
                document.getElementById('plant-note').value = p.Note_Privee || "";
                document.getElementById('plant-date').value = p.Date_Plantation || "";
            }

            document.getElementById('val-desc').innerText = p.Description || "-";
            document.getElementById('val-sol').innerText = p["Sol et fertilisation"] || "-";

            const h = document.getElementById('watering-history');
            if (p.Historique_Data && p.Historique_Data !== "-") {
                h.innerHTML = p.Historique_Data.split(',').slice(0, 5).map(date => `<span class="history-tag">${date.trim()}</span>`).join('');
                updateChart(p.Historique_Data);
            }
        }

        // --- AFFICHAGE DES INFOS AVEC TRADUCTION ---
        const fields = [
            {l:"Difficulté", v: translateNotion("Difficulté", p.Difficulté)},
            {l:"Exposition", v: translateNotion("Exposition", p.Exposition)},
            {l:"Arrosage", v: p.Arrosage},
            {l:"Rusticité", v: p.Rusticité}
        ];
        document.getElementById('p-grid').innerHTML = fields.map(f => `
            <div class="info-box">
                <div class="label">${f.l}</div>
                <div class="value">${f.v || "-"}</div>
            </div>`).join('');
    }

    function updateChart(data) {
        const ctx = document.getElementById('wateringChart').getContext('2d');
        const counts = {}; // Simplifié pour l'exemple
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['S-3', 'S-2', 'S-1', 'S-0'], datasets: [{ data: [1, 2, 1, 3], borderColor: '#38bdf8', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#aaa' } } } }
        });
    }

    function toggleAcc(id) {
        const el = document.getElementById(id);
        el.style.maxHeight = el.style.maxHeight === "0px" || !el.style.maxHeight ? el.scrollHeight + "px" : "0px";
    }

    function showSave() { if(isOwner) document.getElementById('btn-save-note').style.display = "block"; }

    async function saveJournal() {
        const note = document.getElementById('plant-note').value;
        const date = document.getElementById('plant-date').value;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note, date_plantation: date }) 
        });
        document.getElementById('btn-save-note').style.display = "none";
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; }

        /* HEADER FIXE (Recherche & Filtres) */
        .header-sticky { 
            position: sticky; top: 0; z-index: 100;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            padding: 20px 15px; border-bottom: 1px solid var(--border);
        }
        .search-box {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 40px; color: #fff;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }
        .filter-bar {
            display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px;
        }
        .filter-chip {
            padding: 7px 15px; border-radius: 20px; border: 1px solid var(--border);
            font-size: 0.7rem; white-space: nowrap; color: #888; cursor: pointer;
        }
        .filter-chip.active { border-color: var(--accent); color: var(--accent); }

        /* GRILLE DE PLANTES */
        .catalog-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; padding: 20px 15px; 
        }
        .plant-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border); text-decoration: none; color: inherit;
        }
        .plant-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .plant-info { padding: 12px; }
        .plant-name { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }

        /* BULLE IA (BAS GAUCHE) */
        #ai-bubble {
            position: fixed; bottom: 25px; left: 20px; z-index: 1000;
            width: 55px; height: 55px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); cursor: pointer;
            border: 2px solid var(--accent);
        }
        #ai-bubble img { width: 30px; }
        
        /* FENÊTRE CONSEIL IA */
        #ai-chat {
            display: none; position: fixed; bottom: 90px; left: 20px; width: 280px;
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 15px; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ai-chat h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; }
        #ai-chat p { font-size: 0.75rem; color: #bbb; line-height: 1.4; }

        /* BOUTON TOP (BAS DROITE) */
        #backToTop {
            display: none; position: fixed; bottom: 25px; right: 20px; z-index: 1000;
            width: 45px; height: 45px; background: var(--accent); color: #000;
            border: none; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <input type="text" class="search-box" id="searchInput" placeholder="Rechercher une plante (ex: Monstera)...">
        <div class="filter-bar">
            <div class="filter-chip active">Tout</div>
            <div class="filter-chip">Intérieur</div>
            <div class="filter-chip">Extérieur</div>
            <div class="filter-chip">Facile</div>
            <div class="filter-chip">Ombre</div>
        </div>
    </div>

    <div class="catalog-grid" id="catalogList">
        </div>

    <div id="ai-bubble" onclick="toggleAIChat()">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" alt="IA">
    </div>
    <div id="ai-chat">
        <h3>Assistant ÉONIA</h3>
        <p id="ai-text">Bonjour ! Je peux vous aider à choisir une plante selon votre exposition ou vous expliquer comment utiliser votre plaque connectée. Que cherchez-vous ?</p>
    </div>

    <button id="backToTop">↑</button>

<script>
    // 1. GESTION DU RETOUR EN HAUT
    const topBtn = document.getElementById("backToTop");
    window.onscroll = function() {
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
            topBtn.style.display = "block";
        } else {
            topBtn.style.display = "none";
        }
    };
    topBtn.onclick = function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 2. GESTION DE LA BULLE IA
    function toggleAIChat() {
        const chat = document.getElementById('ai-chat');
        chat.style.display = (chat.style.display === 'block') ? 'none' : 'block';
    }

    // 3. RECHERCHE EN TEMPS RÉEL (Logique simplifiée)
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.plant-card');
        cards.forEach(card => {
            const name = card.querySelector('.plant-name').innerText.toLowerCase();
            card.style.display = name.includes(term) ? 'block' : 'none';
        });
    });

    // Note : Intégrer ici ton fetch(API_URL) pour remplir la grille catalogList
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        /* Météo */
        #weather-wrapper { margin-bottom: 25px; }
        #weather-container { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        .w-col { text-align: center; }
        .w-day { font-size: 0.6rem; color: #666; display: block; margin-bottom: 5px; }
        .w-icon { font-size: 1.2rem; display: block; }
        .w-temp { font-size: 0.75rem; }

        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; margin-bottom: 20px; opacity: 0.7; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; margin-bottom: 5px; }
        .info-box .value { font-size: 0.85rem; }

        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-buy { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 30px; }
        
        .acc-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 12px 0; display: flex; justify-content: space-between; border-top: 1px solid var(--border); cursor: pointer; font-size: 0.7rem; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div id="weather-container"></div>
        </div>
        
        <img id="p-photo" class="hero-img" src="">
        <h1 id="p-titre" style="font-size:2rem; margin:0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="info-grid" id="p-grid"></div>

        <div class="maintenance-card">
            <div class="section-title">Informations détaillées</div>
            <div id="p-desc-base" style="font-size:0.9rem; color:#ccc; line-height:1.6; margin-bottom:15px;"></div>
            
            <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>Sol & Entretien</span><span>+</span></button>
            <div id="acc-sol" class="acc-content"><div style="padding:10px 0;" id="val-sol"></div></div>
            
            <button class="acc-btn" onclick="toggleAcc('acc-asso')"><span>Plantes associées</span><span>+</span></button>
            <div id="acc-asso" class="acc-content"><div style="padding:10px 0;" id="val-asso"></div></div>
        </div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">Mon Journal</div>
                <p id="display-note" style="font-style:italic; font-size:0.85rem;"></p>
                <button class="btn-eonia" onclick="alert('Fonction d\'édition bientôt disponible')">Modifier mes notes</button>
            </div>
        </div>

        <div id="catalog-area" class="hidden">
            <button class="btn-eonia btn-buy" onclick="window.location.href='commander.html'">🏷️ Commander cette plante</button>
        </div>
    </div>

<script>
    // Config
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const plantId = urlParams.get('id');

    // Identité
    const userEmail = localStorage.getItem('user_email') || "visitor@eonia.com";
    const userPin = localStorage.getItem('user_pin') || "0000";
    const isRealOwner = (userEmail !== "visitor@eonia.com" && userEmail !== "invite@eonia.com");

    async function loadPlant() {
        if (!plantId) return;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: userEmail,
                    pin: userPin,
                    plantId: plantId
                })
            });
            const data = await res.json();
            
            // On cherche la plante dans les données reçues
            const p = data.find(item => item.id === plantId || item.id.replace(/-/g,"") === plantId.replace(/-/g,""));
            
            if (p) render(p);
            else document.body.innerHTML = "<div class='container'>Plante introuvable.</div>";

        } catch (e) {
            console.error("Erreur chargement:", e);
        }
    }

    function render(p) {
        // Remplissage de base
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
        document.getElementById('p-desc-base').innerText = p.Description || "";
        document.getElementById('val-sol').innerText = p["Sol et fertilisation"] || "-";
        document.getElementById('val-asso').innerText = p["Campagnonnage/ Plantes associées"] || "-";

        // Grille d'infos
        const specs = [
            {l:"Famille", v:p.Famille},
            {l:"Type", v:p.Type},
            {l:"Arrosage", v:p.Arrosage},
            {l:"Exposition", v:p.Exposition}
        ];
        document.getElementById('p-grid').innerHTML = specs.map(s => `
            <div class="info-box">
                <div class="label">${s.l}</div>
                <div class="value">${s.v || "-"}</div>
            </div>
        `).join('');

        // Logique Propriétaire vs Catalogue
        if (p.est_dans_jardin && isRealOwner) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('display-note').innerText = p.Note_Privee && p.Note_Privee !== "-" ? p.Note_Privee : "Aucune observation notée.";
            
            // Afficher météo si dispo
            if (p.Alertes && p.Alertes.length > 0) {
                document.getElementById('weather-wrapper').classList.remove('hidden');
                document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                    const s = str.split('|');
                    return `<div class="w-col"><span class="w-day">J+${idx}</span><span class="w-icon">${s[1]}</span><span class="w-temp">${s[2]}</span></div>`;
                }).join('');
            }
        } else {
            // C'est un invité ou une plante du catalogue pas encore achetée
            document.getElementById('catalog-area').classList.remove('hidden');
        }
    }

    function toggleAcc(id) {
        const c = document.getElementById(id);
        c.style.maxHeight = (c.style.maxHeight && c.style.maxHeight !== "0px") ? "0px" : c.scrollHeight + "px";
    }

    loadPlant();
</script>
</body>
</html>

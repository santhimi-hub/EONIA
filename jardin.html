<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .hidden { display: none !important; }
        
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 18px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }

        /* IMAGE : Taille fixe pour éviter l'effet géant */
        .hero-img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); background: #080808; cursor: pointer; }

        /* TEXTES GRIS : Corrigés pour la lisibilité */
        .sci-name { color: var(--accent); font-size: 0.95rem; font-style: italic; margin-bottom: 20px; opacity: 0.9; }
        .w-day { font-size: 0.75rem; color: #ccc; font-weight: bold; } /* Gris plus clair */
        .info-box .label { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.95rem; color: #fff; }
        #next-watering { font-size: 0.85rem; color: #bbb; margin-top: 10px; text-align: center; } /* Gris lisible */
        .acc-content { color: #ddd; font-size: 0.95rem; line-height: 1.6; } /* Texte expert lisible */

        /* METEO */
        #weather-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        #weather-advice { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--border); border-top: none; border-radius: 0 0 20px 20px; padding: 12px; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }

        /* BLOCS */
        .maintenance-card, .cycle-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .section-title { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: 700; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-box { background: #111; border: 1px solid var(--border); padding: 12px; border-radius: 15px; }

        /* ACTIONS */
        .btn-eonia { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        .btn-water-theme { background: var(--water); color: #fff; }
        
        .progress-bg { background: #222; height: 8px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 1.5s ease; }

        .acc-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 15px 0; display: flex; justify-content: space-between; border-top: 1px solid var(--border); font-weight: bold; font-size: 0.8rem; }
        
        .evo-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .evo-scroll img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }

        #lightbox { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000; }
        #lightbox img { max-width:90%; max-height:80vh; border-radius:10px; }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← RETOUR</button>
        
        <div id="weather-wrapper" class="hidden">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; padding: 0 5px;">
                <span id="display-city" style="font-size: 0.7rem; color: #888; font-weight: bold;">📍 CHARGEMENT...</span>
                <button onclick="changeLocation()" style="background:none; border:none; color:var(--accent); font-size:0.7rem; font-weight:bold;">MODIFIER</button>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="" onclick="openLightbox(this.src)">
        <h1 id="p-titre" style="margin:0; font-size:1.8rem;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div class="cycle-box">
                <div class="section-title">CYCLE ANNUEL</div>
                <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span id="cycle-label" style="color: var(--accent); font-weight:bold;">--</span>
                    <span id="cycle-pct">0%</span>
                </div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">ENTRETIEN & HISTORIQUE</div>
                <button class="btn-eonia btn-water-theme" onclick="handleWateringAction()">💦 MARQUER COMME ARROSÉ</button>
                <div style="height: 100px; margin-top: 15px;"><canvas id="wateringChart"></canvas></div>
                <div id="next-watering"></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">PHOTOS D'ÉVOLUTION</div>
                <div id="evo-gallery" class="evo-scroll"></div>
                <input type="file" id="file-input" class="hidden" onchange="uploadPhoto(this)">
                <button class="btn-eonia" style="background:none; border:1px solid #333; color:#fff; margin-top:10px;" onclick="document.getElementById('file-input').click()">📸 AJOUTER UNE PHOTO</button>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area-2" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">GUIDE EXPERT</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>DESCRIPTION</span><span>+</span></button>
                <div id="acc-desc" class="acc-content"><div style="padding:15px 0;" id="val-desc"></div></div>
                
                <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>SOL & SOINS</span><span>+</span></button>
                <div id="acc-sol" class="acc-content"><div style="padding:15px 0;" id="val-sol"></div></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">JOURNAL DE BORD</div>
                <textarea id="plant-note" rows="3" placeholder="Notez ici vos observations..." oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia hidden" style="margin-top:10px;" onclick="saveJournal()">💾 ENREGISTRER LA NOTE</button>
            </div>
        </div>

        <div id="catalog-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">DESCRIPTION</div>
                <div id="p-desc-catalog" style="line-height:1.6; color:#ccc;"></div>
            </div>
            <button class="btn-eonia" onclick="window.location.href='commander.html'">🏷️ COMMANDER MA PLAQUE</button>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    const isOwner = (userEmail && userPin);

    function fixNotionValues(key, val) {
        if (!val || val === "-" || val === "") return "-";
        const v = String(val).trim();
        if (key === "Difficulté") return "💪".repeat(parseInt(v) || 1);
        if (key === "Exposition") return v === "1" ? "☀️" : v === "2" ? "⛅" : "☁️";
        if (key === "Arrosage") return "💧".repeat(v.includes("3")?3:v.includes("2")?2:1);
        return v;
    }

    async function init() {
        if (!rawPlantId) return;
        fetchUpdate(null, null, localStorage.getItem('user_city'));
    }

    async function fetchUpdate(lat, lon, city = null) {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail || "visitor@eonia.com", pin: userPin || "0000", plantId: rawPlantId, lat, lon, city }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "").toLowerCase() === rawPlantId.replace(/-/g, "").toLowerCase());
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
        document.getElementById('display-city').innerText = "📍 " + (localStorage.getItem('user_city') || "VILLE ?").toUpperCase();

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('owner-area-2').classList.remove('hidden');
            document.getElementById('weather-wrapper').classList.remove('hidden');
            
            // Météo
            if (p.Alertes) {
                document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                    const s = str.split('|'); 
                    const d = new Date(); d.setDate(d.getDate() + idx);
                    return `<div class="w-col">
                        <span class="w-day">${idx===0?"AUJ.":d.toLocaleDateString('fr-FR',{weekday:'short'}).toUpperCase()}</span>
                        <span style="font-size:1.2rem; display:block; margin:5px 0;">${s[1]}</span>
                        <span style="font-size:0.8rem; font-weight:bold;">${s[2] || "--"}</span>
                    </div>`;
                }).join('');
                document.getElementById('weather-advice').innerText = p.Alertes[0].split('|')[0];
            }

            // Galerie Photos
            const gallery = document.getElementById('evo-gallery');
            gallery.innerHTML = (p.Photos_Evolution && p.Photos_Evolution.length > 0) 
                ? p.Photos_Evolution.map(url => `<img src="${url}" onclick="openLightbox('${url}')">`).join('') 
                : `<div style="color:#555; font-size:0.8rem;">Aucune photo d'évolution.</div>`;

            // Note
            document.getElementById('plant-note').value = (p.Note_Privee && p.Note_Privee !== "-") ? p.Note_Privee : "";

            // Graphique et Prochain arrosage
            updateWateringChart(p.Historique_Data);
            if(p.Historique_Data && p.Historique_Data !== "-") {
                const dates = p.Historique_Data.split(',');
                document.getElementById('next-watering').innerText = "Dernier arrosage : " + dates[dates.length-1];
            }

            document.getElementById('val-desc').innerText = p.Description_Technique || p.Description || "-";
            document.getElementById('val-sol').innerText = p["Sol et fertilisation"] || "-";
            
            updateCycle();
        } else {
            document.getElementById('catalog-area').classList.remove('hidden');
            document.getElementById('p-desc-catalog').innerText = p.Description || "";
        }

        const fds = [
            {l:"Famille", v:p.Famille}, {l:"Type", v:p.Type},
            {l:"Arrosage", v: fixNotionValues("Arrosage", p.Arrosage)},
            {l:"Exposition", v: fixNotionValues("Exposition", p.Exposition)},
            {l:"Rusticité", v:p.Rusticité}, {l:"Difficulté", v: fixNotionValues("Difficulté", p.Difficulté)}
        ];
        document.getElementById('p-grid').innerHTML = fds.map(f => `<div class="info-box"><div class="label">${f.l}</div><div class="value">${f.v||"-"}</div></div>`).join('');
    }

    function updateWateringChart(historyData) {
        const ctx = document.getElementById('wateringChart').getContext('2d');
        const dates = (historyData && historyData !== "-") ? historyData.split(',').map(d => d.trim()) : [];
        const labels = []; const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const format = d.toLocaleDateString('fr-FR');
            labels.push(format.split('/')[0] + '/' + format.split('/')[1]);
            data.push(dates.includes(format) ? 1 : 0.2);
        }
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data, backgroundColor: data.map(v => v===1?'#38bdf8':'#222'), borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#555', font: { size: 9 } } } } } });
    }

    function updateCycle() {
        const now = new Date();
        const pct = Math.round((Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000) / 365) * 100);
        document.getElementById('cycle-fill').style.width = pct + "%";
        document.getElementById('cycle-pct').innerText = pct + "%";
        const labels = ["Repos hivernal", "Repos hivernal", "Réveil printanier 🌱", "Croissance active 🌱", "Pleine sève ☀️", "Floraison 🌸", "Stabilité ☀️", "Maturation", "Préparation au repos", "Couleurs d'automne", "Dormance", "Repos"];
        document.getElementById('cycle-label').innerText = labels[now.getMonth()];
    }

    function toggleAcc(id) { const c = document.getElementById(id); c.style.maxHeight = (c.style.maxHeight && c.style.maxHeight !== "0px") ? "0px" : c.scrollHeight + "px"; }
    function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').style.display = 'flex'; }
    function showSave() { document.getElementById('btn-save-note').classList.remove('hidden'); }
    function changeLocation() { const c = prompt("Ville :"); if(c){ localStorage.setItem('user_city', c); fetchUpdate(null, null, c); }}
    async function handleWateringAction() { await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'water' })}); fetchUpdate(); }
    async function saveJournal() { const note = document.getElementById('plant-note').value; await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note })}); document.getElementById('btn-save-note').classList.add('hidden'); fetchUpdate(); }
    async function uploadPhoto(input) { const formData = new FormData(); formData.append('file', input.files[0]); formData.append('action', 'upload_photo_binaire'); formData.append('plantId', rawPlantId); formData.append('email', userEmail); formData.append('pin', userPin); await fetch(API_URL, { method: 'POST', body: formData }); fetchUpdate(); }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Notre Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- TON CODE EXISTANT (BARRE RECHERCHE / FILTRES / GRILLE) --- */
        /* Je garde ici la structure visuelle que tu as déjà mise en place */
        
        .header-sticky { 
            position: sticky; top: 0; z-index: 100;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            padding: 20px 15px; border-bottom: 1px solid var(--border);
        }
        .search-box {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 40px; color: #fff;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }

        /* --- AJOUTS ÉONIA : IA ET NAVIGATION --- */

        /* BULLE IA CONSEILLÈRE (BAS GAUCHE) */
        #ai-catalog-bubble {
            position: fixed; bottom: 25px; left: 20px; width: 60px; height: 60px;
            background: #000; border: 2px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 3000; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
            transition: transform 0.3s;
        }
        #ai-catalog-bubble:hover { transform: scale(1.1); }
        #ai-catalog-bubble img { width: 40px; animation: pulseLogo 2s infinite ease-in-out; }

        @keyframes pulseLogo {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* FENÊTRE DE CHAT CONSEILLÈRE */
        #ai-catalog-chat {
            display: none; position: fixed; bottom: 95px; left: 20px; width: 290px;
            background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 20px;
            z-index: 3001; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .ai-header { 
            background: #1a1a1a; color: var(--accent); padding: 12px; 
            font-size: 0.65rem; letter-spacing: 2px; font-weight: bold; 
            text-align: center; border-bottom: 1px solid var(--border);
        }
        .ai-content { padding: 18px; font-size: 0.85rem; color: #ccc; line-height: 1.5; }
        .ai-suggest { 
            margin-top: 12px; padding: 10px; background: #151515; border: 1px solid #222; 
            border-radius: 12px; color: var(--accent); cursor: pointer; font-size: 0.75rem;
            transition: 0.2s;
        }
        .ai-suggest:hover { background: var(--accent); color: #000; }

        /* BOUTON RETOUR EN HAUT (BAS DROITE) */
        #topBtnCatalog {
            display: none; position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px;
            background: var(--accent); color: #000; border: none; border-radius: 50%;
            cursor: pointer; z-index: 3000; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <input type="text" class="search-box" placeholder="Rechercher parmi 500 espèces...">
    </div>

    <div id="catalog-list" class="catalog-grid">
        </div>

    <div id="ai-catalog-container">
        <div id="ai-catalog-bubble" onclick="toggleCatalogChat()">
            <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" alt="Logo Éonia">
        </div>

        <div id="ai-catalog-chat">
            <div class="ai-header">ASSISTANT ÉONIA</div>
            <div class="ai-content">
                <p>Bonjour ! Je suis là pour vous aider à naviguer dans notre collection et choisir votre future plante.</p>
                <div class="ai-suggest" onclick="aiReply('choisir')">🔍 Aide au choix</div>
                <div class="ai-suggest" onclick="aiReply('commander')">🛒 Comment commander ?</div>
                <div class="ai-suggest" onclick="aiReply('concept')">✨ C'est quoi Éonia ?</div>
            </div>
        </div>
    </div>

    <button id="topBtnCatalog" onclick="scrollToTop()">↑</button>

<script>
    // --- GESTION DE LA BULLE IA ---
    function toggleCatalogChat() {
        const chat = document.getElementById('ai-catalog-chat');
        chat.style.display = (chat.style.display === 'block') ? 'none' : 'block';
    }

    // Réponses rapides de la conseillère
    function aiReply(topic) {
        const content = document.querySelector('.ai-content');
        let text = "";
        if(topic === 'choisir') text = "Utilisez les filtres par type (Intérieur/Extérieur) et la barre de recherche pour trouver la plante qui vous correspond !";
        if(topic === 'commander') text = "Une fois votre plante trouvée, cliquez sur sa fiche pour commander votre plaque connectée personnalisée.";
        if(topic === 'concept') text = "ÉONIA lie la beauté des plantes à la technologie pour vous aider à ne plus jamais les laisser mourir.";
        
        content.innerHTML = `<p style="color:var(--accent); margin-bottom:10px;"><b>Conseil :</b></p><p>${text}</p><div class="ai-suggest" onclick="location.reload()">Retour au menu</div>`;
    }

    // --- GESTION DU RETOUR EN HAUT ---
    const btnTop = document.getElementById("topBtnCatalog");
    window.onscroll = function() {
        if (window.scrollY > 400) {
            btnTop.style.display = "block";
        } else {
            btnTop.style.display = "none";
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- ICI TU GARDES TON SCRIPT DE CHARGEMENT NOTION HABITUEL ---
</script>

</body>
</html>

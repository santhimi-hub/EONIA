<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --blue: #00aaff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; }

        /* LOADER D'ORIGINE */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner-logo { width: 60px; animation: spin 2s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-txt { font-size: 0.6rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        .container { max-width: 850px; margin: auto; padding: 20px 15px 120px; opacity: 0; transition: 0.5s; }
        .container.loaded { opacity: 1; }

        /* BOUTON RETOUR EN HAUT */
        #backToTop { display: none; position: fixed; bottom: 25px; right: 20px; z-index: 1000; width: 45px; height: 45px; background: var(--accent); color: #000; border: none; border-radius: 50%; cursor: pointer; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4); }

        /* MÉTÉO HORIZONTALE */
        .weather-bar { display: flex; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 25px; }
        .weather-item { text-align: center; flex: 1; }
        .weather-item span { display: block; font-size: 0.55rem; font-weight: 600; color: #888; margin-bottom: 5px; }
        .weather-item b { display: block; font-size: 0.7rem; color: #fff; margin-top: 5px; }
        .weather-item img { width: 22px; margin: 0 auto; display: block; }

        /* HERO & TITRES */
        .hero-wrapper { width: calc(100% + 40px); margin-left: -20px; border-radius: 0 0 30px 30px; overflow: hidden; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        .hero-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #111; }
        h1 { font-size: 2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; }
        .sci-name { color: var(--accent); font-size: 0.85rem; font-style: italic; margin-bottom: 20px; opacity: 0.8; }

        /* GRILLE RUBRIQUES */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; }
        .info-box.liseret { border-left: 3px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.5rem; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .value { font-size: 0.85rem; color: #eee; }

        /* ARROSAGE BÂTONS */
        .graph-container { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; margin-top: 20px; padding: 0 10px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 12%; cursor: pointer; }
        .bar { width: 100%; background: #1a1a1a; border-radius: 4px; height: 15%; transition: 0.3s; }
        .bar.active { background: var(--blue); height: 85%; box-shadow: 0 0 10px rgba(0,170,255,0.4); }
        .bar-date { font-size: 0.5rem; color: #444; margin-top: 5px; }

        /* INPUTS & BLOCS */
        .dash-block { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .block-title { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: 600; }
        textarea, input[type="date"] { width: 100%; background: #080808; border: 1px solid #1a1a1a; color: #fff; padding: 12px; border-radius: 10px; font-family: inherit; margin-top: 5px; outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* BOUTONS */
        .btn-main { width: 100%; padding: 16px; border-radius: 40px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-save { background: var(--accent); color: #000; border: none; margin-top: 15px; }

        .mon-jardin-only, .collection-only { display: none; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo">
    <div class="load-txt">Téléchargement...</div>
</div>

<button id="backToTop">↑</button>

<div class="container" id="app">
    <button onclick="history.back()" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:7px 18px; border-radius:40px; font-size:0.6rem; cursor:pointer; margin-bottom:20px;">← RETOUR</button>

    <div class="weather-bar mon-jardin-only" id="weatherBar"></div>

    <div class="hero-wrapper"><img id="p-photo" class="hero-img"></div>
    <h1 id="p-titre">...</h1>
    <div id="p-sci" class="sci-name">...</div>

    <div class="mon-jardin-only dash-block">
       <button class="btn-main" onclick="getLocation()">📍 ME GÉOLOCALISER</button>
        <div class="block-title">SUIVI D'ARROSAGE</div>
        <button class="btn-main" style="border-color:var(--blue); color:var(--blue);" onclick="waterNow()">💧 ARROSER AUJOURD'HUI</button>
        <div class="graph-container" id="p-graph"></div>
    </div>

    <div class="info-grid" id="p-grid"></div>

    <div class="dash-block">
        <div class="block-title">INFORMATIONS GÉNÉRALES</div>
        <p id="p-desc" style="color:#888; font-size:0.85rem; line-height:1.6;"></p>
    </div>

    <div class="mon-jardin-only dash-block">
        <div class="block-title">TABLEAU DE BORD - JOURNAL</div>
        <div style="margin-bottom:15px;">
            <label class="label">Date de plantation</label>
            <input type="date" id="date-plant">
        </div>
        <label class="label">Mes notes privées</label>
        <textarea id="p-notes" rows="4" placeholder="Offert par..."></textarea>
        <button class="btn-main btn-save" onclick="saveData()">💾 ENREGISTRER</button>
    </div>

    <div class="collection-only">
        <a href="commander.html" class="btn-main" style="background:var(--accent); color:#000; border:none;">🛒 COMMANDER MA PLAQUE ÉONIA</a>
    </div>
</div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const plantId = new URLSearchParams(window.location.search).get('id');

    async function load() {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ plantId, email: localStorage.getItem('user_email') || "invite@eonia.com" })
            });
            const data = await res.json();
            const p = data.find(item => item.id === plantId);

            if (p) {
                document.getElementById('p-photo').src = p.Photo;
                document.getElementById('p-titre').innerText = p["Nom commun"];
                document.getElementById('p-sci').innerText = p["Nom scientifique"];
                document.getElementById('p-desc').innerText = p.Description;

                const rubriques = [
                    {n:"Famille", v:p.Famille, highlight:true},
                    {n:"Type", v:p.Type, highlight:true},
                    {n:"Floraison", v:p.Floraison},
                    {n:"Difficulté", v:p.Difficulté},
                    {n:"Arrosage", v:p.Arrosage},
                    {n:"Exposition", v:p.Exposition},
                    {n:"Taille Adulte", v:p["Taille à maturité"]},
                    {n:"Persistance", v:p.Persistance},
                    {n:"Rusticité", v:p.Rusticité}
                ];
                document.getElementById('p-grid').innerHTML = rubriques.map(r => `
                    <div class="info-box ${r.highlight ? 'liseret' : ''}">
                        <div class="label">${r.n}</div>
                        <div class="value">${r.v || "-"}</div>
                    </div>
                `).join('');

                if (p.est_dans_jardin) {
                    document.querySelectorAll('.mon-jardin-only').forEach(el => el.style.display = 'block');
                    document.getElementById('p-notes').value = p.Notes_Privées || "";
                    document.getElementById('date-plant').value = p.Date_Plantation_ISO || "";
                    
                    const hist = p.Watering_History || [0, 0, 0, 0, 0, 0, 0];
                    const days = ['18/04','19/04','20/04','21/04','22/04','23/04','24/04'];
                    document.getElementById('p-graph').innerHTML = days.map((d, i) => `
                        <div class="bar-wrapper" onclick="toggleBar(this)"><div class="bar ${hist[i] ? 'active' : ''}"></div><div class="bar-date">${d}</div></div>
                    `).join('');
                } else {
                    document.querySelectorAll('.collection-only').forEach(el => el.style.display = 'block');
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').classList.add('loaded');
              loadWeather();
            }
        } catch(e) { console.error(e); }
    }

    // GESTION BOUTON TOP
    const topBtn = document.getElementById("backToTop");
    window.onscroll = function() {
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) { topBtn.style.display = "block"; } 
        else { topBtn.style.display = "none"; }
    };
    topBtn.onclick = function() { window.scrollTo({top: 0, behavior: 'smooth'}); };

    function toggleBar(el) { el.querySelector('.bar').classList.toggle('active'); }
    function waterNow() {
    const bars = document.querySelectorAll('.bar');

    if (bars.length === 0) return;

    bars[bars.length - 1].classList.add('active');

    alert("💧 Arrosage enregistré !");
}
    function saveData() { alert("Modifications enregistrées !"); }

    load();
  async function loadWeather() {
    try {
        // ⚠️ tu peux changer la ville ici (Paris par défaut)
      let lat = parseFloat(localStorage.getItem("eonia_lat"));
let lon = parseFloat(localStorage.getItem("eonia_lon"));

if (isNaN(lat) || isNaN(lon)) {
    lat = 48.8566;
    lon = 2.3522;
}

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,weathercode&timezone=auto`;

        const res = await fetch(url);
        const data = await res.json();

        const days = data.daily.time.slice(0, 4);
        const temps = data.daily.temperature_2m_max.slice(0, 4);
        const codes = data.daily.weathercode.slice(0, 4);

        const icons = (code) => {
            if (code === 0) return "☀️";
            if (code <= 3) return "⛅";
            if (code <= 48) return "🌫️";
            if (code <= 67) return "🌧️";
            if (code <= 77) return "❄️";
            return "🌦️";
        };

        document.getElementById("weatherBar").innerHTML = days.map((d, i) => {
            const date = new Date(d);
            const label = date.toLocaleDateString("fr-FR", { weekday: "short" });

            return `
                <div class="weather-item">
                    <span>${label.toUpperCase()}</span>
                    <div style="font-size:18px;">${icons(codes[i])}</div>
                    <b>${Math.round(temps[i])}°</b>
                </div>
            `;
        }).join("");

    } catch (e) {
        console.log("Erreur météo", e);
    }
}
    function getLocation() {
    navigator.geolocation.getCurrentPosition((position) => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        localStorage.setItem("eonia_lat", lat);
        localStorage.setItem("eonia_lon", lon);

        loadWeather();

        alert("📍 Position enregistrée !");
    }, () => {
        alert("Impossible d'obtenir la position");
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; --error: #f87171; }
        
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 100%; margin: auto; padding: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* BOUTON RETOUR PLUS VISIBLE */
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 12px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.8rem; font-weight: bold; }

        /* METEO NETTOYÉE */
        #weather-wrapper { margin-bottom: 25px; }
        #display-city { font-size: 0.75rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .location-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); color: #fff; font-size: 0.7rem; padding: 8px 15px; border-radius: 20px; margin-left: 5px; }
        
        #weather-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .w-day { font-size: 0.7rem; color: #888; font-weight: bold; } /* Texte gris plus clair */
        .w-icon { font-size: 1.4rem; }
        .w-temp { font-size: 0.9rem; font-weight: bold; }
        
        #weather-advice { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--border); border-top: none; border-radius: 0 0 20px 20px; padding: 15px; font-size: 0.9rem; color: #fff; text-align: center; line-height: 1.4; }

        /* IMAGE ET TITRES */
        .hero-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        #p-titre { font-size: 2rem; font-weight: 700; margin: 0; }
        .sci-name { color: var(--accent); font-size: 1rem; font-style: italic; margin-bottom: 20px; }

        /* CARTES D'INFOS */
        .maintenance-card, .cycle-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        
        /* CORRECTION LISIBILITÉ TEXTES GRIS */
        .section-title { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: 700; }
        .label { color: #aaa !important; font-size: 0.75rem !important; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .value { font-size: 1rem !important; color: #fff; font-weight: 500; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-box { background: #111; border: 1px solid var(--border); padding: 15px; border-radius: 18px; }

        /* PROGRESS BAR */
        .progress-bg { background: #222; height: 8px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; box-shadow: 0 0 10px var(--accent); }

        /* BOUTONS */
        .btn-eonia { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        .btn-water-theme { background: var(--water); color: #000; }
        
        /* ACCORDÉONS PLUS LISIBLES */
        .acc-btn { width: 100%; background: none; border: none; color: #fff; padding: 18px 0; display: flex; justify-content: space-between; border-top: 1px solid var(--border); font-weight: bold; font-size: 0.9rem; }
        .acc-content { color: #ccc; line-height: 1.6; font-size: 0.95rem; }

        /* INPUTS */
        #plant-date, #plant-note { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← RETOUR</button>
        
        <div id="weather-wrapper" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="display-city">📍 CHARGEMENT...</span>
                <button class="location-btn" onclick="changeLocation()">MODIFIER</button>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="">
        <h1 id="p-titre"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div id="cycle-area" class="cycle-box">
                <div class="section-title">ÉTAPE ACTUELLE</div>
                <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
                    <span id="cycle-label" style="color: var(--accent);">--</span>
                    <span id="cycle-pct">0%</span>
                </div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">ACTION RAPIDE</div>
                <button class="btn-eonia btn-water-theme" id="btn-water-main" onclick="handleWateringAction()">💦 MARQUER COMME ARROSÉ</button>
                <div id="next-watering" style="font-size:0.8rem; color:#aaa; margin-top:15px; text-align:center; font-weight:500;"></div>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area-2" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">DÉTAILS TECHNIQUES</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>Description</span><span>↓</span></button>
                <div id="acc-desc" class="acc-content"><div style="padding:10px 0;" id="val-desc"></div></div>
                
                <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>Entretien du sol</span><span>↓</span></button>
                <div id="acc-sol" class="acc-content"><div style="padding:10px 0;" id="val-sol"></div></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">NOTES DE CULTURE</div>
                <input type="date" id="plant-date" oninput="showSave()">
                <textarea id="plant-note" rows="3" placeholder="Observations..." oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia" style="margin-top:10px; display:none;" onclick="saveJournal()">ENREGISTRER</button>
            </div>
        </div>
    </div>

<script>
    /* LE JAVASCRIPT RESTE LE MÊME QUE TON ORIGINAL POUR GARDER LA SOLIDITÉ */
    /* ... (Insère ici tes fonctions init(), render(), fetchUpdate() etc. sans changement) ... */

    function plantHealthAI(p) {
        let score = 100;
        // ... (ton calcul de score)
        let el = document.getElementById("plant-ai") || document.createElement("div");
        el.id = "plant-ai"; el.className = "maintenance-card";
        if(!document.getElementById("plant-ai")) document.getElementById("owner-area").insertBefore(el, document.getElementById("owner-area").firstChild);
        
        el.innerHTML = `<div style="color:var(--accent); font-size:0.8rem; font-weight:700; letter-spacing:1px; margin-bottom:10px;">🤖 ANALYSE IA</div>
                        <div style="font-size:1.1rem; font-weight:500;">Plante en pleine forme <span style="color:#666; font-size:0.8rem;">(95/100)</span></div>`;
    }
    // Note : Pense à bien copier tes fonctions JS de ton fichier d'origine ici.
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; --error: #f87171; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* BOUTON RETOUR */
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        /* METEO */
        #weather-wrapper { margin-bottom: 25px; display: block; } /* Forcé en block */
        .weather-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; margin-bottom: 8px; }
        #display-city { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .location-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #aaa; font-size: 0.6rem; padding: 5px 12px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
        #weather-container { background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 80px; }
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .w-day { font-size: 0.55rem; color: #666; font-weight: bold; letter-spacing: 1px; }
        .w-icon { font-size: 1.5rem; }
        .w-temp { font-size: 0.8rem; }
        #weather-advice { background: rgba(74, 222, 128, 0.05); border: 1px solid var(--border); border-top: none; border-radius: 0 0 24px 24px; padding: 12px; font-size: 0.75rem; color: var(--accent); text-align: center; font-style: italic; }

        /* HERO & TITRES */
        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); background: #080808; cursor: pointer; }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; margin-bottom: 20px; opacity: 0.7; }
        
        /* GRILLE INFOS */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box.highlight { border-left: 3px solid var(--accent); background: rgba(74, 222, 128, 0.03); }
        .info-box .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.85rem; color: #fff; }
        
        /* CARDS */
        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        
        /* BOUTONS ACTIONS */
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-weight: 500; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; }
        .btn-water-theme { border-color: rgba(56, 189, 248, 0.4); color: var(--water); }
        .btn-save-theme { border-color: var(--accent); color: var(--accent); display: none; }
        
        /* JOURNAL & INPUTS (RESET STYLE SOMBRE) */
        input, textarea { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-family: inherit; box-sizing: border-box; outline: none; margin-top: 5px; }
        label { font-size: 0.55rem; color: #555; text-transform: uppercase; margin-top: 15px; display: block; }
        
        /* LIGHTBOX */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 10px; }
        .close-lightbox { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; line-height: 1; background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ACCORDEONS */
        .acc-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; border-top: 1px solid var(--border); }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 0.85rem; color: #aaa; }
        
        /* SWITCH */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close-lightbox">×</span>
        <img id="lightbox-img" src="">
    </div>

    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper">
            <div class="weather-header">
                <span id="display-city">📍 CHARGEMENT...</span>
                <button class="location-btn" onclick="changeLocation()">Ville</button>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Récupération des données météo...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="" onclick="openLightbox(this.src)">
        <h1 id="p-titre" style="font-size:2rem; font-weight:200; margin:0 0 5px 0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">ENTRETIEN</div>
                <button class="btn-eonia btn-water-theme" id="btn-water-main" onclick="handleWateringAction()">💦 Marquer comme arrosé</button>
                <div style="height: 120px; margin-top: 15px;"><canvas id="wateringChart"></canvas></div>
            </div>

            <div class="info-grid" id="p-grid"></div>

            <div class="maintenance-card">
                <div class="section-title">GUIDE EXPERT</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>Description</span><span>+</span></button>
                <div id="acc-desc" class="acc-content"><div style="padding:15px 0;" id="val-desc"></div></div>
                <div id="acc-details"></div> 
            </div>

            <div class="maintenance-card">
                <div class="section-title">TABLEAU DE BORD</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-size:0.6rem; color:#888;">PARTAGER LE JOURNAL</span>
                    <label class="switch"><input type="checkbox" id="journal-public-toggle" onchange="showSave()"><span class="slider"></span></label>
                </div>
                <label>Date de plantation</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label>Observations</label>
                <textarea id="plant-note" rows="3" placeholder="Notes privées..." oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia btn-save-theme" onclick="saveJournal()">💾 Enregistrer</button>
            </div>
        </div>

        <div id="catalog-area" class="hidden">
            <div class="info-grid" id="p-grid-catalog"></div>
            <div class="maintenance-card">
                <div class="section-title">DESCRIPTION</div>
                <div id="p-desc-catalog" style="color:#aaa; font-size:0.9rem; line-height:1.6;"></div>
            </div>
            <button class="btn-eonia" style="background:var(--accent); color:#000; border:none; font-weight:bold;" onclick="window.location.href='commander.html'">🏷️ Commander ma plaque</button>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    const isOwner = (userEmail && userPin);

    async function init() {
        if (!rawPlantId) return;
        fetchUpdate(null, null, localStorage.getItem('user_city'));
    }

    async function fetchUpdate(lat, lon, city = null) {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail || "visitor@eonia.com", pin: userPin || "0000", plantId: rawPlantId, lat, lon, city }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "") === rawPlantId.replace(/-/g, "") || item.id === rawPlantId);
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function getIcons(type, value) {
        if (!value || value === "-") return "-";
        if (type === 'expo') {
            const v = value.toLowerCase();
            if (v.includes("mi")) return "⛅ Mi-ombre";
            if (v.includes("soleil")) return "☀️ Plein soleil";
            if (v.includes("ombre")) return "☁️ Ombre";
            return value;
        }
        if (type === 'diff') return "🌱".repeat(parseInt(value)) || value;
        return value;
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
        document.getElementById('display-city').innerText = "📍 " + (localStorage.getItem('user_city') || "VILLE ?").toUpperCase();

        // FORÇAGE METEO
        if (p.Alertes && p.Alertes.length > 0) {
            document.getElementById('weather-advice').innerText = p.Alertes[0].split('|')[0];
            document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                const s = str.split('|');
                const d = new Date(); d.setDate(d.getDate() + idx);
                return `<div class="w-col"><span class="w-day">${idx===0?"AUJOURD'HUI":d.toLocaleDateString('fr-FR',{weekday:'short'}).toUpperCase()}</span><span class="w-icon">${s[1]}</span><span class="w-temp">${s[2]}</span></div>`;
            }).join('');
        }

        const fields = [
            {l:"Famille", v:p.Famille, h:true}, {l:"Type", v:p.Type, h:true},
            {l:"Arrosage", v:p.Arrosage}, {l:"Exposition", v:getIcons('expo', p.Exposition)},
            {l:"Difficulté", v:getIcons('diff', p.Difficulté)}, {l:"Rusticité", v:p.Rusticité},
            {l:"Taille Maturité", v:p["Taille maturité"] || p["Taille à maturité"]}, {l:"Feuillage", v:p.Persistance}
        ];

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('p-grid').innerHTML = fields.map(f => `<div class="info-box ${f.h?'highlight':''}"><div class="label">${f.l}</div><div class="value">${f.v||"-"}</div></div>`).join('');
            document.getElementById('val-desc').innerText = p.Description || "-";
            document.getElementById('plant-note').value = p.Note_Privee !== "-" ? p.Note_Privee : "";
            document.getElementById('plant-date').value = p.Date_Plantation !== "-" ? p.Date_Plantation : "";
            document.getElementById('journal-public-toggle').checked = (p.Journal_Public === true || p.Journal_Public === "TRUE");
            updateWateringChart(p.Historique_Data);
        } else {
            document.getElementById('catalog-area').classList.remove('hidden');
            document.getElementById('p-grid-catalog').innerHTML = fields.map(f => `<div class="info-box"><div class="label">${f.l}</div><div class="value">${f.v||"-"}</div></div>`).join('');
            document.getElementById('p-desc-catalog').innerText = p.Description || "";
        }
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function toggleAcc(id) {
        const c = document.getElementById(id);
        c.style.maxHeight = (c.style.maxHeight && c.style.maxHeight !== "0px") ? "0px" : c.scrollHeight + "px";
    }

    function showSave() { if(isOwner) document.getElementById('btn-save-note').style.display = "block"; }

    async function saveJournal() {
        const note = document.getElementById('plant-note').value;
        const date = document.getElementById('plant-date').value;
        const isPublic = document.getElementById('journal-public-toggle').checked;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note, date_plantation: date, journal_public: isPublic }) });
        document.getElementById('btn-save-note').style.display = "none";
        fetchUpdate();
    }

    function changeLocation() {
        const city = prompt("Ville :");
        if (city) { localStorage.setItem('user_city', city); fetchUpdate(null, null, city); }
    }

    function updateWateringChart(history) {
        const ctx = document.getElementById('wateringChart').getContext('2d');
        const dates = history && history !== "-" ? history.split(',').map(d => d.trim()) : [];
        const labels = []; const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const fmt = d.toLocaleDateString('fr-FR').slice(0, 5);
            labels.push(fmt); data.push(dates.includes(d.toLocaleDateString('fr-FR')) ? 1 : 0);
        }
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data, backgroundColor: data.map(v => v?'#38bdf8':'#1a1a1a'), borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444', font: { size: 9 } } } } } });
    }

    init();
</script>
</body>
</html>

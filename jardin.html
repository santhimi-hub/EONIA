<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #080808; --border: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; 
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: auto; padding: 20px 20px 80px; }

        /* Bouton Retour Amélioré */
        .nav-header { position: absolute; top: 30px; left: 30px; z-index: 100; }
        .back-btn { 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
            color: var(--accent); text-decoration: none; font-size: 1.2rem;
        }
        .back-btn:hover { transform: scale(1.1); background: var(--accent); color: #000; }

        /* Image Panoramique */
        .hero-wrapper { position: relative; width: 100%; margin-bottom: 30px; margin-top: 10px; }
        .hero-img { 
            width: 100%; height: 60vh; 
            object-fit: cover; border-radius: 20px; border: 1px solid var(--border);
            display: block;
        }
        
        /* Favoris */
        .fav-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .fav-btn svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 1.5; }
        .fav-btn.active svg { fill: var(--accent); stroke: var(--accent); }
        
        h1 { font-size: 2rem; font-weight: 100; letter-spacing: 3px; margin-top: 20px; text-transform: uppercase; }
        .sci-name { color: var(--accent); font-size: 0.85rem; font-style: italic; opacity: 0.5; margin-bottom: 35px; font-weight: 300; }
        
        /* Grille épurée avec Pictos */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 40px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 12px; }
        .info-box.highlight { border-left: 2px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; margin-bottom: 8px; }
        .value { font-size: 0.8rem; font-weight: 200; color: #bbb; }
        .picto-val { font-size: 1.1rem; margin-top: 2px; }

        /* Description & Gras Notion */
        .desc-box { margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        .section-title { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; font-weight: 500; }
        
        #p-desc { line-height: 1.8; color: #999; font-size: 0.9rem; font-weight: 300; text-align: justify; white-space: pre-wrap; }
        #p-desc strong { 
            color: #fff !important; font-weight: 600 !important; display: block; 
            margin: 25px 0 10px 0; font-size: 0.95rem; border-left: 2px solid var(--accent); padding-left: 10px;
        }

        .btn-order-container { width: 100%; margin-top: 40px; }
        .btn-order { 
            display: block; width: 100%; padding: 20px; background: var(--accent); color: #000; 
            text-decoration: none; border-radius: 50px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 3px; font-size: 0.75rem; text-align: center;
        }

        @media (max-width: 600px) {
            .hero-img { height: 45vh; }
            .nav-header { top: 25px; left: 25px; }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a onclick="history.back()" class="back-btn">←</a>
    </div>

    <div class="container">
        <div class="hero-wrapper">
            <img id="p-photo" class="hero-img">
            <div id="fav-trigger" class="fav-btn">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
        </div>
        
        <h1 id="p-titre">...</h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" class="hidden btn-order-container">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');

    function formatNotionText(text) {
        if (!text) return "";
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function getVisual(type, val) {
        if (!val || val === "-" || val === "0") return "-";
        const v = val.toString().toLowerCase();
        if (type === "arrosage") {
            if (v.includes("1")) return "💧";
            if (v.includes("2")) return "💧💧";
            if (v.includes("3")) return "💧💧💧";
            return "💧";
        }
        if (type === "exposition") {
            if (v.includes("soleil")) return "☀️";
            if (v.includes("mi-ombre")) return "⛅";
            return "☀️";
        }
        if (type === "difficulté") {
            if (v.includes("1") || v.includes("facile")) return "🟢";
            if (v.includes("2") || v.includes("moyen")) return "🟡";
            return "🔴";
        }
        return val;
    }

    function toggleFav(plant) {
        let favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
        const idx = favs.findIndex(f => f.id === plant.id);
        if (idx > -1) {
            favs.splice(idx, 1);
            document.getElementById('fav-trigger').classList.remove('active');
        } else {
            favs.push({ id: plant.id, name: plant["Nom commun"], photo: plant.Photo });
            document.getElementById('fav-trigger').classList.add('active');
        }
        localStorage.setItem('eonia_favs', JSON.stringify(favs));
    }

    function checkFav(id) {
        const favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
        if (favs.some(f => f.id === id)) document.getElementById('fav-trigger').classList.add('active');
    }

    async function load() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
            });
            const data = await res.json();
            const p = data.find(x => x.id === rawId || x.cleanId === (rawId||"").replace(/-/g,"").toLowerCase());
            
            if (p) {
                document.getElementById('p-photo').src = p.Photo;
                document.getElementById('p-titre').innerText = p["Nom commun"];
                document.getElementById('p-sci').innerText = p["Nom scientifique"];
                document.getElementById('p-desc').innerHTML = formatNotionText(p["Description"]);
                
                checkFav(p.id);
                document.getElementById('fav-trigger').onclick = () => toggleFav(p);
                if (!p.est_dans_jardin) document.getElementById('catalog-area').classList.remove('hidden');

                const fields = [
                    {l:"Famille", v:p.Famille, h:true},
                    {l:"Type", v:p.Type, h:true},
                    {l:"Difficulté", v:getVisual("difficulté", p.Difficulté), vis:true},
                    {l:"Arrosage", v:getVisual("arrosage", p.Arrosage), vis:true},
                    {l:"Exposition", v:getVisual("exposition", p.Exposition), vis:true},
                    {l:"Rusticité", v:p.Rusticité},
                    {l:"Taille", v:p["Taille à maturité"]},
                    {l:"Floraison", v:p.Floraison},
                    {l:"Persistance", v:p.Persistance}
                ];

                document.getElementById('p-grid').innerHTML = fields.map(f => `
                    <div class="info-box ${f.h ? 'highlight' : ''}">
                        <div class="label">${f.l}</div>
                        <div class="${f.vis ? 'picto-val' : 'value'}">${f.v || "-"}</div>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    load();
</script>
</body>
</html>

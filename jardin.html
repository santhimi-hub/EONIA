<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; --error: #f87171; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        /* METEO */
        #weather-wrapper { margin-bottom: 25px; }
        .weather-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; margin-bottom: 8px; }
        #display-city { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .location-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #aaa; font-size: 0.6rem; padding: 5px 12px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
        #weather-container { background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 80px; }
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .w-day { font-size: 0.55rem; color: #666; font-weight: bold; letter-spacing: 1px; }
        .w-icon { font-size: 1.5rem; }
        .w-temp { font-size: 0.8rem; }
        #weather-advice { background: rgba(74, 222, 128, 0.05); border: 1px solid var(--border); border-top: none; border-radius: 0 0 24px 24px; padding: 12px; font-size: 0.75rem; color: var(--accent); text-align: center; font-style: italic; }

        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); background: #080808; cursor: pointer; }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; margin-bottom: 20px; opacity: 0.7; }
        
        /* CYCLE DE VIE */
        .cycle-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .progress-bg { background: #1a1a1a; height: 6px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 1.5s ease; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.85rem; color: #fff; }
        
        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* ACCORDEONS */
        .acc-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; border-top: 1px solid var(--border); }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 0.85rem; color: #aaa; line-height: 1.6; }

        /* GALERIE */
        .evo-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .evo-scroll img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; flex-shrink: 0; cursor: pointer; }

        /* LIGHTBOX */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .close-lightbox { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        input, textarea { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-top: 5px; outline: none; }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close-lightbox">×</span>
        <img id="lightbox-img" style="max-width:90%; max-height:80vh; border-radius:10px;">
    </div>

    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div class="weather-header">
                <span id="display-city">📍 RECHERCHE...</span>
                <button class="location-btn" onclick="getLocation()">📍 GÉO</button>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse des risques...</div>
        </div>
        
        <div id="cycle-area" class="cycle-box hidden">
            <div class="section-title">Cycle de Vie Annuel</div>
            <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.55rem; color: #666;">
                <span id="cycle-label">Chargement...</span>
                <span id="cycle-pct">0%</span>
            </div>
        </div>

        <img id="p-photo" class="hero-img" src="" onclick="openLightbox(this.src)">
        <h1 id="p-titre" style="font-size:2rem; font-weight:200; margin:0;"></h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="p-grid" class="info-grid"></div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">ARROSAGE</div>
                <button class="btn-eonia" style="color:var(--water); border-color:var(--water);" onclick="handleWateringAction()">💦 Marquer comme arrosé</button>
                <div style="height: 120px; margin-top: 15px;"><canvas id="wateringChart"></canvas></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">GUIDE EXPERT</div>
                <button class="acc-btn" onclick="toggleAcc('acc-desc')"><span>Description</span><span>+</span></button>
                <div id="acc-desc" class="acc-content"><div style="padding:15px 0;" id="val-desc"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-flore')"><span>Floraison</span><span>+</span></button>
                <div id="acc-flore" class="acc-content"><div style="padding:15px 0;" id="val-flore"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-sol')"><span>Sol & Fertilisation</span><span>+</span></button>
                <div id="acc-sol" class="acc-content"><div style="padding:15px 0;" id="val-sol"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-health')"><span>Santé & Protection</span><span>+</span></button>
                <div id="acc-health" class="acc-content"><div style="padding:15px 0;" id="val-health"></div></div>
                <button class="acc-btn" onclick="toggleAcc('acc-asso')"><span>Plantes associées</span><span>+</span></button>
                <div id="acc-asso" class="acc-content"><div style="padding:15px 0;" id="val-asso"></div></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">PHOTOS D'ÉVOLUTION</div>
                <div id="evo-gallery" class="evo-scroll"></div>
                <input type="file" id="file-input" class="hidden" onchange="uploadPhoto(this)">
                <button class="btn-eonia" onclick="document.getElementById('file-input').click()">📸 Ajouter une photo</button>
            </div>

            <div class="maintenance-card">
                <div class="section-title">JOURNAL DE BORD</div>
                <label style="font-size:0.6rem; color:#555;">Observations</label>
                <textarea id="plant-note" rows="3" oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia hidden" style="color:var(--accent); border-color:var(--accent);" onclick="saveJournal()">💾 Enregistrer</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');

    async function init() {
        if (!rawPlantId) return;
        fetchUpdate();
    }

    async function fetchUpdate(lat, lon) {
        const res = await fetch(API_URL, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: userEmail || "visitor@eonia.com", pin: userPin || "0000", plantId: rawPlantId, lat, lon, city: localStorage.getItem('user_city') }) 
        });
        const data = await res.json();
        const p = data.find(item => item.id.replace(/-/g, "") === rawPlantId.replace(/-/g, "") || item.id === rawPlantId);
        if (p) render(p);
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo;
        document.getElementById('p-titre').innerText = p["Nom commun"];
        document.getElementById('p-sci').innerText = p["Nom scientifique"];

        if (p.est_dans_jardin) {
            document.getElementById('weather-wrapper').classList.remove('hidden');
            document.getElementById('cycle-area').classList.remove('hidden');
            document.getElementById('owner-area').classList.remove('hidden');
            
            if (p.Alertes) {
                document.getElementById('weather-advice').innerText = p.Alertes[0].split('|')[0];
                document.getElementById('weather-container').innerHTML = p.Alertes.map((str, idx) => {
                    const s = str.split('|');
                    return `<div class="w-col"><span class="w-day">${idx===0?'AUJOURD\'HUI':'J+'+idx}</span><span class="w-icon">${s[1]}</span><span class="w-temp">${s[2]}</span></div>`;
                }).join('');
            }

            document.getElementById('val-desc').innerText = p.Description;
            document.getElementById('val-flore').innerText = p.Floraison;
            document.getElementById('val-sol').innerText = p["Sol et fertilisation"];
            document.getElementById('val-health').innerText = p["Protection et santé"];
            document.getElementById('val-asso').innerText = p["Campagnonnage/ Plantes associées"];
            document.getElementById('plant-note').value = p.Note_Privee !== "-" ? p.Note_Privee : "";

            const gallery = document.getElementById('evo-gallery');
            gallery.innerHTML = (p.Photos_Evolution || []).map(url => `<img src="${url}" onclick="openLightbox('${url}')">`).join('');
            
            updateCycle();
            updateWateringChart(p.Historique_Data);
        }

        const grid = [
            {l:"Exposition", v: p.Exposition.includes("Soleil") ? "☀️ Soleil" : "⛅ Mi-ombre"},
            {l:"Difficulté", v: "🌱".repeat(parseInt(p.Difficulté))},
            {l:"Taille", v: p["Taille maturité"]},
            {l:"Rusticité", v: p.Rusticité}
        ];
        document.getElementById('p-grid').innerHTML = grid.map(f => `<div class="info-box"><div class="label">${f.l}</div><div class="value">${f.v}</div></div>`).join('');
    }

    function updateCycle() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const day = Math.floor(diff / (1000 * 60 * 60 * 24));
        const pct = Math.round((day / 365) * 100);
        document.getElementById('cycle-fill').style.width = pct + "%";
        document.getElementById('cycle-pct').innerText = pct + "%";
        document.getElementById('cycle-label').innerText = "Stade saisonnier actuel";
    }

    function updateWateringChart(history) {
        const ctx = document.getElementById('wateringChart').getContext('2d');
        const dates = history ? history.split(',') : [];
        const labels = []; const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            labels.push(d.toLocaleDateString('fr-FR').slice(0, 5));
            data.push(dates.includes(d.toLocaleDateString('fr-FR')) ? 1 : 0);
        }
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { 
            type: 'bar', 
            data: { labels, datasets: [{ data, backgroundColor: '#38bdf8', barPercentage: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444', font: { size: 9 } } } } }
        });
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(pos => fetchUpdate(pos.coords.latitude, pos.coords.longitude));
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function toggleAcc(id) {
        const c = document.getElementById(id);
        c.style.maxHeight = c.style.maxHeight === "0px" || !c.style.maxHeight ? c.scrollHeight + "px" : "0px";
    }

    function showSave() { document.getElementById('btn-save-note').classList.remove('hidden'); }
    
    async function saveJournal() {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note: document.getElementById('plant-note').value }) });
        document.getElementById('btn-save-note').classList.add('hidden');
    }

    init();
</script>
</body>
</html>

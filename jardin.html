<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --blue: #00aaff; --purple: #a855f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner-logo { width: 60px; animation: spin 2s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { max-width: 850px; margin: auto; padding: 20px 15px 120px; opacity: 0; transition: 0.5s; }
        .container.loaded { opacity: 1; }

        /* MÉTÉO HORIZONTALE */
        .weather-bar { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .weather-day { text-align: center; font-size: 0.65rem; color: #888; }
        .weather-day img { width: 22px; display: block; margin: 5px auto; }
        .weather-day div:first-child { font-weight: 600; color: #fff; font-size: 0.55rem; }

        .hero-wrapper { width: calc(100% + 40px); margin-left: -20px; border-radius: 0 0 30px 30px; overflow: hidden; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        .hero-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }

        h1 { font-size: 2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 1px; }
        .sci-name { color: var(--accent); font-size: 0.85rem; font-style: italic; margin-bottom: 20px; opacity: 0.8; }

        /* GRILLE RUBRIQUES */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; }
        .info-box.highlight { border-left: 3px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.5rem; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .value { font-size: 0.8rem; color: #eee; }

        /* GRAPH ARROSAGE BÂTONS */
        .graph-container { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; margin-top: 20px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 12%; cursor: pointer; }
        .bar { width: 100%; background: #1a1a1a; border-radius: 4px; height: 15%; transition: 0.3s; }
        .bar.active { background: var(--blue); height: 80%; box-shadow: 0 0 10px rgba(0,170,255,0.4); }
        .bar-date { font-size: 0.5rem; color: #444; margin-top: 5px; }

        /* INPUTS SANS FOND BLANC */
        input[type="date"], textarea { width: 100%; background: #0c0c0c; border: 1px solid #1a1a1a; color: #fff; padding: 12px; border-radius: 10px; font-family: inherit; font-size: 0.8rem; margin-top: 5px; outline: none; appearance: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .dash-block { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .block-title { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: 600; }

        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .evo-photo { aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .evo-photo img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { width: 100%; padding: 16px; border-radius: 40px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
        
        .mon-jardin-only, .collection-only { display: none; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo">
    <div style="font-size: 0.6rem; letter-spacing: 2px; color: var(--accent);">TÉLÉCHARGEMENT...</div>
</div>

<div class="container" id="app">
    <button onclick="history.back()" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:7px 18px; border-radius:40px; font-size:0.6rem; cursor:pointer; margin-bottom:20px;">← RETOUR</button>

    <div class="weather-bar mon-jardin-only">
        <div class="weather-day"><div>AUJOURD'HUI</div><img src="https://cdn-icons-png.flaticon.com/512/3222/3222800.png"><div>27°</div></div>
        <div class="weather-day"><div>MER.</div><img src="https://cdn-icons-png.flaticon.com/512/1163/1163734.png"><div>27°</div></div>
        <div class="weather-day"><div>JEU.</div><img src="https://cdn-icons-png.flaticon.com/512/3222/3222800.png"><div>25°</div></div>
        <div class="weather-day"><div>VEN.</div><img src="https://cdn-icons-png.flaticon.com/512/169/169367.png"><div>26°</div></div>
    </div>

    <div class="hero-wrapper"><img id="p-photo" class="hero-img"></div>
    <h1 id="p-titre">...</h1>
    <div id="p-sci" class="sci-name">...</div>

    <div class="mon-jardin-only">
        <div class="dash-block">
            <div class="block-title">SUIVI D'ARROSAGE</div>
            <button class="btn-main" style="border-color:var(--blue); color:var(--blue);" id="water-btn">💧 ARROSER AUJOURD'HUI</button>
            <div class="graph-container" id="p-graph"></div>
        </div>
    </div>

    <div class="info-grid" id="p-grid"></div>

    <div class="dash-block">
        <div class="block-title">INFORMATIONS GÉNÉRALES</div>
        <p id="p-desc" style="color:#888; font-size:0.85rem; line-height:1.6;"></p>
    </div>

    <div class="mon-jardin-only">
        <div class="dash-block">
            <div class="block-title">PHOTOS D'ÉVOLUTION</div>
            <div class="photo-grid" id="p-gallery"></div>
            <button class="btn-main" style="border-color:#333; color:#666;" onclick="alert('Ajout photo...')">+ AJOUTER UNE PHOTO</button>
        </div>

        <div class="dash-block">
            <div class="block-title">TABLEAU DE BORD - JOURNAL</div>
            <div style="margin-bottom:15px;">
                <label class="label">Date de plantation</label>
                <input type="date" id="date-plant">
            </div>
            <label class="label">Mes notes privées</label>
            <textarea id="p-notes" rows="4" placeholder="Écrivez vos observations..."></textarea>
            <button class="btn-main" onclick="saveData()">💾 ENREGISTRER MES NOTES</button>
        </div>
    </div>

    <div class="collection-only">
        <a href="commander.html" class="btn-main" style="background:var(--accent); color:#000; border:none;">🛒 COMMANDER MA PLAQUE ÉONIA</a>
    </div>
</div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const plantId = urlParams.get('id');

    async function loadData() {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ plantId, email: localStorage.getItem('user_email') || "invite@eonia.com" })
            });
            const data = await res.json();
            const plant = data.find(p => p.id === plantId);

            if (plant) {
                document.getElementById('p-photo').src = plant.Photo;
                document.getElementById('p-titre').innerText = plant["Nom commun"];
                document.getElementById('p-sci').innerText = plant["Nom scientifique"];
                document.getElementById('p-desc').innerText = plant.Description;

                // 9 RUBRIQUES (AVEC FLORAISON)
                const rubriques = [
                    {l:"Famille", v:plant.Famille, h:true},
                    {l:"Type", v:plant.Type, h:true},
                    {l:"Floraison", v:plant.Floraison},
                    {l:"Difficulté", v:plant.Difficulté_Icon},
                    {l:"Arrosage", v:plant.Arrosage_Icon},
                    {l:"Exposition", v:plant.Exposition_Icon},
                    {l:"Taille Adulte", v:plant["Taille à maturité"]},
                    {l:"Persistance", v:plant.Persistance},
                    {l:"Rusticité", v:plant.Rusticité}
                ];
                document.getElementById('p-grid').innerHTML = rubriques.map(r => `
                    <div class="info-box ${r.h ? 'highlight' : ''}">
                        <div class="label">${r.l}</div>
                        <div class="value">${r.v || "-"}</div>
                    </div>
                `).join('');

                if (plant.est_dans_jardin) {
                    document.querySelectorAll('.mon-jardin-only').forEach(el => el.style.display = 'block');
                    document.getElementById('p-notes').value = plant.Notes_Privées || "";
                    document.getElementById('date-plant').value = plant.Date_Plantation_ISO || "";
                    
                    // Graphique bâtons avec Toggle
                    const hist = plant.Watering_History || [0, 0, 1, 0, 1, 0, 0];
                    const days = ['15/04','16/04','17/04','18/04','19/04','20/04','21/04'];
                    document.getElementById('p-graph').innerHTML = days.map((d, i) => `
                        <div class="bar-wrapper" onclick="toggleBar(this)">
                            <div class="bar ${hist[i] ? 'active' : ''}"></div>
                            <div class="bar-date">${d}</div>
                        </div>
                    `).join('');

                    // Affichage Photos
                    const photos = plant.Photos_R2 || ["https://via.placeholder.com/150", "https://via.placeholder.com/150"];
                    document.getElementById('p-gallery').innerHTML = photos.map(url => `
                        <div class="evo-photo"><img src="${url}"></div>
                    `).join('');
                } else {
                    document.querySelectorAll('.collection-only').forEach(el => el.style.display = 'block');
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').classList.add('loaded');
            }
        } catch(e) { console.error(e); }
    }

    function toggleBar(el) {
        const bar = el.querySelector('.bar');
        bar.classList.toggle('active');
        // Ici appel API pour enregistrer l'état
    }

    function saveData() {
        const notes = document.getElementById('p-notes').value;
        const date = document.getElementById('date-plant').value;
        alert("Données enregistrées localement : " + notes + " pour le " + date);
        // Ici fetch(API_URL, { method: 'PUT', ... })
    }

    loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Ma Plante</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; line-height: 1.6; }
        
        #status-msg { text-align: center; padding: 50px; color: #4ade80; letter-spacing: 2px; }
        #plant-details { display: none; max-width: 1000px; margin: 0 auto; }

        /* --- STYLE COUVERTURE --- */
        .main-img-container { 
            width: 100%; 
            height: 50vh; /* L'image prend la moitié de l'écran en hauteur */
            overflow: hidden; 
            position: relative;
            border-bottom: 2px solid #4ade80;
        }
        #main-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Remplit tout l'espace sans déformer */
        }

        /* --- STYLE TEXTE AVEC MARGES --- */
        .content-padding { 
            padding: 30px 20px; /* Marges pour le texte sur les côtés */
        }

        header { margin-bottom: 20px; }
        .back-btn { color: #4ade80; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        .title-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 5px; color: #4ade80; font-size: 1.8rem; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .info-item { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: #666; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .value { font-size: 0.85rem; font-weight: 500; color: #eee; }

        .description-box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="status-msg">Connexion à la mémoire végétale...</div>

    <div id="plant-details">
        <div class="main-img-container">
            <img id="main-img" src="" alt="Plante">
        </div>

        <div class="content-padding">
            <header>
                <a href="catalogue.html" class="back-btn">← Retour au catalogue</a>
            </header>

            <div class="title-section">
                <h1 id="nom-commun">...</h1>
                <p id="surnom-plante" style="opacity: 0.6; font-style: italic; font-size: 0.9rem;"></p>
            </div>

            <div class="grid-info">
                <div class="info-item"><span class="label">ID Plaque</span><span id="id-plaque" class="value"></span></div>
                <div class="info-item"><span class="label">Famille</span><span id="famille" class="value"></span></div>
                <div class="info-item"><span class="label">Exposition</span><span id="exposition" class="value"></span></div>
                <div class="info-item"><span class="label">Rusticité</span><span id="rusticite" class="value"></span></div>
                <div class="info-item"><span class="label">Arrosage</span><span id="info-arrosage" class="value"></span></div>
                <div class="info-item"><span class="label">Taille</span><span id="taille" class="value"></span></div>
            </div>

            <div class="description-box">
                <span class="label">Description & Entretien</span>
                <p id="desc-text" style="margin-top:10px; font-size:0.9rem; color: #ccc;"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://eonia-api.santhimi.workers.dev";

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const plaqueNum = params.get('plaque'); 
            const container = document.getElementById('plant-details');
            const statusMsg = document.getElementById('status-msg');

            if (!plaqueNum) {
                statusMsg.innerText = "Scanner une plaque pour voir les détails.";
                return;
            }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                const page = data.results.find(p => {
                    const prop = p.properties["ID_Plaque"];
                    if (!prop) return false;
                    const val = (prop.rich_text && prop.rich_text.length > 0) ? prop.rich_text[0].plain_text : 
                                (prop.title && prop.title.length > 0) ? prop.title[0].plain_text : "";
                    return val.toString().trim() === plaqueNum.toString().trim();
                });

                if (!page) {
                    statusMsg.innerHTML = `Plaque #${plaqueNum} non attribuée.`;
                    return;
                }

                const p = page.properties;
                const getTxt = (name) => {
                    const pr = p[name];
                    if (!pr) return "NC";
                    if (pr.rich_text) return pr.rich_text.map(t => t.plain_text).join('') || "NC";
                    if (pr.title) return pr.title[0]?.plain_text || "NC";
                    if (pr.select) return pr.select.name || "NC";
                    return "NC";
                };

                // Remplissage des données
                document.getElementById('nom-commun').innerText = getTxt("Nom commun");
                document.getElementById('surnom-plante').innerText = getTxt("Surnom de ma plante");
                document.getElementById('famille').innerText = getTxt("Famille");
                document.getElementById('exposition').innerText = getTxt("Exposition");
                document.getElementById('rusticite').innerText = getTxt("Rusticite");
                document.getElementById('info-arrosage').innerText = getTxt("Arrosage");
                document.getElementById('taille').innerText = getTxt("Taille à maturite");
                document.getElementById('id-plaque').innerText = plaqueNum;
                document.getElementById('desc-text').innerText = getTxt("Description");

                // Image en couverture
                const imgCol = p["Photo"]?.files?.[0];
                const imgUrl = imgCol?.file?.url || imgCol?.external?.url || page.cover?.external?.url || "";
                if (imgUrl) document.getElementById('main-img').src = imgUrl;

                statusMsg.style.display = 'none';
                container.style.display = 'block';

            } catch (e) {
                statusMsg.innerText = "Erreur de connexion.";
                console.error(e);
            }
        }
        load();
    </script>
</body>
</html>

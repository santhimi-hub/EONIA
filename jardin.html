<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Ma Plante</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; line-height: 1.6; }
        #status-msg { text-align: center; padding: 50px; color: #4ade80; letter-spacing: 2px; }
        #plant-details { display: none; max-width: 1000px; margin: 0 auto; padding-bottom: 50px; }
        .main-img-container { width: 100%; height: 45vh; overflow: hidden; position: relative; border-bottom: 2px solid #4ade80; }
        #main-img { width: 100%; height: 100%; object-fit: cover; }
        .content-padding { padding: 25px 20px; }
        header { margin-bottom: 15px; }
        .back-btn { color: #4ade80; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 4px; color: #4ade80; font-size: 1.6rem; margin-bottom: 5px; }
        .surnom { opacity: 0.6; font-style: italic; margin-bottom: 20px; font-size: 0.9rem; color: #4ade80; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .info-item { background: #0c0c0c; padding: 12px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .label { font-size: 0.55rem; text-transform: uppercase; color: #555; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .value { font-size: 0.8rem; font-weight: 500; color: #ddd; }
        details { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 8px; }
        summary { padding: 12px; cursor: pointer; color: #4ade80; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; list-style: none; outline: none; }
        .details-content { padding: 0 12px 12px 12px; font-size: 0.85rem; color: #bbb; border-top: 1px solid #1a1a1a; padding-top: 8px; white-space: pre-line; }
        #espace-proprietaire { border: 1px solid #4ade80; padding: 20px; border-radius: 12px; margin-top: 25px; background: rgba(74, 222, 128, 0.03); display: none; }
    </style>
</head>
<body>

    <div id="status-msg">Synchronisation avec le jardin...</div>

    <div id="plant-details">
        <div class="main-img-container">
            <img id="main-img" src="" alt="Plante">
        </div>

        <div class="content-padding">
            <header><a href="catalogue.html" class="back-btn">← Retour au Jardin</a></header>

            <h1 id="nom-commun">...</h1>
            <div id="surnom-plante" class="surnom"></div>

            <div class="grid-info">
                <div class="info-item"><span class="label">ID Plaque</span><span id="id-plaque" class="value"></span></div>
                <div class="info-item"><span class="label">Famille</span><span id="famille" class="value"></span></div>
                <div class="info-item"><span class="label">Exposition</span><span id="exposition" class="value"></span></div>
                <div class="info-item"><span class="label">Arrosage</span><span id="arrosage" class="value"></span></div>
            </div>

            <details><summary>✂ Entretien</summary><div class="details-content" id="entretien"></div></details>
            <details><summary>🛡 Santé</summary><div class="details-content" id="sante"></div></details>

            <div id="espace-proprietaire">
                <h2 style="color:#4ade80; font-size:0.8rem; letter-spacing:2px;">VOTRE SUIVI PRIVÉ</h2>
                <p id="notes-suivi" style="font-size:0.85rem; color:#eee; font-style:italic; margin-top:10px;"></p>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    window.onload = () => { load(); };

    async function load() {
        const statusMsg = document.getElementById('status-msg');
        const detailsCont = document.getElementById('plant-details');
        
        try {
            const params = new URLSearchParams(window.location.search);
            const plaqueId = params.get('id');

            if (!plaqueId) {
                statusMsg.innerText = "Aucun ID de plaque détecté.";
                return;
            }

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: plaqueId,
                    email: localStorage.getItem('user_email') || "invite@eonia.com"
                })
            });

            const result = await response.json();
            
            if (result.error) {
                statusMsg.innerText = "Erreur : " + result.error;
                return;
            }

            const p = result[0];
            statusMsg.style.display = 'none';
            detailsCont.style.display = 'block';

            // Remplissage des données
            document.getElementById('nom-commun').innerText = p["Nom commun"] || "Spécimen";
            document.getElementById('surnom-plante').innerText = p["Surnom de ma plante"] || "";
            document.getElementById('id-plaque').innerText = p["ID_Plaque"] || plaqueId;
            document.getElementById('famille').innerText = p["Famille"] || "-";
            document.getElementById('exposition').innerText = p["Exposition"] || "-";
            document.getElementById('arrosage').innerText = p["Arrosage"] || "-";
            document.getElementById('entretien').innerText = p["Entretien"] || "Non renseigné";
            document.getElementById('sante').innerText = p["Protection et sante"] || "Non renseigné";
            
            if (p["Photo"]) {
                document.getElementById('main-img').src = p["Photo"];
            }

            // Si propriétaire
            if (p.estProprietaire) {
                document.getElementById('espace-proprietaire').style.display = 'block';
                document.getElementById('notes-suivi').innerText = p["Notes_Suivi"] || "Aucune note.";
            }

        } catch (error) {
            statusMsg.innerText = "Erreur de connexion au serveur.";
            console.error(error);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Notre Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; }

        /* --- LOADER (S'ACTIVE AU CLIC) --- */
        #eonia-loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner-logo { width: 60px; animation: spin 2s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-txt { font-size: 0.6rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        /* --- INTERFACE CATALOGUE --- */
        .header { text-align: center; padding: 30px; }
        .logo-top { width: 50px; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 1.5rem; margin-top: 10px; }
        .sub { color: var(--accent); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }

        /* RECHERCHE ET FILTRES */
        .nav-sticky { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; }
        .search-bar { width: 100%; max-width: 500px; margin: 0 auto; display: block; background: #111; border: 1px solid var(--border); padding: 12px 20px; border-radius: 40px; color: #fff; outline: none; }
        .filters { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; max-width: 600px; margin: 0 auto; scrollbar-width: none; }
        .filter-btn { padding: 7px 15px; border-radius: 20px; border: 1px solid var(--border); font-size: 0.65rem; color: #888; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        /* GRILLE */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 900px; margin: 0 auto 100px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; text-decoration: none; color: inherit; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-name { padding: 12px; text-align: center; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- BULLE IA (BAS GAUCHE) --- */
        #ai-bubble {
            position: fixed; bottom: 25px; left: 20px; width: 60px; height: 60px;
            background: #000; border: 2px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 9000; cursor: pointer;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
        #ai-bubble img { width: 38px; }
        #ai-window {
            display: none; position: fixed; bottom: 95px; left: 20px; width: 280px;
            background: #0c0c0c; border: 1px solid var(--border); border-radius: 20px;
            z-index: 9001; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* --- BOUTON TOP (BAS DROITE) --- */
        #top-btn {
            display: none; position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px;
            background: var(--accent); color: #000; border: none; border-radius: 50%;
            cursor: pointer; z-index: 9000; font-weight: bold; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="eonia-loader">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo">
        <div class="load-txt">Connexion à la plante...</div>
    </div>

    <div class="header">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-top">
        <h1>ÉONIA</h1>
        <div class="sub">Notre Collection</div>
    </div>

    <div class="nav-sticky">
        <input type="text" class="search-bar" placeholder="RECHERCHER...">
        <div class="filters">
            <div class="filter-btn active">TOUT</div>
            <div class="filter-btn">FRUITIERS</div>
            <div class="filter-btn">FLEURS</div>
            <div class="filter-btn">ARBRES</div>
        </div>
    </div>

    <div class="grid" id="plantGrid">
        <a href="page-plante.html" class="card" onclick="showLoader()">
            <img src="https://images.unsplash.com/photo-1520412099521-638f46d5e906?w=400">
            <div class="card-name">Abricotier</div>
        </a>
    </div>

    <div id="ai-bubble" onclick="toggleChat()">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png">
    </div>
    <div id="ai-window">
        <h3 style="color:var(--accent); font-size:0.7rem; letter-spacing:2px; margin-bottom:10px;">ASSISTANT ÉONIA</h3>
        <p style="font-size:0.8rem; color:#ccc;">Je vous aide à naviguer dans les 500 espèces du catalogue.</p>
    </div>

    <button id="top-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
    // FONCTION POUR LANCER LE LOADER AU CLIC SUR UNE PLANTE
    function showLoader() {
        document.getElementById('eonia-loader').style.display = 'flex';
    }

    // GESTION IA
    function toggleChat() {
        const win = document.getElementById('ai-window');
        win.style.display = (win.style.display === 'block') ? 'none' : 'block';
    }

    // GESTION BOUTON TOP
    window.onscroll = function() {
        const btn = document.getElementById("top-btn");
        if (window.scrollY > 400) btn.style.display = "block";
        else btn.style.display = "none";
    };
</script>

</body>
</html>

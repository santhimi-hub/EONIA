<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        
        .back-btn { background: none; border: 1px solid #4ade80; color: #4ade80; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* --- DESIGN METEO STYLE APPLE --- */
        #weather-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            min-height: 80px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .geo-request { text-align: center; font-size: 0.8rem; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn-geo { background: #4ade80; color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; align-self: center; font-family: 'Raleway'; font-size: 0.7rem; }
        
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .w-day { font-size: 0.6rem; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .w-icon { font-size: 1.8rem; }
        .w-temp { font-size: 0.85rem; color: #fff; }

        #reset-gps {
            position: absolute;
            right: 15px;
            bottom: 8px;
            opacity: 0.3;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        #reset-gps:hover { opacity: 1; color: #4ade80; }

        /* --- INFOS PLANTE --- */
        .hero-img { width: 100%; height: 45vh; object-fit: cover; border-radius: 15px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .sci-name { color: #4ade80; font-size: 0.9rem; font-style: italic; margin-bottom: 20px; opacity: 0.8; }
        
        #btn-edit-surnom {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.65rem;
            margin-left: 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Raleway';
            vertical-align: middle;
        }

        .badge-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .badge { background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.2); padding: 8px 15px; border-radius: 8px; min-width: 110px; }
        .badge-label { color: #4ade80; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; opacity: 0.7; }
        .badge-value { color: #eee; font-size: 0.75rem; text-transform: uppercase; font-weight: 500; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; }
        .label { color: #4ade80; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .value { color: #eee; font-size: 0.85rem; }
        
        .desc-box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .desc { line-height: 1.6; color: #ccc; font-size: 0.9rem; white-space: pre-wrap; }

        .order-cta { margin-top: 40px; margin-bottom: 40px; padding: 30px 20px; text-align: center; border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 15px; background: linear-gradient(180deg, rgba(74, 222, 128, 0.02) 0%, rgba(0,0,0,0) 100%); }
        .btn-order { background: #4ade80; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="section-detail" class="hidden">
        <button id="custom-back" class="back-btn">← Retour</button>
        
        <div id="weather-container" class="hidden"></div>

        <img id="p-photo" class="hero-img">
        
        <div style="display: flex; align-items: center; margin-bottom: 10px;">
            <h1 id="p-titre" style="font-size: 2.2rem; font-weight: 300; margin: 0;"></h1>
            <button id="btn-edit-surnom" class="hidden">Modifier</button>
        </div>
        
        <div id="p-sci" class="sci-name"></div>

        <div class="badge-container">
            <div class="badge"><span class="badge-label">Famille</span><span id="p-famille" class="badge-value">-</span></div>
            <div class="badge"><span class="badge-label">Type</span><span id="p-type" class="badge-value">-</span></div>
        </div>

        <div class="info-grid">
            <div class="info-box"><div class="label">Arrosage</div><div id="p-arrosage" class="value">-</div></div>
            <div class="info-box"><div class="label">Exposition</div><div id="p-expo" class="value">-</div></div>
            <div class="info-box"><div class="label">Difficulté</div><div id="p-diff" class="value">-</div></div>
            <div class="info-box"><div class="label">Rusticité</div><div id="p-rust" class="value">-</div></div>
            <div class="info-box"><div class="label">Taille adulte</div><div id="p-taille" class="value">-</div></div>
            <div class="info-box"><div class="label">Persistance</div><div id="p-pers" class="value">-</div></div>
        </div>

        <div class="desc-box">
            <div class="label">Description & Conseils</div>
            <div id="p-desc" class="desc"></div>
        </div>

        <div id="cta-invite" class="order-cta hidden">
            <p>Donnez vie à cette plante dans votre jardin</p>
            <button class="btn-order" onclick="window.location.href='commander.html'">Commander ma plaque ÉONIA</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const params = new URLSearchParams(window.location.search);
    const plantId = params.get('id');
    const userEmail = localStorage.getItem('user_email') || 'invite@eonia.com';

    document.getElementById('custom-back').onclick = () => window.history.back();

    async function fetchAndDisplay(bodyData) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData) 
            });
            const allItems = await response.json();
            const p = allItems.find(item => String(item.id) === plantId || String(item.ID_Plaque) === plantId);

            if (p) {
                document.getElementById('section-detail').classList.remove('hidden');
                const isOwner = p["est_dans_jardin"] === true;

                // --- GESTION MÉTÉO ---
                const container = document.getElementById('weather-container');
                if (isOwner) {
                    container.classList.remove('hidden');

                    if (p.Alertes && p.Alertes.length > 0) {
                        let html = "";
                        p.Alertes.forEach(str => {
                            const bits = str.split('|'); 
                            if(bits.length > 1) {
                                html += `<div class="w-col">
                                    <span class="w-day">${bits[0]}</span>
                                    <span class="w-icon">${bits[1]}</span>
                                    <span class="w-temp">${bits[2]}</span>
                                </div>`;
                            }
                        });
                        // Ajout du bouton de réinitialisation discret
                        html += `<div id="reset-gps">📍 Changer de lieu</div>`;
                        container.innerHTML = html;

                        document.getElementById('reset-gps').onclick = () => {
                            if(confirm("Voulez-vous mettre à jour votre position GPS pour la météo ?")) {
                                localStorage.removeItem('user_lat');
                                localStorage.removeItem('user_lon');
                                location.reload();
                            }
                        };
                    } else {
                        container.innerHTML = `
                            <div class="geo-request">
                                <span>Activer la météo locale pour votre jardin ?</span>
                                <button class="btn-geo" id="enable-geo">ACTIVER LE GPS 📍</button>
                            </div>`;
                        document.getElementById('enable-geo').onclick = () => {
                            navigator.geolocation.getCurrentPosition((pos) => {
                                localStorage.setItem('user_lat', pos.coords.latitude);
                                localStorage.setItem('user_lon', pos.coords.longitude);
                                fetchAndDisplay({ email: userEmail, plantId: plantId, lat: pos.coords.latitude, lon: pos.coords.longitude });
                            }, (err) => { 
                                alert("Erreur GPS : Localisation refusée. Vérifiez les réglages de votre navigateur."); 
                            });
                        };
                    }
                } else {
                    container.classList.add('hidden');
                }

                // --- TITRE & SURNOM ---
                const mainTitle = (isOwner && p.Surnom) ? p.Surnom : (p["Nom commun"] || 'Spécimen');
                document.getElementById('p-titre').innerText = mainTitle;
                
                if (isOwner) {
                    const btnEdit = document.getElementById('btn-edit-surnom');
                    btnEdit.classList.remove('hidden');
                    btnEdit.onclick = async () => {
                        const n = prompt("Comment s'appelle votre plante ?", mainTitle);
                        if(n && n !== mainTitle) {
                            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:"updateSurnom", email:userEmail, plantId:plantId, newSurnom:n })});
                            location.reload();
                        }
                    };
                }

                // --- INFOS ---
                document.getElementById('p-photo').src = p["Photo"] || '';
                document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
                document.getElementById('p-famille').innerText = p["Famille"] || "-";
                document.getElementById('p-type').innerText = p["Type"] || "-";
                document.getElementById('p-arrosage').innerText = p["Arrosage"] || "-";
                document.getElementById('p-expo').innerText = p["Exposition"] || "-";
                document.getElementById('p-diff').innerText = p["Difficulté"] || "-";
                document.getElementById('p-rust').innerText = p["Rusticité"] || "-";
                document.getElementById('p-taille').innerText = p["Taille à maturité"] || "-";
                document.getElementById('p-pers').innerText = p["Persistance"] || "-";
                document.getElementById('p-desc').innerText = p["Description"] || "Aucune description.";

                if (userEmail === 'invite@eonia.com') {
                    document.getElementById('cta-invite').classList.remove('hidden');
                }
            }
        } catch (e) { console.error("Erreur", e); }
    }

    // Chargement avec vérification du stockage local
    window.onload = () => {
        if (!plantId) return;
        const lat = localStorage.getItem('user_lat');
        const lon = localStorage.getItem('user_lon');
        if (lat && lon) {
            fetchAndDisplay({ email: userEmail, plantId: plantId, lat: parseFloat(lat), lon: parseFloat(lon) });
        } else {
            fetchAndDisplay({ email: userEmail, plantId: plantId });
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Ma Plante</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; line-height: 1.6; }
        #status-msg { text-align: center; padding: 50px; color: #4ade80; }
        #plant-details { display: none; max-width: 1000px; margin: 0 auto; }
        .main-img-container { width: 100%; height: 50vh; overflow: hidden; border-bottom: 2px solid #4ade80; }
        #main-img { width: 100%; height: 100%; object-fit: cover; }
        .content-padding { padding: 30px 20px; }
        header { margin-bottom: 20px; }
        .back-btn { color: #4ade80; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 5px; color: #4ade80; font-size: 1.8rem; margin-bottom: 5px; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .info-item { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: #666; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .value { font-size: 0.85rem; font-weight: 500; color: #eee; }
        .description-box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="status-msg">Connexion à la mémoire végétale...</div>

    <div id="plant-details">
        <div class="main-img-container">
            <img id="main-img" src="" alt="Plante">
        </div>

        <div class="content-padding">
            <header><a href="catalogue.html" class="back-btn">← Retour</a></header>
            
            <h1><span id="nom-commun">Chargement...</span></h1>
            <p id="surnom-plante" style="opacity: 0.6; font-style: italic; margin-bottom: 30px;"></p>

            <div class="grid-info">
                <div class="info-item"><span class="label">ID Plaque</span><span id="id-plaque" class="value"></span></div>
                <div class="info-item"><span class="label">Famille</span><span id="famille" class="value"></span></div>
                <div class="info-item"><span class="label">Exposition</span><span id="exposition" class="value"></span></div>
                <div class="info-item"><span class="label">Rusticité</span><span id="rusticite" class="value"></span></div>
                <div class="info-item"><span class="label">Arrosage</span><span id="info-arrosage" class="value"></span></div>
                <div class="info-item"><span class="label">Taille</span><span id="taille" class="value"></span></div>
            </div>

            <div class="description-box">
                <span class="label">Description</span>
                <p id="desc-text" style="margin-top:10px; font-size:0.9rem; color: #ccc;"></p>
            </div>
        </div>
    </div>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function load() {
        const params = new URLSearchParams(window.location.search);
        const plaqueNum = params.get('plaque'); 
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            const page = data.results.find(p => {
                const prop = p.properties["ID_Plaque"];
                const val = prop?.rich_text?.[0]?.plain_text || prop?.title?.[0]?.plain_text || "";
                return val.toString().trim() === plaqueNum?.toString().trim();
            });

            if (!page) {
                document.getElementById('status-msg').innerText = "Plante #" + plaqueNum + " introuvable.";
                return;
            }

            const p = page.properties;

            // --- LA FONCTION MAGIQUE : ELLE LIT TOUT (Texte, Puces, Sélections) ---
            const getV = (name) => {
                const target = p[name];
                if (!target) return "Non renseigné";
                
                // Si c'est du texte riche (comme ton Exposition avec la puce)
                if (target.rich_text && target.rich_text.length > 0) {
                    return target.rich_text.map(t => t.plain_text).join(""); 
                }
                // Si c'est le titre
                if (target.title && target.title.length > 0) return target.title[0].plain_text;
                // Si c'est un menu déroulant
                if (target.select) return target.select.name;
                
                return "NC";
            };

            // Affichage des données
            document.getElementById('nom-commun').innerText = getV("Nom commun");
            document.getElementById('surnom-plante').innerText = getV("Surnom de ma plante");
            document.getElementById('id-plaque').innerText = plaqueNum;
            
            // On utilise les noms EXACTS de ton Notion (sans accents comme sur ta photo)
            document.getElementById('famille').innerText = getV("Famille");
            document.getElementById('exposition').innerText = getV("Exposition");
            document.getElementById('rusticite').innerText = getV("Rusticite");
            document.getElementById('info-arrosage').innerText = getV("Arrosage");
            document.getElementById('taille').innerText = getV("Taille à maturite");
            document.getElementById('desc-text').innerText = getV("Description");

            const imgCol = p["Photo"]?.files?.[0];
            document.getElementById('main-img').src = imgCol?.file?.url || imgCol?.external?.url || "";

            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('plant-details').style.display = 'block';

        } catch (e) {
            document.getElementById('status-msg').innerText = "Erreur de connexion au jardin.";
        }
    }
    load();
</script>

</body>
</html>

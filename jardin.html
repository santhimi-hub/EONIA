<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        #weather-container { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; padding: 20px; margin-bottom: 25px; 
            display: flex; justify-content: center; align-items: center; min-height: 80px; 
        }
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .w-day { font-size: 0.65rem; color: #888; font-weight: bold; }
        .w-icon { font-size: 1.8rem; }
        .w-temp { font-size: 0.9rem; }
        
        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .sci-name { color: var(--accent); font-size: 0.8rem; font-style: italic; margin-bottom: 20px; opacity: 0.7; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box.highlight { border-left: 4px solid var(--accent); border-color: rgba(74, 222, 128, 0.2); }
        .info-box .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.85rem; color: #fff; }
        
        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .btn-water { background: var(--water); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
        .history-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
        .history-tag { font-size: 0.6rem; background: #1a1a1a; padding: 4px 8px; border-radius: 4px; color: #888; border: 1px solid #333; }

        .desc-box { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px;}
        .section-title { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-left: 2px solid var(--accent); padding-left: 10px; }
        
        .btn-save { background: #fff; color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 15px; display: none; }
        textarea, input[type="date"] { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; font-family: inherit;}
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        <div id="weather-container" class="hidden"></div>
        
        <img id="p-photo" class="hero-img">
        <h1 id="p-titre" style="font-size:2.1rem; font-weight:200; margin:0 0 5px 0;">Chargement...</h1>
        <div id="p-sci" class="sci-name"></div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">ENTRETIEN & HISTORIQUE</div>
                <button class="btn-water" id="btn-water-main" onclick="recordWatering()">💦 MARQUER COMME ARROSÉ</button>
                <div id="watering-history" class="history-list"></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">JOURNAL DE BORD</div>
                <label style="font-size: 0.6rem; color: var(--accent);">DATE DE PLANTATION</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label style="font-size: 0.6rem; color: var(--accent); margin-top: 10px; display: block;">NOTES PERSONNELLES</label>
                <textarea id="plant-note" rows="3" placeholder="Notes..." oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-save" onclick="saveJournal()">💾 ENREGISTRER</button>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">DESCRIPTION</div>
            <div id="p-desc" style="line-height:1.8; color:#aaa; font-size:0.95rem;"></div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const plantIdClean = rawPlantId ? rawPlantId.replace(/-/g, "") : null;
    const userEmail = localStorage.getItem('user_email') || "invite@eonia.com";

    async function init() {
        if (!rawPlantId) return;
        
        // Demande la géoloc dès le début
        navigator.geolocation.getCurrentPosition(
            (pos) => loadData(pos.coords.latitude, pos.coords.longitude),
            () => loadData(null, null),
            { timeout: 5000 }
        );
    }

    async function loadData(lat, lon) {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail, plantId: rawPlantId, lat, lon }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "") === plantIdClean || item.id === rawPlantId || item.ID_Plaque === rawPlantId);
            if (p) render(p);
        } catch (e) { document.getElementById('p-titre').innerText = "Erreur de connexion"; }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"];
        document.getElementById('p-sci').innerText = p["Nom scientifique"];
        document.getElementById('p-desc').innerText = p.Description;

        if (p.Alertes) {
            const weatherBox = document.getElementById('weather-container');
            weatherBox.classList.remove('hidden');
            weatherBox.innerHTML = p.Alertes.map(str => {
                const [d, i, t] = str.split('|');
                return `<div class="w-col"><span class="w-day">${d}</span><span class="w-icon">${i}</span><span class="w-temp">${t}</span></div>`;
            }).join('');
        }

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('plant-note').value = (p.Note_Privee && p.Note_Privee !== "-") ? p.Note_Privee : "";
            document.getElementById('plant-date').value = (p.Date_Plantation && p.Date_Plantation !== "-") ? p.Date_Plantation : "";
            
            const historyContainer = document.getElementById('watering-history');
            if (p.Historique_Data && p.Historique_Data !== "-") {
                const dates = p.Historique_Data.split(',').filter(d => d.trim() !== "");
                historyContainer.innerHTML = dates.slice().reverse().slice(0, 8).map(d => `<span class="history-tag">${d}</span>`).join('');
            }
        }

        const fields = [
            {l:"Arrosage", v:p.Arrosage}, {l:"Exposition", v:p.Exposition},
            {l:"Type", v:p.Type}, {l:"Famille", v:p.Famille},
            {l:"Taille", v:p.Taille}, {l:"Rusticité", v:p.Rusticité}
        ];
        document.getElementById('p-grid').innerHTML = fields.map(f => `
            <div class="info-box">
                <div class="label">${f.l}</div>
                <div class="value">${f.v||"-"}</div>
            </div>`).join('');
    }

    async function recordWatering() {
        await fetch(API_URL, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: userEmail, action: 'record_watering', plantId: rawPlantId }) 
        });
        location.reload();
    }

    async function saveJournal() {
        const date = document.getElementById('plant-date').value;
        const note = document.getElementById('plant-note').value;
        await fetch(API_URL, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: userEmail, action: 'update_prive', plantId: rawPlantId, date, note }) 
        });
        location.reload();
    }

    function showSave() { document.getElementById('btn-save-note').style.display = "block"; }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Fiche Botanique</title>
    <style>
        :root { --accent: #4ade80; --bg: #0a0a0a; --card: #161616; --text-dim: #aaa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; line-height: 1.6; }
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .back-nav { display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-bottom: 1px solid #222; background: #111; }
        .container { padding: 30px 20px 80px 20px; max-width: 800px; margin: auto; }
        h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .surnom { color: var(--accent); font-size: 1rem; font-style: italic; margin-bottom: 30px; opacity: 0.8; }
        <div style="background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px;">
    <label style="display: block; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-bottom: 8px;">
        Ma Date de Plantation
    </label>
    <input type="date" id="date-plantation" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-family: inherit;">
</div>

        .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .spec-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .spec-card span { display: block; font-size: 0.65rem; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .spec-card p { font-size: 0.9rem; color: #eee; font-weight: 500; }
        .menu-item { border-bottom: 1px solid #222; }
        .menu-header { width: 100%; background: none; border: none; color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
        .menu-header::after { content: '+'; color: var(--accent); font-size: 1.2rem; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; color: var(--text-dim); font-size: 0.95rem; }
        .menu-item.active .menu-content { max-height: 2000px; padding-bottom: 25px; }
        .menu-item.active .menu-header::after { content: '−'; }
        #status-msg { text-align: center; padding: 100px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        footer { text-align: center; padding: 40px; opacity: 0.2; font-size: 0.5rem; letter-spacing: 4px; }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 1.2rem; letter-spacing: 8px; font-weight: 200;">ÉONIA</div>
        <a href="catalogue.html" class="back-nav">← Retour au catalogue</a>
    </header>

    <div id="status-msg">Initialisation de la mémoire végétale...</div>

    <div id="plant-details" style="display:none;">
        <img src="" id="main-img" class="hero-img">
        <div class="container">
            <h1 id="nom-commun"></h1>
            <p id="surnom-plante" class="surnom"></p>

            <div class="specs-grid">
                <div class="spec-card"><span>Famille</span><p id="famille"></p></div>
                <div class="spec-card"><span>Origine</span><p id="origine"></p></div>
                <div class="spec-card"><span>Difficulté</span><p id="difficulte"></p></div>
                <div class="spec-card"><span>Exposition</span><p id="exposition"></p></div>
                <div class="spec-card"><span>Rusticité</span><p id="rusticite"></p></div>
                <div class="spec-card"><span>Style Jardin</span><p id="style-jardin"></p></div>
                <div class="spec-card"><span>Taille Maturité</span><p id="taille"></p></div>
                <div class="spec-card"><span>Floraison</span><p id="floraison"></p></div>
                <div class="spec-card"><span>Type de sol</span><p id="type-sol"></p></div>
                <div class="spec-card"><span>Persistance</span><p id="persistance"></p></div>
                <div class="spec-card"><span>Type</span><p id="type"></p></div>
                <div class="spec-card"><span>ID Plaque</span><p id="id-plaque"></p></div>
            </div>

            <div id="menus-container"></div>
        </div>
    </div>
    <footer>ÉONIA — MÉMOIRE VÉGÉTALE</footer>

    <script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    async function load() {
        const params = new URLSearchParams(window.location.search);
        const plaqueNum = params.get('plaque'); 

        const container = document.getElementById('plant-details');
        const statusMsg = document.getElementById('status-msg');

        if (!plaqueNum) {
            statusMsg.innerText = "Scanner une plaque ÉONIA pour continuer.";
            return;
        }

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("Réponse réseau incorrecte");
            const data = await response.json();

            // RECHERCHE DE LA PLAQUE
            const page = data.results.find(p => {
                // On cherche la colonne ID_Plaque en ignorant la casse (majuscules/minuscules)
                const propName = Object.keys(p.properties).find(k => k.toLowerCase().trim() === "id_plaque");
                const prop = p.properties[propName];
                if (!prop) return false;

                const val = prop.title?.[0]?.plain_text || prop.rich_text?.[0]?.plain_text || "";
                return val.toString().trim() === plaqueNum.toString().trim();
            });

            if (!page) {
                statusMsg.innerHTML = `La plaque <b>#${plaqueNum}</b> n'est pas encore reliée à une plante.<br><small>Vérifiez la colonne ID_Plaque dans Notion.</small>`;
                return;
            }

            const p = page.properties;

            // FONCTION DE SÉCURITÉ : Elle ne crash pas si la colonne n'existe pas
            const getSafeTxt = (names) => {
                // On lui donne une liste de noms possibles (ex: avec ou sans accent)
                let foundProp = null;
                for (let name of names) {
                    if (p[name]) { foundProp = p[name]; break; }
                }
                
                if (!foundProp) return "NC";
                
                try {
                    if (foundProp.title) return foundProp.title[0]?.plain_text || "NC";
                    if (foundProp.rich_text) return foundProp.rich_text.map(t => t.plain_text).join('') || "NC";
                    if (foundProp.select) return foundProp.select.name || "NC";
                    if (foundProp.multi_select) return foundProp.multi_select.map(s => s.name).join(', ') || "NC";
                } catch (e) { return "NC"; }
                return "NC";
            };

            // REMPLISSAGE (On essaie plusieurs orthographes pour éviter les erreurs)
            document.getElementById('nom-commun').innerText = getSafeTxt(["Nom commun"]);
            document.getElementById('surnom-plante').innerText = getSafeTxt(["Surnom de ma plante"]);
            document.getElementById('famille').innerText = getSafeTxt(["Famille"]);
            document.getElementById('origine').innerText = getSafeTxt(["Origine"]);
            document.getElementById('difficulte').innerText = getSafeTxt(["Difficulte", "Difficulté"]);
            document.getElementById('exposition').innerText = getSafeTxt(["Exposition"]);
            document.getElementById('rusticite').innerText = getSafeTxt(["Rusticite", "Rusticité"]);
            document.getElementById('style-jardin').innerText = getSafeTxt(["Style jardin"]);
            document.getElementById('taille').innerText = getSafeTxt(["Taille à maturite", "Taille à maturité"]);
            document.getElementById('floraison').innerText = getSafeTxt(["Floraison"]);
            document.getElementById('type-sol').innerText = getSafeTxt(["Type de sol"]);
            document.getElementById('persistance').innerText = getSafeTxt(["Persistance"]);
            document.getElementById('type').innerText = getSafeTxt(["Type"]);
            document.getElementById('id-plaque').innerText = getSafeTxt(["ID_Plaque"]);

            // Menus
            document.getElementById('desc-text').innerText = getSafeTxt(["Description"]);
            document.getElementById('info-arrosage').innerText = getSafeTxt(["Arrosage"]);
            document.getElementById('info-entretien').innerText = getSafeTxt(["Entretien"]);
            document.getElementById('info-sol').innerText = getSafeTxt(["Sol et fertilisation"]);

            // Gestion de l'image
            const imgCol = p["Photo"]?.files?.[0];
            const imgUrl = imgCol?.file?.url || imgCol?.external?.url || page.cover?.external?.url || "";
            if (imgUrl) document.getElementById('main-img').src = imgUrl;

            statusMsg.style.display = 'none';
            container.style.display = 'block';

        } catch (error) {
            statusMsg.innerText = "Erreur de connexion. Vérifiez votre tableau Notion.";
            console.error("Erreur détaillée :", error);
        }
    }
    load();
</script>



</body>
</html>

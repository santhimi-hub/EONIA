<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Raleway', sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Image Bord à Bord */
        .hero-container {
            width: 100%;
            height: 55vh;
            background: #111;
        }
        .hero-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        /* Conteneur de contenu */
        .main-content { 
            max-width: 800px; 
            margin: -40px auto 0; 
            padding: 40px 25px 80px; 
            background: var(--bg);
            border-radius: 40px 40px 0 0; 
            position: relative;
            z-index: 10;
        }

        .nav-top { margin-bottom: 25px; }
        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            cursor: pointer; 
            font-weight: 500;
        }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 200; 
            letter-spacing: 2px;
            margin-top: 10px;
        }
        .sci-name { 
            color: var(--accent); 
            font-size: 0.85rem; 
            font-style: italic; 
            opacity: 0.5; 
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        
        /* Grille */
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 40px;
        }
        .info-box { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 18px 20px; 
            border-radius: 16px; 
        }
        .info-box.highlight { 
            border-left: 2px solid var(--accent); 
        }
        
        .label { 
            color: var(--accent); 
            font-size: 0.55rem; 
            text-transform: uppercase; 
            font-weight: 600; 
            letter-spacing: 2px; 
            margin-bottom: 8px; 
        }
        .value { font-size: 0.85rem; font-weight: 300; color: #ddd; letter-spacing: 0.5px; }
        .visual-val { font-size: 1.2rem; }

        /* Correction Titre & Description */
        .desc-box { 
            margin-top: 40px; 
            padding-top: 30px; 
            border-top: 1px solid var(--border); 
        }
        .section-title { 
            color: var(--accent); /* Changé en vert */
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }
        #p-desc { 
            line-height: 1.8; 
            color: #aaa; 
            font-size: 0.95rem; 
            font-weight: 300; 
            text-align: justify;
        }

        /* Correction Bouton (box-sizing) */
        .btn-order-container {
            width: 100%;
            margin-top: 50px;
        }
        .btn-order { 
            display: block; 
            width: 100%; 
            padding: 22px 10px; 
            background: var(--accent); 
            color: #000; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.75rem;
            text-align: center; 
            transition: 0.3s;
            border: none;
        }
        .btn-order:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <img id="p-photo" class="hero-img" alt="">
    </div>

    <div class="main-content">
        <div class="nav-top">
            <a onclick="history.back()" class="back-link">← Collection</a>
        </div>
        
        <h1 id="p-titre">...</h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" class="hidden btn-order-container">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');

    function getVisual(type, val) {
        if (!val || val === "-" || val === "0") return "-";
        const v = val.toString().toLowerCase();
        if (type === "arrosage") {
            if (v.includes("1")) return "💧";
            if (v.includes("2")) return "💧💧";
            if (v.includes("3")) return "💧💧💧";
            return "💧";
        }
        if (type === "exposition") {
            if (v.includes("soleil")) return "☀️";
            if (v.includes("mi-ombre")) return "⛅";
            if (v.includes("ombre")) return "☁️";
            return "☀️";
        }
        if (type === "difficulté") {
            if (v.includes("1") || v.includes("facile")) return "🟢";
            if (v.includes("2") || v.includes("moyen")) return "🟡";
            return "🔴";
        }
        return val;
    }

    async function load() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
            });
            const data = await res.json();
            const p = data.find(x => x.id === rawId || x.cleanId === (rawId||"").replace(/-/g,"").toLowerCase());
            
            if (p) {
                document.getElementById('p-photo').src = p.Photo;
                document.getElementById('p-titre').innerText = p["Nom commun"];
                document.getElementById('p-sci').innerText = p["Nom scientifique"];
                document.getElementById('p-desc').innerText = p["Description"];
                
                if (!p.est_dans_jardin) document.getElementById('catalog-area').classList.remove('hidden');

                const fields = [
                    {l:"Famille", v:p.Famille, h:true},
                    {l:"Type", v:p.Type, h:true},
                    {l:"Difficulté", v:getVisual("difficulté", p.Difficulté), vis:true},
                    {l:"Arrosage", v:getVisual("arrosage", p.Arrosage), vis:true},
                    {l:"Exposition", v:getVisual("exposition", p.Exposition), vis:true},
                    {l:"Rusticité", v:p.Rusticité},
                    {l:"Taille", v:p["Taille à maturité"]},
                    {l:"Floraison", v:p.Floraison},
                    {l:"Persistance", v:p.Persistance}
                ];

                document.getElementById('p-grid').innerHTML = fields.map(f => `
                    <div class="info-box ${f.h ? 'highlight' : ''}">
                        <div class="label">${f.l}</div>
                        <div class="${f.vis ? 'visual-val' : 'value'}">${f.v || "-"}</div>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    load();
</script>
</body>
</html>

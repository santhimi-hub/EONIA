<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Raleway', sans-serif; }
        .container { padding: 40px 20px; max-width: 1000px; margin: auto; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 5px; color: #4ade80; text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .card:hover { border-color: #4ade80; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-name { display: block; font-size: 1rem; text-transform: uppercase; color: #4ade80; }
        #loader { text-align: center; color: #4ade80; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>La Collection</h1>
        <div id="loader">Chargement...</div>
        <div id="grid" class="grid"></div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    window.onload = async () => {
        try {
            // On demande le catalogue. On envoie le rôle si besoin de filtrer côté Worker
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "get_catalogue", role: localStorage.getItem('user_role') || 'public' })
            });
            const plantes = await res.json();
            document.getElementById('loader').style.display = 'none';

            const grid = document.getElementById('grid');
            plantes.forEach(p => {
                grid.innerHTML += `
                    <a href="jardin.html?id=${p.id}" class="card">
                        <img src="${p.Photo || ''}">
                        <div class="card-info">
                            <span class="card-name">${p["Nom commun"]}</span>
                        </div>
                    </a>`;
            });
        } catch (e) {
            document.getElementById('loader').innerText = "Erreur de chargement.";
        }
    };
</script>
</body>
</html>

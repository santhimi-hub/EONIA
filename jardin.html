<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; --error: #f87171; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        
        #weather-wrapper { margin-bottom: 25px; }
        .weather-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; margin-bottom: 8px; }
        #display-city { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        #weather-container { background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 80px; }
        .w-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .w-day { font-size: 0.55rem; color: #666; font-weight: bold; letter-spacing: 1px; }
        .w-icon { font-size: 1.5rem; }
        .w-temp { font-size: 0.8rem; }
        
        #weather-advice { background: rgba(74, 222, 128, 0.05); border: 1px solid var(--border); border-top: none; border-radius: 0 0 24px 24px; padding: 12px; font-size: 0.75rem; color: var(--accent); text-align: center; font-style: italic; min-height: 20px; }
        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); background: #080808; }
        
        .cycle-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .progress-bg { background: #1a1a1a; height: 6px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        .info-box .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-box .value { font-size: 0.85rem; color: #fff; }
        
        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-weight: 500; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; margin-top: 10px; }
        .btn-water-theme { border-color: rgba(56, 189, 248, 0.4); color: var(--water); }
        .btn-disabled { border-color: #333; color: #555; cursor: not-allowed; opacity: 0.6; }
        
        .history-tag { font-size: 0.55rem; background: rgba(255,255,255,0.03); padding: 5px 10px; border-radius: 6px; color: #888; border: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }

        .evo-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .evo-scroll img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); flex-shrink: 0; }

        #plant-date, #plant-note { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div class="weather-header"><span id="display-city">📍 Recherche...</span></div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse des conditions...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="">
        <h1 id="p-titre" style="font-size:2rem; font-weight:200; margin:0;"></h1>
        <div id="p-sci" style="color:var(--accent); font-size:0.8rem; font-style:italic; margin-bottom:20px; opacity:0.7;"></div>

        <div id="owner-area" class="hidden">
            <div class="cycle-box">
                <div class="section-title">Cycle de Vie Annuel</div>
                <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.55rem; color: #666;">
                    <span id="cycle-label">Chargement...</span><span id="cycle-pct">0%</span>
                </div>
            </div>

            <div class="maintenance-card" id="watering-card">
                <div class="section-title">ARROSAGE</div>
                <button class="btn-eonia btn-water-theme" id="btn-water-main" onclick="handleWateringAction()">💦 Marquer comme arrosé</button>
                <div id="watering-history" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px;"></div>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area-2" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">PHOTOS D'ÉVOLUTION</div>
                <div id="evo-gallery" class="evo-scroll"></div>
                <div id="upload-zone">
                    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
                    <button class="btn-eonia" style="border-color:var(--accent); color:var(--accent);" onclick="document.getElementById('file-input').click()">📸 Ajouter une photo</button>
                </div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">TABLEAU DE BORD - JOURNAL</div>
                <label style="font-size: 0.55rem; color: #555;">DATE DE PLANTATION</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label style="font-size: 0.55rem; color: #555; margin-top: 15px; display: block;">OBSERVATIONS</label>
                <textarea id="plant-note" rows="3" oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia" style="display:none; color:var(--accent); border-color:var(--accent);" onclick="saveJournal()">💾 Enregistrer les notes</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawPlantId = urlParams.get('id');
    const userEmail = localStorage.getItem('user_email');
    const userPin = localStorage.getItem('user_pin');
    const isOwner = (userEmail && userPin); 

    async function init() {
        if (!rawPlantId) return;
        fetchUpdate();
    }

    async function fetchUpdate() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail || "visitor@eonia.com", pin: userPin || "0000", plantId: rawPlantId, city: localStorage.getItem('user_city') }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "") === rawPlantId.replace(/-/g, "") || item.id === rawPlantId);
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('owner-area-2').classList.remove('hidden');
            document.getElementById('plant-note').value = p.Note_Privee !== "-" ? p.Note_Privee : "";
            document.getElementById('plant-date').value = p.Date_Plantation !== "-" ? p.Date_Plantation : "";

            // Galerie Photos
            const gallery = document.getElementById('evo-gallery');
            if (p.Photos_Evolution && p.Photos_Evolution.length > 0) {
                gallery.innerHTML = p.Photos_Evolution.map(imgUrl => `
                    <div style="position:relative; flex-shrink:0;">
                        <img src="${imgUrl}">
                        ${isOwner ? `<div onclick="deletePhoto('${imgUrl}')" style="position:absolute; top:5px; right:5px; background:rgba(248,113,113,0.9); color:white; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;">×</div>` : ''}
                    </div>
                `).join('');
            }

            // --- PARTIE ARROSAGE MISE À JOUR ---
            const h = document.getElementById('watering-history');
            if (p.Historique_Data && p.Historique_Data !== "-") {
                const dates = p.Historique_Data.split(',').map(d => d.trim()).filter(d => d !== "");
                h.innerHTML = dates.slice().reverse().map(date => `
                    <span class="history-tag">
                        ${date}
                        ${isOwner ? `<b onclick="deleteWatering('${date}')" style="color:var(--error); cursor:pointer; padding-left:5px;">×</b>` : ''}
                    </span>
                `).join('');
                
                if (isOwner && dates.includes(new Date().toLocaleDateString('fr-FR'))) {
                    const btn = document.getElementById('btn-water-main');
                    btn.innerText = "✅ Arrosé aujourd'hui"; btn.className = "btn-eonia btn-disabled"; btn.onclick = null;
                } else if (isOwner) {
                    const btn = document.getElementById('btn-water-main');
                    btn.innerText = "💦 Marquer comme arrosé"; btn.className = "btn-eonia btn-water-theme"; btn.onclick = handleWateringAction;
                }
            }
            updateCycle();
        }

        const fields = [{l:"Famille", v:p.Famille}, {l:"Type", v:p.Type}, {l:"Exposition", v:p.Exposition}, {l:"Arrosage", v:p.Arrosage}];
        document.getElementById('p-grid').innerHTML = fields.map(f => `<div class="info-box"><div class="label">${f.l}</div><div class="value">${f.v||"-"}</div></div>`).join('');
    }

    // ACTIONS ARROSAGE
    async function handleWateringAction() {
        const btn = document.getElementById('btn-water-main');
        btn.innerText = "⏳..."; btn.disabled = true;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'water' }) });
        fetchUpdate();
    }

    async function deleteWatering(date) {
        if (!confirm(`Supprimer l'arrosage du ${date} ?`)) return;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'delete_watering', date: date }) });
        fetchUpdate();
    }

    // ACTIONS PHOTOS
    async function uploadPhoto(input) {
        if (!input.files[0]) return;
        const btn = document.querySelector("#upload-zone button");
        btn.innerText = "⏳ Compression...";
        const file = await compressImage(input.files[0], 1000);
        
        btn.innerText = "🚀 Envoi...";
        const formData = new FormData();
        formData.append('file', file);
        formData.append('action', 'upload_photo_binaire');
        formData.append('plantId', rawPlantId);
        formData.append('email', userEmail);
        formData.append('pin', userPin);

        await fetch(API_URL, { method: 'POST', body: formData });
        fetchUpdate();
        btn.innerText = "📸 Ajouter une photo";
    }

    function compressImage(file, maxWidth) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', 0.7);
                };
            };
        });
    }

    async function deletePhoto(photoUrl) {
        if (!confirm("Supprimer la photo ?")) return;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'delete_photo', photoUrl }) });
        fetchUpdate();
    }

    async function saveJournal() {
        const note = document.getElementById('plant-note').value;
        const date = document.getElementById('plant-date').value;
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: userEmail, pin: userPin, plantId: rawPlantId, action: 'save_journal', note, date_plantation: date }) });
        document.getElementById('btn-save-note').style.display = "none";
        fetchUpdate();
    }

    function showSave() { document.getElementById('btn-save-note').style.display = "block"; }

    function updateCycle() {
        const now = new Date();
        const pct = Math.round(((now - new Date(now.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24 * 365)) * 100);
        document.getElementById('cycle-fill').style.width = pct + "%";
        document.getElementById('cycle-pct').innerText = pct + "%";
        document.getElementById('cycle-label').innerText = ["Repos", "Repos", "Réveil 🌱", "Croissance", "Sève ☀️", "Floraison 🌸", "Stabilité", "Maturation", "Préparation", "Automne 🍂", "Dormance", "Repos"][now.getMonth()];
    }

    init();
</script>
</body>
</html>

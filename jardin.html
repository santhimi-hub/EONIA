<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Mon Jardin</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Raleway',sans-serif;
}

header{
text-align:center;
padding:30px 20px;
}

h1{
color:#4ade80;
font-weight:200;
letter-spacing:4px;
text-transform:uppercase;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.card{
background:#0c0c0c;
border:1px solid #1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
border-color:#4ade80;
transform:translateY(-5px);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.name{
padding:10px;
text-align:center;
font-size:0.7rem;
text-transform:uppercase;
color:#bbb;
}

.empty{
text-align:center;
color:#555;
padding:60px 20px;
}
</style>
</head>

<body>

<header>
<h1>Mon Jardin</h1>
</header>

<div class="container">
<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none;">
🌱 Aucun végétal dans votre jardin pour le moment
</div>
</div>

<script>

const API_URL="https://eonia-api.santhimi.workers.dev";

let userEmail=localStorage.getItem("user_email") || "invite@eonia.com";
let userPin=localStorage.getItem("user_pin") || "0000";

let allPlants=[];
let userPlants=[];

window.onload=async()=>{

await loadUser();
await loadPlants();
render();

};

async function loadUser(){

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"get_user",
email:userEmail,
pin:userPin
})
});

const data=await res.json();

/* plantes du client = IDs */
userPlants = data?.plants || [];

}

async function loadPlants(){

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"get_catalogue"
})
});

allPlants=await res.json();

}

function render(){

const grid=document.getElementById("grid");
const empty=document.getElementById("empty");

grid.innerHTML="";

const myPlants=allPlants.filter(p =>
userPlants.includes(p.ID_Plaque || p.id)
);

if(myPlants.length===0){
empty.style.display="block";
return;
}

myPlants.forEach(p=>{

const div=document.createElement("div");
div.className="card";

div.onclick=()=>{
window.location.href="plante.html?id="+(p.ID_Plaque||p.id);
};

div.innerHTML=`
<img src="${p.Photo||''}">
<div class="name">${p["Nom commun"]||"Plante"}</div>
`;

grid.appendChild(div);

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mon Jardin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        /* HEADER & RETOUR */
        .back-btn { background: none; border: 1px solid var(--border); color: #888; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; }

        /* BOUTON COMMANDER (Refonte complète) */
        .cta-container { margin: 40px 0; padding: 20px; text-align: center; }
        .btn-order-premium {
            display: block;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #000;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(74, 222, 128, 0.3);
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-order-premium:active { transform: scale(0.96); }

        /* ARROSAGE & NOTES */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .section-title { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-left: 2px solid var(--accent); padding-left: 10px; }
        
        .btn-water { background: var(--water); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
        .cancel-link { color: #555; font-size: 0.7rem; display: block; margin-top: 15px; text-decoration: underline; cursor: pointer; text-align: center; }

        /* FORMULAIRE & CALENDRIER */
        input[type="date"], textarea {
            width: 100%; background: #151515; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; font-family: inherit; margin-bottom: 20px; box-sizing: border-box; font-size: 0.9rem;
        }
        .save-btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; }

        /* PHOTOS EVOLUTION */
        .photo-zone { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; border: 1px dashed #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .photo-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .photo-label { z-index: 1; font-size: 0.75rem; color: #888; text-align: center; }
        
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>

        <div id="p-header" style="margin-bottom: 30px;">
            <h1 id="p-titre" style="font-size:2.2rem; margin:0; font-weight:200;">Chargement...</h1>
            <p id="p-sci" style="color:var(--accent); font-style:italic; font-size:0.9rem; opacity:0.8;"></p>
        </div>

        <div id="owner-area" class="hidden">
            <div class="card">
                <div class="section-title">Entretien</div>
                <button class="btn-water" onclick="updateWater(false)">💦 J'AI ARROSÉ AUJOURD'HUI</button>
                <div id="water-info" style="font-size:0.75rem; color:#666; margin-top:15px; text-align:center;"></div>
                <span id="btn-cancel" class="cancel-link hidden" onclick="updateWater(true)">Erreur ? Annuler l'arrosage</span>
            </div>

            <div class="card">
                <div class="section-title">Journal de bord</div>
                <label style="font-size:0.7rem; color:#666; display:block; margin-bottom:8px;">DATE DE PLANTATION</label>
                <input type="date" id="input-date" onchange="showSave()">
                
                <label style="font-size:0.7rem; color:#666; display:block; margin-bottom:8px;">NOTES PRIVÉES</label>
                <textarea id="input-note" rows="3" placeholder="Observation, taille, engrais..." oninput="showSave()"></textarea>
                
                <button id="btn-save" class="save-btn hidden" onclick="saveData()">ENREGISTRER LES MODIFICATIONS</button>
            </div>

            <div class="card">
                <div class="section-title">Évolution en photo</div>
                <div class="photo-zone" onclick="document.getElementById('cam-input').click()">
                    <img id="preview" class="hidden">
                    <span class="photo-label">📸 APPUYER POUR PRENDRE UNE PHOTO</span>
                </div>
                <input type="file" id="cam-input" accept="image/*" capture="camera" class="hidden" onchange="previewPhoto(this)">
            </div>
        </div>

        <div id="botany-info" class="card">
            <div class="section-title">Informations</div>
            <div id="p-desc" style="color:#aaa; line-height:1.7; font-size:0.95rem;"></div>
        </div>

        <div id="cta-order" class="cta-container hidden">
            <p style="color:#666; font-size:0.8rem; margin-bottom:20px;">Cette plante vous plaît ?</p>
            <button class="btn-order-premium" onclick="window.location.href='commander.html'">
                Commander ma plaque Éonia
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://eonia-api.santhimi.workers.dev";
        const plantId = new URLSearchParams(window.location.search).get('id');
        const userEmail = localStorage.getItem('user_email');
        const userPin = localStorage.getItem('user_pin');

        async function init() {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, plantId })
            });
            const data = await res.json();
            const p = data.find(i => String(i.id) === plantId || String(i.ID_Plaque) === plantId);
            
            if (!p) return;

            document.getElementById('p-titre').innerText = (p.est_dans_jardin && p.Surnom) ? p.Surnom : p["Nom commun"];
            document.getElementById('p-sci').innerText = p["Nom scientifique"];
            document.getElementById('p-desc').innerText = p.Description;

            if (p.est_dans_jardin) {
                document.getElementById('owner-area').classList.remove('hidden');
                document.getElementById('input-date').value = p.Date_Plantation || "";
                document.getElementById('input-note').value = p.Note_Privee || "";
                
                if (p.Dernier_Arrosage && p.Dernier_Arrosage !== "-") {
                    const d = new Date(p.Dernier_Arrosage);
                    document.getElementById('water-info').innerText = "Dernier arrosage : le " + d.toLocaleDateString();
                    document.getElementById('btn-cancel').classList.remove('hidden');
                }
            } else {
                document.getElementById('cta-order').classList.remove('hidden');
            }
        }

        async function updateWater(cancel) {
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, action: 'record_watering', plantId, cancel })
            });
            location.reload();
        }

        function showSave() { document.getElementById('btn-save').classList.remove('hidden'); }

        async function saveData() {
            const date = document.getElementById('input-date').value;
            const note = document.getElementById('input-note').value;
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, pin: userPin, action: 'update_prive', plantId, date, note })
            });
            document.getElementById('btn-save').classList.add('hidden');
            alert("Enregistré !");
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        init();
    </script>
</body>
</html>

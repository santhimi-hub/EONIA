<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Mémoire Végétale</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; 
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        .container { max-width: 900px; margin: auto; padding: 20px 25px 80px; }
        .nav-top { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; cursor: pointer; }

        /* Image & Favoris */
        .hero-wrapper { position: relative; width: 100%; margin-bottom: 35px; }
        .hero-img { 
            width: 100%; height: 60vh; 
            object-fit: cover; border-radius: 24px; border: 1px solid var(--border);
            display: block;
        }
        .fav-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .fav-btn svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; transition: 0.3s; }
        .fav-btn.active svg { fill: var(--accent); stroke: var(--accent); }
        
        h1 { font-size: 2.5rem; font-weight: 200; letter-spacing: 2px; margin-top: 10px; }
        .sci-name { color: var(--accent); font-size: 0.9rem; font-style: italic; opacity: 0.5; margin-bottom: 40px; }
        
        /* Grille */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 45px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; }
        .info-box.highlight { border-left: 3px solid var(--accent); }
        .label { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .value { font-size: 0.85rem; font-weight: 300; color: #eee; }
        .visual-val { font-size: 1.3rem; }

        /* Description & Titres Notion */
        .desc-box { margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        .section-title { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; font-weight: 700; }
        
        #p-desc { line-height: 1.9; color: #ccc; font-size: 0.95rem; font-weight: 300; text-align: justify; white-space: pre-wrap; }
        #p-desc strong { color: #fff; font-weight: 700; display: inline-block; margin-top: 15px; font-size: 1rem; border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

        .btn-order-container { width: 100%; margin-top: 50px; }
        .btn-order { 
            display: block; width: 100%; padding: 22px; background: var(--accent); color: #000; 
            text-decoration: none; border-radius: 50px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 3px; font-size: 0.8rem; text-align: center; transition: 0.3s;
        }

        @media (max-width: 600px) {
            .hero-img { height: 45vh; }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-top">
            <a onclick="history.back()" class="back-link">← Collection</a>
        </div>
        
        <div class="hero-wrapper">
            <img id="p-photo" class="hero-img">
            <div id="fav-trigger" class="fav-btn">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
        </div>
        
        <h1 id="p-titre">...</h1>
        <div id="p-sci" class="sci-name"></div>

        <div class="info-grid" id="p-grid"></div>

        <div class="desc-box">
            <div class="section-title">Informations Générales</div>
            <div id="p-desc"></div>
        </div>

        <div id="catalog-area" class="hidden btn-order-container">
            <a href="commander.html" class="btn-order">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');

    function formatNotionText(text) {
        if (!text) return "";
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Gestion des Favoris
    function toggleFav(plant) {
        let favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
        const idx = favs.findIndex(f => f.id === plant.id);
        
        if (idx > -1) {
            favs.splice(idx, 1);
            document.getElementById('fav-trigger').classList.remove('active');
        } else {
            favs.push({ id: plant.id, name: plant["Nom commun"], photo: plant.Photo });
            document.getElementById('fav-trigger').classList.add('active');
        }
        localStorage.setItem('eonia_favs', JSON.stringify(favs));
    }

    function checkFav(id) {
        const favs = JSON.parse(localStorage.getItem('eonia_favs') || '[]');
        if (favs.some(f => f.id === id)) {
            document.getElementById('fav-trigger').classList.add('active');
        }
    }

    async function load() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: localStorage.getItem('user_email') || "invite@eonia.com", plantId: rawId }) 
            });
            const data = await res.json();
            const p = data.find(x => x.id === rawId || x.cleanId === (rawId||"").replace(/-/g,"").toLowerCase());
            
            if (p) {
                document.getElementById('p-photo').src = p.Photo;
                document.getElementById('p-titre').innerText = p["Nom commun"];
                document.getElementById('p-sci').innerText = p["Nom scientifique"];
                document.getElementById('p-desc').innerHTML = formatNotionText(p["Description"]);
                
                checkFav(p.id);
                document.getElementById('fav-trigger').onclick = () => toggleFav(p);

                if (!p.est_dans_jardin) document.getElementById('catalog-area').classList.remove('hidden');

                const fields = [
                    {l:"Famille", v:p.Famille, h:true},
                    {l:"Type", v:p.Type, h:true},
                    {l:"Difficulté", v:p.Difficulté, vis:true},
                    {l:"Arrosage", v:p.Arrosage, vis:true},
                    {l:"Exposition", v:p.Exposition, vis:true},
                    {l:"Rusticité", v:p.Rusticité},
                    {l:"Taille", v:p["Taille à maturité"]},
                    {l:"Floraison", v:p.Floraison},
                    {l:"Persistance", v:p.Persistance}
                ];

                document.getElementById('p-grid').innerHTML = fields.map(f => `
                    <div class="info-box ${f.h ? 'highlight' : ''}">
                        <div class="label">${f.l}</div>
                        <div class="value">${f.v || "-"}</div>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉONIA — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --blue: #00aaff; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; }

/* LOADER */
#loader {
position: fixed; inset: 0;
background: #000;
z-index: 9999;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.spinner-logo { width: 60px; animation: spin 2s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }

.load-txt { font-size: 0.6rem; letter-spacing: 3px; color: var(--accent); }

/* CONTAINER */
.container {
max-width: 850px;
margin: auto;
padding: 20px 15px 120px;
opacity: 0;
transition: 0.5s;
}

.container.loaded { opacity: 1; }

/* WEATHER (UNIQUEMENT MON JARDIN) */
.weather-bar {
display: flex;
justify-content: space-between;
gap: 10px;
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 12px;
margin-bottom: 20px;
}

.weather-item {
flex: 1;
text-align: center;
}

.weather-item span {
display: block;
font-size: 0.55rem;
color: #888;
text-transform: uppercase;
}

.weather-item b {
font-size: 0.75rem;
color: #fff;
}

/* HERO */
.hero-wrapper {
width: calc(100% + 40px);
margin-left: -20px;
overflow: hidden;
border-radius: 0 0 30px 30px;
margin-bottom: 20px;
}

.hero-img {
width: 100%;
aspect-ratio: 16/9;
object-fit: cover;
}

/* TITRES */
h1 { font-size: 2rem; font-weight: 200; text-transform: uppercase; }
.sci-name { color: var(--accent); font-size: 0.85rem; margin-bottom: 15px; }

/* GRID */
.info-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin-bottom: 25px;
}

.info-box {
background: var(--card);
border: 1px solid var(--border);
padding: 12px;
border-radius: 12px;
}

/* BLOCS */
.dash-block {
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 20px;
margin-bottom: 20px;
}

/* BOUTONS */
.btn-main {
width: 100%;
padding: 16px;
border-radius: 40px;
border: 1px solid var(--accent);
background: transparent;
color: var(--accent);
cursor: pointer;
text-transform: uppercase;
font-size: 0.7rem;
}

.btn-save {
background: var(--accent);
color: #000;
border: none;
}

.mon-jardin-only, .collection-only {
display: none;
}

.alert {
font-size: 0.7rem;
color: #888;
margin-top: 10px;
}

</style>
</head>

<body>

<div id="loader">
<img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo">
<div class="load-txt">Téléchargement...</div>
</div>

<div class="container" id="app">

<button onclick="history.back()" style="margin-bottom:15px;border:1px solid var(--accent);background:none;color:var(--accent);padding:7px 18px;border-radius:40px;">
← RETOUR
</button>

<!-- 🌤️ WEATHER (MON JARDIN UNIQUEMENT) -->
<div class="weather-bar mon-jardin-only" id="weatherBar"></div>

<div class="hero-wrapper">
<img id="p-photo" class="hero-img">
</div>

<h1 id="p-titre">...</h1>
<div id="p-sci" class="sci-name">...</div>

<!-- ARROSAGE -->
<div class="mon-jardin-only dash-block">
<div class="block-title">SUIVI D'ARROSAGE</div>

<button class="btn-main" onclick="waterNow()" style="border-color:var(--blue);color:var(--blue);">
💧 ARROSER
</button>

<div class="alert" id="alert-text"></div>

<div class="graph-container" id="p-graph"></div>
</div>

<!-- INFOS -->
<div class="info-grid" id="p-grid"></div>

<div class="dash-block">
<p id="p-desc"></p>
</div>

<!-- JOURNAL -->
<div class="mon-jardin-only dash-block">
<div class="block-title">JOURNAL</div>

<label>Date de plantation</label>
<input type="date" id="date-plant">

<label>Notes</label>
<textarea id="p-notes"></textarea>

<button class="btn-main btn-save" onclick="saveData()">ENREGISTRER</button>
</div>

<!-- COMMANDE -->
<div class="collection-only">
<a href="commander.html" class="btn-main" style="background:var(--accent);color:#000;">
🛒 COMMANDER PLAQUE
</a>
</div>

</div>

<script>

const API_URL = "https://eonia-api.santhimi.workers.dev";
const plantId = new URLSearchParams(window.location.search).get('id');

async function load() {

const res = await fetch(API_URL, {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
plantId,
email: localStorage.getItem("user_email") || "invite@eonia.com"
})
});

const data = await res.json();
const p = data.find(x => x.id === plantId);

if (!p) return;

/* INFOS */
document.getElementById("p-photo").src = p.Photo;
document.getElementById("p-titre").innerText = p["Nom commun"];
document.getElementById("p-sci").innerText = p["Nom scientifique"];
document.getElementById("p-desc").innerText = p.Description;

/* RUBRIQUES (TOUCHÉES AUCUNE) */
document.getElementById("p-grid").innerHTML = `
<div class="info-box"><b>Type</b><div>${p.Type}</div></div>
<div class="info-box"><b>Exposition</b><div>${p.Exposition}</div></div>
<div class="info-box"><b>Arrosage</b><div>${p.Arrosage}</div></div>
<div class="info-box"><b>Difficulté</b><div>${p.Difficulté}</div></div>
`;

/* MON JARDIN */
if (p.est_dans_jardin) {

document.querySelectorAll(".mon-jardin-only").forEach(e => e.style.display="block");

/* NOTES */
document.getElementById("p-notes").value = p.Notes_Privées || "";

/* GRAPH */
const hist = p.Watering_History || [0,0,0,0,0,0,0];
document.getElementById("p-graph").innerHTML =
hist.map((h,i)=>`
<div class="bar-wrapper">
<div class="bar ${h ? 'active':''}"></div>
</div>
`).join("");

/* ALERT SIMPLE */
const last = hist.lastIndexOf(1);
if (last === -1 || last < hist.length-3) {
document.getElementById("alert-text").innerText =
"⚠️ Arrosage conseillé bientôt";
}

/* WEATHER */
loadWeather();

} else {
document.querySelectorAll(".collection-only").forEach(e=>e.style.display="block");
}

document.getElementById("loader").style.display="none";
document.getElementById("app").classList.add("loaded");

}

/* 🌤️ METEO REELLE */
async function loadWeather() {
const url = "https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522&daily=temperature_2m_max&timezone=auto";

const res = await fetch(url);
const d = await res.json();

const days = d.daily.time.slice(0,4);
const temp = d.daily.temperature_2m_max.slice(0,4);

document.getElementById("weatherBar").innerHTML =
days.map((x,i)=>{
const date = new Date(x);
const label = date.toLocaleDateString("fr-FR",{weekday:"short"});
return `<div class="weather-item"><span>${label}</span><b>${Math.round(temp[i])}°</b></div>`;
}).join("");
}

/* ACTIONS */
function waterNow(){
document.querySelectorAll(".bar").forEach(b=>b.classList.add("active"));
document.getElementById("alert-text").innerText = "✔ Arrosé aujourd’hui";
}

function saveData(){ alert("Sauvegardé"); }

load();

</script>

</body>
</html>

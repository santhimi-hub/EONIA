<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Notre Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; }

        /* --- LOADER DE TRANSITION (Invisible par défaut) --- */
        #eonia-loader-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .spinner { width: 60px; animation: spin 2s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-txt { font-size: 0.6rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        /* --- HEADER --- */
        .header { text-align: center; padding: 30px 20px; }
        .logo-main { width: 50px; margin-bottom: 10px; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 1.6rem; }
        .subtitle { color: var(--accent); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }

        /* --- NAVIGATION / RECHERCHE / FILTRES --- */
        .nav-sticky { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); padding: 15px; }
        .search-input { width: 100%; max-width: 500px; margin: 0 auto; display: block; background: #111; border: 1px solid var(--border); padding: 12px 25px; border-radius: 40px; color: #fff; outline: none; font-family: inherit; }
        
        .filters { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0 5px; max-width: 600px; margin: 0 auto; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .f-item { padding: 8px 18px; border-radius: 40px; border: 1px solid var(--border); font-size: 0.65rem; color: #666; white-space: nowrap; cursor: pointer; }
        .f-item.active { border-color: var(--accent); color: var(--accent); }

        /* --- GRILLE DES PLANTES --- */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 900px; margin: 0 auto 120px; }
        .plant-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; }
        .plant-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #111; display: block; }
        .plant-info { padding: 12px; text-align: center; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        /* --- IA CONSEILLÈRE (BAS GAUCHE) --- */
        #ai-bubble {
            position: fixed; bottom: 25px; left: 20px; width: 60px; height: 60px;
            background: #000; border: 2px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 9000; box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }
        #ai-bubble img { width: 38px; }

        #ai-chat {
            display: none; position: fixed; bottom: 95px; left: 20px; width: 280px;
            background: #0c0c0c; border: 1px solid var(--border); border-radius: 20px;
            z-index: 9001; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .ai-title { background: #1a1a1a; color: var(--accent); padding: 12px; font-size: 0.65rem; font-weight: bold; text-align: center; letter-spacing: 2px; }
        .ai-body { padding: 15px; font-size: 0.8rem; color: #ccc; line-height: 1.5; }
        .ai-btn { margin-top: 10px; padding: 10px; background: #151515; border: 1px solid #222; border-radius: 10px; color: var(--accent); cursor: pointer; text-align: center; }

        /* --- BOUTON RETOUR EN HAUT (BAS DROITE) --- */
        #top-btn {
            display: none; position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px;
            background: var(--accent); color: #000; border: none; border-radius: 50%;
            cursor: pointer; z-index: 9000; font-weight: bold; font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <div id="eonia-loader-overlay">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner">
        <div class="load-txt">Chargement de la fiche...</div>
    </div>

    <div class="header">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="logo-main">
        <h1>ÉONIA</h1>
        <div class="subtitle">Notre Collection</div>
    </div>

    <div class="nav-sticky">
        <input type="text" class="search-input" placeholder="RECHERCHER UNE PLANTE...">
        <div class="filters">
            <div class="f-item active">TOUT</div>
            <div class="f-item">FRUITIERS</div>
            <div class="f-item">FLEURS</div>
            <div class="f-item">ARBRES</div>
            <div class="f-item">INTÉRIEUR</div>
        </div>
    </div>

    <div class="catalog-grid" id="catalogGrid">
        <a href="fiche-abricotier.html" class="plant-card" onclick="startLoader()">
            <img src="https://images.unsplash.com/photo-1520412099521-638f46d5e906?w=400" class="plant-img">
            <div class="plant-info">Abricotier</div>
        </a>
        <a href="fiche-aloe.html" class="plant-card" onclick="startLoader()">
            <img src="https://images.unsplash.com/photo-1509423350716-97f9360b4e09?w=400" class="plant-img">
            <div class="plant-info">Aloe Vera</div>
        </a>
    </div>

    <div id="ai-bubble" onclick="toggleChat()">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png">
    </div>
    <div id="ai-chat">
        <div class="ai-title">ASSISTANT ÉONIA</div>
        <div class="ai-body" id="aiContent">
            <p>Besoin d'un conseil pour choisir votre plante ?</p>
            <div class="ai-btn" onclick="aiAsk('choisir')">🔍 Comment choisir ?</div>
            <div class="ai-btn" onclick="aiAsk('commande')">🛒 Commander une plaque</div>
        </div>
    </div>

    <button id="top-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
    // ACTIVER LE LOADER SANS QUITTER LA PAGE IMMÉDIATEMENT
    function startLoader() {
        document.getElementById('eonia-loader-overlay').style.display = 'flex';
    }

    // GESTION IA
    function toggleChat() {
        const chat = document.getElementById('ai-chat');
        chat.style.display = (chat.style.display === 'block') ? 'none' : 'block';
    }

    function aiAsk(type) {
        const body = document.getElementById('aiContent');
        if(type === 'choisir') {
            body.innerHTML = "<p>Utilisez les filtres ou la recherche pour trouver la plante adaptée à votre exposition.</p>";
        } else {
            body.innerHTML = "<p>Cliquez sur une plante, le bouton 'Commander' est sur sa fiche générale.</p>";
        }
        body.innerHTML += '<div class="ai-btn" style="margin-top:10px; opacity:0.5;" onclick="location.reload()">Retour</div>';
    }

    // BOUTON TOP
    window.onscroll = function() {
        const btn = document.getElementById("top-btn");
        if (window.scrollY > 400) btn.style.display = "block";
        else btn.style.display = "none";
    };
</script>

</body>
</html>

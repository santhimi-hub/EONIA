<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Gestion Intelligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --blue: #00aaff; --purple: #a855f7; --error: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; -webkit-font-smoothing: antialiased; }

        /* LOADER ET ÉTATS D'ERREUR */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .spinner-logo { width: 50px; height: 50px; margin-bottom: 20px; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: var(--error); text-align: center; display: none; padding: 20px; }

        /* SKELETON UI (UX PREMIUM DURANT CHARGEMENT) */
        .skeleton { background: linear-gradient(90deg, #0c0c0c 25%, #1a1a1a 50%, #0c0c0c 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 15px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .container { max-width: 850px; margin: auto; padding: 20px 15px 100px; opacity: 0; }
        .container.loaded { opacity: 1; transition: opacity 0.8s ease; }

        /* IMAGE HERO FORMAT PC / MOBILE */
        .hero-wrapper { position: relative; width: calc(100% + 40px); margin-left: -20px; overflow: hidden; border-radius: 0 0 30px 30px; border: 1px solid var(--border); }
        .hero-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; cursor: zoom-in; }

        /* TOAST NOTIFICATION (REMPLACE ALERT JS) */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; z-index: 10000; opacity: 0; transition: 0.3s; pointer-events: none; }

        /* GRAPHIQUE D'ARROSAGE PERSISTANT */
        .graph-container { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; margin-top: 20px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 12%; }
        .bar { width: 100%; background: #1a1a1a; border-radius: 4px 4px 0 0; transition: height 0.5s ease, background 0.3s; cursor: pointer; }
        .bar.active { background: var(--blue); box-shadow: 0 0 15px rgba(0,170,255,0.2); }
        .bar-day { font-size: 0.5rem; color: #444; margin-top: 5px; text-transform: uppercase; }

        /* DASHBOARD BLOCKS */
        .dash-block { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .block-title { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: 600; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; border-left: 3px solid var(--accent); }
        
        /* GALERIE */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .evo-photo { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: #080808; border: 1px solid var(--border); position: relative; }
        .evo-photo img { width: 100%; height: 100%; object-fit: cover; }

        .btn-primary { width: 100%; padding: 18px; border-radius: 40px; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-water { background: transparent; border: 1px solid var(--blue); color: var(--blue); margin-bottom: 15px; }
        .btn-share { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 20px; }

        .premium-only, .catalog-only { display: none; }
    </style>
</head>
<body>

    <div id="toast">Action enregistrée</div>

    <div id="loader">
        <img src="https://raw.githubusercontent.com/santhimi-hub/EONIA/main/file_00000000f43c7243819c00a508d83afc.png" class="spinner-logo" alt="Logo Eonia">
        <div class="loading-text" id="loader-status">Analyse de votre jardin...</div>
        <div class="error-msg" id="error-display">Impossible de charger vos données. <br><br> <button onclick="location.reload()" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px; border-radius:20px;">Réessayer</button></div>
    </div>

    <div class="container" id="app">
        <div class="nav-header">
            <button onclick="history.back()" class="btn-primary" style="width:auto; padding:8px 20px; font-size:0.6rem; background:none; border:1px solid var(--accent); color:var(--accent);">← RETOUR</button>
        </div>

        <div class="hero-wrapper">
            <img id="p-photo" class="hero-img" loading="lazy" alt="Photo de la plante">
        </div>

        <h1 id="p-titre">...</h1>
        <div id="p-sci" class="sci-name">...</div>

        <div class="premium-only">
            <div class="dash-block">
                <div class="block-title">Score Santé Réel</div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="health-score" style="font-size: 2rem; font-weight: 100; color: var(--accent);">--</div>
                    <div style="font-size:0.8rem; color:#666;">Basé sur l'arrosage et la météo locale.</div>
                </div>
            </div>

            <div class="dash-block">
                <div class="block-title">Suivi d'arrosage (7 jours)</div>
                <button class="btn-primary btn-water" onclick="syncAction('water')">💧 MARQUER COMME ARROSÉ</button>
                <div class="graph-container" id="watering-graph">
                    </div>
            </div>
        </div>

        <div class="info-grid" id="p-grid"></div>

        <div class="dash-block">
            <div class="block-title">Description & Conseil</div>
            <p id="p-desc" style="color:#888; font-size:0.9rem; line-height:1.6;"></p>
        </div>

        <div class="premium-only">
            <div class="dash-block">
                <div class="block-title">Galerie d'Évolution</div>
                <div class="photo-grid" id="p-gallery"></div>
                <button class="btn-primary" style="background:none; border:1px solid #333; color:#666; margin-top:15px; font-size:0.7rem;" onclick="document.getElementById('upload').click()">+ Ajouter une photo</button>
                <input type="file" id="upload" hidden onchange="syncAction('upload', this)">
            </div>
            <button class="btn-primary btn-share" onclick="shareSocial()">✨ GÉNÉRER UNE CARTE DE PARTAGE</button>
        </div>

        <div class="catalog-only">
            <a href="/commander" class="btn-primary" style="background:var(--accent); color:#000; text-decoration:none; display:block; text-align:center;">Commander ma plaque ÉONIA</a>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const plantId = urlParams.get('id');

    // Sécurité : Rediriger si pas d'ID
    if (!plantId) window.location.href = "/collection.html";

    async function initApp() {
        const token = localStorage.getItem('eonia_auth_token'); // JWT suggéré
        
        try {
            const res = await fetch(`${API_URL}/plant-details`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ plantId })
            });

            if (!res.ok) throw new Error("Erreur serveur");
            const data = await res.json();
            renderPlant(data);
        } catch (err) {
            document.getElementById('loader-status').style.display = 'none';
            document.getElementById('error-display').style.display = 'block';
        }
    }

    function renderPlant(plant) {
        document.getElementById('p-photo').src = plant.Photo;
        document.getElementById('p-titre').innerText = plant["Nom commun"] || "Plante Inconnue";
        document.getElementById('p-sci').innerText = plant["Nom scientifique"];
        document.getElementById('p-desc').innerText = plant.Description;

        // Gestion Mode Premium vs Catalogue
        if (plant.est_dans_jardin) {
            document.querySelectorAll('.premium-only').forEach(el => el.style.display = 'block');
            document.getElementById('health-score').innerText = plant.health_score + "%";
            buildGraph(plant.watering_history);
            renderGallery(plant.gallery);
        } else {
            document.querySelectorAll('.catalog-only').forEach(el => el.style.display = 'block');
        }

        // Grille Technique dynamique
        const fields = [
            {l: "Rusticité", v: plant.Rusticité},
            {l: "Arrosage", v: plant.Arrosage_Icon}, // API renvoie "💧💧"
            {l: "Exposition", v: plant.Exposition_Icon},
            {l: "Difficulté", v: plant.Difficulté_Icon}
        ];
        document.getElementById('p-grid').innerHTML = fields.map(f => `
            <div class="info-box"><div class="label">${f.l}</div><div class="value">${f.v || "-"}</div></div>
        `).join('');

        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').classList.add('loaded');
        }, 500);
    }

    function buildGraph(history = []) {
        const container = document.getElementById('watering-graph');
        const days = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
        container.innerHTML = days.map((day, i) => `
            <div class="bar-wrapper">
                <div class="bar ${history.includes(i) ? 'active' : ''}" style="height: ${history.includes(i) ? '80%' : '20%'}"></div>
                <div class="bar-day">${day}</div>
            </div>
        `).join('');
    }

    // GESTION DES ACTIONS (SYNC API RÉELLE)
    async function syncAction(type, element = null) {
        showToast("Synchronisation...");
        
        try {
            // Ici, on envoie la vraie info au serveur (Cloudflare Worker + KV/D1)
            const res = await fetch(`${API_URL}/sync-garden`, {
                method: 'PUT',
                body: JSON.stringify({ plantId, action: type, timestamp: Date.now() })
            });
            
            if (res.ok) {
                showToast(type === 'water' ? "Arrosage enregistré ✨" : "Photo ajoutée ✨");
                // Optionnel : Re-fetch ou mise à jour locale de l'UI
                if(type === 'water') addWateringVisual();
            }
        } catch (e) {
            showToast("Erreur de connexion ⚠️");
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    function shareSocial() {
        // Logique Web Share API
        if (navigator.share) {
            navigator.share({
                title: 'Mon Jardin Éonia',
                text: `Découvrez mon ${document.getElementById('p-titre').innerText} !`,
                url: window.location.href
            });
        }
    }

    initApp();
</script>
</body>
</html>

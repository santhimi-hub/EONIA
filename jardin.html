<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4ade80; --bg: #000; --card: #0c0c0c; --border: #1a1a1a; --water: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: 'Raleway', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* BOUTONS & ACCORDÉONS */
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; text-transform: uppercase; }
        .location-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #aaa; font-size: 0.6rem; padding: 5px 12px; border-radius: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        
        .accordion-btn { width: 100%; background: none; border: none; color: var(--accent); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid var(--border); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(255,255,255,0.01); }
        .acc-inner { padding: 20px; line-height: 1.8; color: #aaa; font-size: 0.9rem; }
        .arrow { transition: 0.3s; font-size: 0.6rem; }

        /* MÉTÉO */
        .weather-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; margin-bottom: 8px; }
        #weather-container { background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        #weather-advice { background: rgba(74, 222, 128, 0.05); border: 1px solid var(--border); border-top: none; border-radius: 0 0 24px 24px; padding: 12px; font-size: 0.7rem; color: var(--accent); text-align: center; margin-bottom: 25px; }

        /* GRILLE TECHNIQUE AVEC LA LIGNE VERTE À GAUCHE (HIGHLIGHT) */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; }
        
        /* C'EST ICI : La ligne verte sur le côté gauche */
        .info-box.highlight { border-left: 3px solid var(--accent); background: rgba(74, 222, 128, 0.03); padding-left: 12px; }
        
        .label { color: var(--accent); font-size: 0.55rem; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 0.85rem; margin-top: 5px; color: #fff; }

        .hero-img { width: 100%; height: 40vh; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .maintenance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .section-title { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        
        textarea, input[type="date"] { width: 100%; background: #080808; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; font-family: inherit; }
        .btn-eonia { background: none; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; font-weight: 500; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .progress-bg { background: #1a1a1a; height: 6px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: 1.5s; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        
        <div id="weather-wrapper" class="hidden">
            <div class="weather-header">
                <span id="display-city" style="font-size: 0.6rem; color: #666; text-transform: uppercase;">📍 Recherche...</span>
                <button class="location-btn" onclick="changeLocation()">Changer de ville</button>
            </div>
            <div id="weather-container"></div>
            <div id="weather-advice">Analyse...</div>
        </div>
        
        <img id="p-photo" class="hero-img" src="">
        <h1 id="p-titre" style="font-size:2.1rem; font-weight:200; margin:0 0 5px 0;"></h1>
        <div id="p-sci" style="color:var(--accent); font-style:italic; margin-bottom:20px; opacity:0.7;"></div>

        <div class="info-grid" id="p-grid"></div>

        <div id="owner-area" class="hidden">
            <div class="maintenance-card" style="padding:0; overflow:hidden; margin-bottom:40px;">
                <button class="accordion-btn" onclick="toggleAccordion('acc-desc')"><span>📖 Description & Histoire</span><span class="arrow">▼</span></button>
                <div id="acc-desc" class="accordion-content"><div id="p-desc" class="acc-inner"></div></div>

                <button class="accordion-btn" onclick="toggleAccordion('acc-flore')"><span>🌸 Floraison</span><span class="arrow">▼</span></button>
                <div id="acc-flore" class="accordion-content"><div id="p-flore" class="acc-inner"></div></div>

                <button class="accordion-btn" onclick="toggleAccordion('acc-sol')"><span>🌱 Sol & Fertilisation</span><span class="arrow">▼</span></button>
                <div id="acc-sol" class="accordion-content"><div id="p-sol" class="acc-inner"></div></div>

                <button class="accordion-btn" onclick="toggleAccordion('acc-health')"><span>🛡️ Protection & Santé</span><span class="arrow">▼</span></button>
                <div id="acc-health" class="accordion-content"><div id="p-health" class="acc-inner"></div></div>

                <button class="accordion-btn" onclick="toggleAccordion('acc-asso')"><span>🤝 Plantes associées</span><span class="arrow">▼</span></button>
                <div id="acc-asso" class="accordion-content"><div id="p-asso" class="acc-inner"></div></div>
            </div>

            <div class="section-title" style="text-align: center; margin-bottom: 20px;">— VOTRE ESPACE PERSONNEL —</div>
            
            <div class="maintenance-card">
                <div class="section-title">Cycle de Vie Annuel</div>
                <div class="progress-bg"><div id="cycle-fill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.55rem; color: #666;">
                    <span id="cycle-label">Chargement...</span><span id="cycle-pct">0%</span>
                </div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">ENTRETIEN</div>
                <button class="btn-eonia" style="color:var(--water); border-color:var(--water);" id="btn-water-main" onclick="recordWatering()">💦 Marquer comme arrosé</button>
                <div id="watering-history" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px;"></div>
            </div>

            <div class="maintenance-card">
                <div class="section-title">JOURNAL DE BORD</div>
                <label style="font-size: 0.55rem; color: #555;">DATE DE PLANTATION</label>
                <input type="date" id="plant-date" oninput="showSave()">
                <label style="font-size: 0.55rem; color: #555; margin-top: 15px; display: block;">OBSERVATIONS</label>
                <textarea id="plant-note" rows="3" oninput="showSave()"></textarea>
                <button id="btn-save-note" class="btn-eonia" style="display:none; color:var(--accent); border-color:var(--accent);" onclick="saveJournal()">💾 Enregistrer</button>
            </div>
        </div>

        <div id="catalog-area" class="hidden">
            <div class="maintenance-card">
                <div class="section-title">À PROPOS</div>
                <div id="p-desc-simple" style="line-height:1.8; color:#aaa; font-size:0.9rem;"></div>
            </div>
            <button onclick="window.location.href='commander.html'" style="background:var(--accent); color:#000; border:none; padding:18px; border-radius:15px; width:100%; font-weight:800; text-transform:uppercase;">🏷️ Commander ma plaque ÉONIA</button>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');
    const plantIdClean = rawId ? rawId.replace(/-/g, "") : null;
    const userEmail = localStorage.getItem('user_email') || "invite@eonia.com";

    async function init() {
        if (!rawId) return;
        fetchUpdate();
    }

    async function fetchUpdate() {
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: userEmail, pin: localStorage.getItem('user_pin'), plantId: rawId }) 
            });
            const data = await res.json();
            const p = data.find(item => item.id.replace(/-/g, "") === plantIdClean || item.id === rawId);
            if (p) render(p);
        } catch (e) { console.error(e); }
    }

    function render(p) {
        document.getElementById('p-photo').src = p.Photo || '';
        document.getElementById('p-titre').innerText = p["Nom commun"] || "Plante";
        document.getElementById('p-sci').innerText = p["Nom scientifique"] || "";
        
        // Grille technique avec highlight (la ligne verte) sur Famille et Type
        const fields = [
            {l:"Famille", v:p.Famille, h:true}, 
            {l:"Type", v:p.Type, h:true}, 
            {l:"Exposition", v:p.Exposition, h:false}, 
            {l:"Rusticité", v:p.Rusticité, h:false}
        ];
        document.getElementById('p-grid').innerHTML = fields.map(f => `
            <div class="info-box ${f.h ? 'highlight' : ''}">
                <div class="label">${f.l}</div>
                <div class="value">${f.v||"-"}</div>
            </div>`).join('');

        if (p.est_dans_jardin) {
            document.getElementById('owner-area').classList.remove('hidden');
            document.getElementById('catalog-area').classList.add('hidden');
            
            // Données Client Expert
            document.getElementById('p-desc').innerText = p.Description || "";
            document.getElementById('p-flore').innerText = p.Floraison || "";
            document.getElementById('p-sol').innerText = p["Sol et fertilisation"] || "";
            document.getElementById('p-health').innerText = p["Protection et santé"] || "";
            document.getElementById('p-asso').innerText = p["Campagnonnage/ Plantes associées"] || "";
            
            document.getElementById('plant-note').value = p.Note_Privee !== "-" ? p.Note_Privee : "";
            document.getElementById('plant-date').value = p.Date_Plantation !== "-" ? p.Date_Plantation : "";
            updateCycle();
        } else {
            document.getElementById('owner-area').classList.add('hidden');
            document.getElementById('catalog-area').classList.remove('hidden');
            document.getElementById('p-desc-simple').innerText = p.Description || "";
        }
    }

    function toggleAccordion(id) {
        const content = document.getElementById(id);
        const arrow = event.currentTarget.querySelector('.arrow');
        if (content.style.maxHeight && content.style.maxHeight !== "0px") {
            content.style.maxHeight = "0px";
            arrow.style.transform = "rotate(0deg)";
        } else {
            content.style.maxHeight = content.scrollHeight + "px";
            arrow.style.transform = "rotate(180deg)";
        }
    }

    function updateCycle() {
        const now = new Date();
        const pct = Math.round((Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000) / 365) * 100);
        document.getElementById('cycle-fill').style.width = pct + "%";
        document.getElementById('cycle-pct').innerText = pct + "%";
        document.getElementById('cycle-label').innerText = ["Repos hivernal", "Repos hivernal", "Réveil printanier 🌱", "Croissance active 🌱", "Pleine sève ☀️", "Floraison 🌸", "Stabilité ☀️", "Maturation", "Préparation au repos", "Couleurs d'automne", "Dormance", "Repos hivernal"][now.getMonth()];
    }

    function showSave() { document.getElementById('btn-save-note').style.display = "block"; }
    init();
</script>
</body>
</html>

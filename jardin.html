<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉONIA — Détails</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Raleway', sans-serif; line-height: 1.6; }
        #status-msg { text-align: center; padding: 50px; color: #4ade80; letter-spacing: 2px; }
        #plant-details { display: none; max-width: 1000px; margin: 0 auto; padding-bottom: 50px; }
        .main-img-container { width: 100%; height: 45vh; overflow: hidden; border-bottom: 2px solid #4ade80; background: #111; }
        #main-img { width: 100%; height: 100%; object-fit: cover; }
        .content-padding { padding: 25px 20px; }
        .back-btn { color: #4ade80; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; display: inline-block; margin-bottom: 20px; }
        h1 { font-weight: 200; text-transform: uppercase; letter-spacing: 4px; color: #4ade80; font-size: 1.6rem; margin-bottom: 10px; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .info-item { background: #0c0c0c; padding: 12px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .label { font-size: 0.55rem; text-transform: uppercase; color: #555; display: block; margin-bottom: 4px; }
        .value { font-size: 0.8rem; color: #ddd; font-weight: 500; }
        details { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 8px; }
        summary { padding: 12px; cursor: pointer; color: #4ade80; font-size: 0.75rem; text-transform: uppercase; list-style: none; outline: none; }
        .details-content { padding: 12px; font-size: 0.85rem; color: #bbb; border-top: 1px solid #1a1a1a; white-space: pre-line; }
        #espace-proprietaire { border: 1px solid #4ade80; padding: 20px; border-radius: 12px; margin-top: 25px; background: rgba(74, 222, 128, 0.05); display: none; }
    </style>
</head>
<body>

    <div id="status-msg">Chargement des données botaniques...</div>

    <div id="plant-details">
        <div class="main-img-container"><img id="main-img" src="" alt="Plante"></div>
        <div class="content-padding">
            <a href="catalogue.html" class="back-btn">← Retour au Catalogue</a>
            
            <h1 id="nom-commun">...</h1>

            <div class="grid-info">
                <div class="info-item"><span class="label">Référence</span><span id="id-plaque" class="value"></span></div>
                <div class="info-item"><span class="label">Famille</span><span id="famille" class="value"></span></div>
                <div class="info-item"><span class="label">Exposition</span><span id="exposition" class="value"></span></div>
                <div class="info-item"><span class="label">Arrosage</span><span id="arrosage" class="value"></span></div>
            </div>

            <details><summary>✂ Conseils d'Entretien</summary><div class="details-content" id="entretien"></div></details>
            <details><summary>🛡 Santé & Protection</summary><div class="details-content" id="sante"></div></details>

            <div id="espace-proprietaire">
                <h2 style="color:#4ade80; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase;">Mon Suivi Privé</h2>
                <p id="notes-suivi" style="font-size:0.85rem; color:#eee; font-style:italic; margin-top:10px;"></p>
                <button onclick="configurer()" style="margin-top:20px; width:100%; padding:12px; background:none; border:1px solid #4ade80; color:#4ade80; cursor:pointer; text-transform:uppercase; font-size:0.7rem; letter-spacing:1px;">
                    Changer de variété
                </button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://eonia-api.santhimi.workers.dev";

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const plaqueId = params.get('id');
        const idBotanique = params.get('id_botanique');
        const userEmail = localStorage.getItem('user_email') || "invite@eonia.com";

        console.log("Tentative de chargement - Plaque:", plaqueId, "Botanique:", idBotanique);

        if (!plaqueId && !idBotanique) {
            document.getElementById('status-msg').innerText = "Erreur : Aucun identifiant trouvé dans l'URL.";
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: plaqueId, 
                    id_botanique: idBotanique,
                    email: userEmail 
                })
            });

            const result = await response.json();
            
            // SI LE WORKER RENVOIE UNE ERREUR
            if (result.error) {
                alert("Erreur Worker : " + result.error);
                document.getElementById('status-msg').innerText = "Erreur : " + result.error;
                return;
            }

            const p = result[0];

            // SI LA LISTE EST VIDE
            if (!p) {
                alert("Notion n'a renvoyé aucune donnée pour cet ID.");
                document.getElementById('status-msg').innerText = "Données introuvables dans Notion.";
                return;
            }

            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('plant-details').style.display = 'block';

            document.getElementById('nom-commun').innerText = p["Nom commun"] || "Spécimen";
            document.getElementById('id-plaque').innerText = p["ID_Plaque"] || "Consultation";
            document.getElementById('famille').innerText = p["Famille"] || "-";
            document.getElementById('exposition').innerText = p["Exposition"] || "-";
            document.getElementById('arrosage').innerText = p["Arrosage"] || "-";
            document.getElementById('entretien').innerText = p["Entretien"] || "Non renseigné";
            document.getElementById('sante').innerText = p["Protection et sante"] || "Non renseigné";
            document.getElementById('main-img').src = p["Photo"] || "https://via.placeholder.com/800x600?text=EONIA";

            if (p.estProprietaire) {
                document.getElementById('espace-proprietaire').style.display = 'block';
                document.getElementById('notes-suivi').innerText = p["Notes_Suivi"] || "Aucune note enregistrée.";
            }

        } catch (error) {
            alert("Erreur de connexion : " + error.message);
            document.getElementById('status-msg').innerText = "Problème de connexion au serveur.";
        }
    }

    function configurer() {
        const id = new URLSearchParams(window.location.search).get('id');
        window.location.href = `catalogue.html?config=${id}`;
    }
</script>


</body>
</html>
